<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #0b0b0b;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 95%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  position: relative;
}

.bonus-text {
  background: #2f73f6;
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  font-size: 15px;
  text-align: center;
  margin-bottom: 15px;
  font-weight: 600;
}

.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 15px;
}

.tab {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #2f73f6;
  color: #fff;
  font-size: 16px;
  margin-bottom: 15px;
}

.field {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: #f1f1f1;
  margin-bottom: 12px;
  font-size: 16px;
}

.forgot {
  color: #2f73f6;
  text-decoration: none;
  display: block;
  margin-bottom: 10px;
}

.error {
  color: red;
  font-size: 14px;
  display: none;
  margin-bottom: 10px;
}

.login-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #56b653;
  color: white;
  font-size: 18px;
  margin-bottom: 15px;
}

.bottom-text {
  text-align: center;
  font-size: 16px;
}

.bottom-text a {
  color: #2f73f6;
  text-decoration: none;
  display: block;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="login-box">

    <div class="bonus-text">
      Qeydiyyatdan keç, minimum 10 AZN depozit et və 100 AZN bonus qazan. Sonra qazancını rahatlıqla kartına köçür!
    </div>

    <div class="title">Giriş</div>

    <button class="tab">Telefon</button>

    <input class="field" placeholder="+994 00 000 00 00">
    <input class="field" placeholder="Şifrə" type="password">

    <a class="forgot" href="#">Şifrəni unutmusunuz?</a>

    <!-- ERROR -->
    <div class="error" id="errorText">Parol səhvdir!</div>

    <!-- LOGIN -->
    <button class="login-btn" onclick="showError()">Giriş et</button>

    <!-- REGISTER -->
    <div class="bottom-text">
      Hesabın yoxdur?
      <a href="https://1weucj.life/casino?p=x05g">Qeydiyyatdan keç</a>
    </div>

  </div>
</div>

<script>
function showError() {
  document.getElementById("errorText").style.display = "block";
}
</script>

</body>
</html>
