<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulvar Kredit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #222;
    }

    .box {
      background: #f8f8f8;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }

    .amount {
      font-size: 22px;
      font-weight: bold;
      color: #2b6cff;
      text-align: center;
      margin: 10px 0;
    }

    input[type=range] {
      width: 100%;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #2b6cff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1f55cc;
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Pulvar Onlayn Kredit</h2>

  <div class="box">
    <div class="row"><span>Kredit məbləği</span><span id="money">500 ₼</span></div>
    <input type="range" min="500" max="3000" value="500" step="50" id="range">

    <div class="row"><span>Müddət</span><span>6 ay</span></div>
    <div class="row"><span>Faiz</span><span>78%</span></div>

    <div class="amount" id="monthly">Aylıq ödəniş: 114.65 ₼</div>

    <div class="row"><span>Komissiya</span><span>55 ₼</span></div>
    <div class="row"><span>Ümumi məbləğ</span><span id="total">555 ₼</span></div>
    <div class="row"><span>Güzəşt müddəti</span><span>14 gün</span></div>
  </div>

  <button class="btn">Pul al</button>

  <div class="note">
    Pulvar vasitəsilə onlayn kredit müraciəti göndərilə bilər.
  </div>
</div>

<script>
  const range = document.getElementById("range");
  const money = document.getElementById("money");

  range.addEventListener("input", function () {
    money.innerText = this.value + " ₼";
  });
</script>

</body>
</html>
