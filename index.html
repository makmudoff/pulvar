<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Page</title>

<style>
body{
    margin:0;
    background:#0b0f1a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    text-align:center;
    background:#111a2e;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px #00d4ff;
    width:300px;
}

.signal{
    font-size:40px;
    font-weight:bold;
    color:#00ff99;
    margin:20px 0;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

.btn{
    padding:10px;
    background:linear-gradient(90deg,#6a00ff,#00d4ff);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    width:100%;
    font-weight:bold;
}

.small{
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="box">
    <h2>🚀 LIVE SIGNAL</h2>

    <div class="signal" id="signal">2.10x</div>

    <div class="small">📊 Təxmini analizə əsaslanır</div>

    <button class="btn" onclick="newSignal()">Yeni Siqnal</button>
</div>

<script>
function newSignal(){
    let value = (Math.random()*3 + 1).toFixed(2);
    document.getElementById("signal").innerText = value + "x";
}
</script>

</body>
</html>
