<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wheel Of Luck</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(180deg,#7f5af0,#2d1b69);
height:100vh;
overflow:hidden;
color:white;
}

.top{
display:flex;
justify-content:space-between;
padding:20px;
font-weight:bold;
font-size:18px;
}

.box{
background:#fff;
color:#000;
padding:8px 16px;
border-radius:20px;
font-size:15px;
}

.center{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin-top:10px;
}

h1{
font-size:34px;
margin-bottom:15px;
text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.wheel-box{
position:relative;
width:320px;
height:320px;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid #facc15;
transition:5s cubic-bezier(0.17,0.67,0.12,0.99);
box-shadow:
0 0 20px rgba(255,255,255,0.4),
0 0 40px rgba(255,255,255,0.2);
}

.pointer{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
font-size:50px;
z-index:10;
}

.spin-buttons{
margin-top:30px;
width:90%;
max-width:350px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
transition:0.2s;
}

button:active{
transform:scale(0.96);
}

.spin{
background:#facc15;
color:#000;
}

.premium{
background:#22c55e;
color:white;
}

.reward-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup{
background:white;
color:black;
padding:30px;
border-radius:25px;
text-align:center;
width:320px;
animation:pop 0.4s ease;
}

@keyframes pop{
0%{
transform:scale(0.4);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

.popup h2{
font-size:32px;
margin-top:10px;
}

.popup .coins{
font-size:65px;
margin:15px 0;
}

.claim{
background:#facc15;
}

.claim2{
background:#22c55e;
color:white;
}

.bottom{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:14px;
opacity:0.8;
}

.online{
color:#22c55e;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top">

<div class="box">
🎟️ Ticket: <span id="ticket">3</span>
</div>

<div class="box">
🪙 Coin: <span id="coin">284</span>
</div>

</div>

<div class="center">

<h1>WHEEL OF LUCK</h1>

<div class="wheel-box">

<div class="pointer">📍</div>

<canvas id="wheel" width="320" height="320"></canvas>

</div>

<div class="spin-buttons">

<button class="spin" onclick="spinWheel()">
SPIN 🎟️
</button>

<button class="premium" onclick="premiumSpin()">
SPIN x2 🎥
</button>

</div>

</div>

<div class="reward-popup" id="popup">

<div class="popup">

<h2>Reward</h2>

<div class="coins">🪙</div>

<h1 id="rewardText">+50</h1>

<button class="claim" onclick="claimReward()">
CLAIM
</button>

<button class="claim2" onclick="claimX2()">
CLAIM x2
</button>

</div>

</div>

<div class="bottom">
<span class="online">● 2,194 online players</span>
</div>

<script>

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const rewards = [
50,
100,
250,
25,
500,
75,
150,
300
];

const colors = [
"#ff4d6d",
"#ffd60a",
"#2ec4b6",
"#8338ec",
"#fb5607",
"#3a86ff",
"#06d6a0",
"#ffbe0b"
];

let rotation = 0;
let currentReward = 0;

function drawWheel(){

const size = canvas.width;
const center = size / 2;
const radius = center;

for(let i=0;i<rewards.length;i++){

const angle =
(i * 2 * Math.PI) / rewards.length;

ctx.beginPath();

ctx.moveTo(center,center);

ctx.arc(
center,
center,
radius,
angle,
angle + (2*Math.PI/rewards.length)
);

ctx.fillStyle = colors[i];
ctx.fill();

ctx.save();

ctx.translate(center,center);
ctx.rotate(angle + Math.PI/4);

ctx.fillStyle = "white";
ctx.font = "bold 22px Arial";

ctx.fillText(
rewards[i],
radius - 70,
10
);

ctx.restore();

}

}

drawWheel();

function spinWheel(){

let ticket =
parseInt(document.getElementById("ticket").innerText);

if(ticket <= 0){
alert("Ticket yoxdur");
return;
}

ticket--;

document.getElementById("ticket").innerText =
ticket;

const rewardIndex =
Math.floor(Math.random() * rewards.length);

currentReward = rewards[rewardIndex];

const degree =
3600 + (rewardIndex * 45);

rotation += degree;

canvas.style.transform =
`rotate(${rotation}deg)`;

setTimeout(()=>{

document.getElementById("rewardText").innerText =
"+" + currentReward;

document.getElementById("popup").style.display =
"flex";

},5200);

}

function premiumSpin(){

currentReward = 1000;

rotation += 5000;

canvas.style.transform =
`rotate(${rotation}deg)`;

setTimeout(()=>{

document.getElementById("rewardText").innerText =
"+" + currentReward;

document.getElementById("popup").style.display =
"flex";

},5200);

}

function claimReward(){

let coin =
parseInt(document.getElementById("coin").innerText);

coin += currentReward;

document.getElementById("coin").innerText =
coin;

document.getElementById("popup").style.display =
"none";

}

function claimX2(){

let coin =
parseInt(document.getElementById("coin").innerText);

coin += currentReward * 2;

document.getElementById("coin").innerText =
coin;

document.getElementById("popup").style.display =
"none";

}

</script>

</body>
</html>
