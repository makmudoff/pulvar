<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login və Oyun</title>
<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
  margin-top: 40px;
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

.input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.text {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

.row {
  display: flex;
  align-items: center;
  margin-top: 15px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 15px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.login-btn {
  background: #ff3b00;
  color: white;
}

.register-btn {
  background: white;
  color: #ff3b00;
  border: 2px solid #ff3b00;
}
a {
  text-decoration: none;
  color: #ff3b00;
}
</style>
</head>
<body>

<div class="container" id="container">
<!-- JS ilə doldurulacaq -->
</div>

<script>
// Users və cari istifadəçi
let users = [];
let currentUser = null;

// Oyun kodları və balanslar
const codeMap = {
  "12-m": 1,
  "78-m": 5,
  "120-m": 10
};

// Başlanğıc Login səhifəsi
const container = document.getElementById('container');

function showLogin() {
  container.innerHTML = `
<h2>Daxil ol</h2>
<form id="loginForm">
  <input class="input" id="loginPhone" placeholder="Mobil nömrə/Üzv Nömrəsi" required>
  <input class="input" type="password" id="loginPassword" placeholder="Şifrə" required>
  <div class="row">
    <input type="checkbox" id="rememberMe">
    <span style="margin-left:10px;">Məni xatırla</span>
  </div>
  <p class="text"><a href="#" id="forgotPass">Şifrəni unutmusunuz?</a></p>
  <button class="btn login-btn" type="submit">DAXİL OL</button>
</form>
<button class="btn register-btn" id="goRegister">QEYDİYYATDAN KEÇ</button>
<div id="message" class="text"></div>
`;
}

showLogin();

// Email yoxlama
function isValidEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

// Qeydiyyat səhifəsi
function showRegister() {
  container.innerHTML = `
<h2>Qeydiyyat</h2>
<form id="registerForm">
  <input class="input" id="regPhone" placeholder="Mobil nömrə/Üzv Nömrəsi" required>
  <input class="input" id="regEmail" placeholder="Email" required>
  <input class="input" type="password" id="regPassword" placeholder="Şifrə" required>
  <button class="btn login-btn" type="submit">QEYDİYYATDAN KEÇ</button>
</form>
<button class="btn register-btn" id="backLogin">GERİ DAXİL OL</button>
<div id="message" class="text"></div>
`;
}

// Event listenerlər
document.addEventListener('click', (e) => {
  if (e.target.id === 'goRegister') showRegister();
  if (e.target.id === 'backLogin') showLogin();
});

// Form submitları
document.addEventListener('submit', (e) => {
  e.preventDefault();
  
  // Qeydiyyat
  if (e.target.id === 'registerForm') {
    const phone = document.getElementById('regPhone').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!phone || !email || !password) {
      alert("Bütün sahələri doldurun!");
      return;
    }
    if (!isValidEmail(email)) {
      alert("Email düzgün deyil!");
      return;
    }

    users.push({phone, email, password, balance: 0});
    alert(`Qeydiyyat uğurla başa çatdı!`);
    showLogin();
    return;
  }

  // Login
  if (e.target.id === 'loginForm') {
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const user = users.find(u => u.phone === phone && u.password === password);
    if (!user) { alert("İstifadəçi tapılmadı və ya şifrə səhvdir!"); return; }
    currentUser = user;
    showCodeInput();
    return;
  }
});

// Oyun kodu sorğu səhifəsi
function showCodeInput() {
  container.innerHTML = `
<h2>Oyun Kodunu Daxil Edin</h2>
<input class="input" id="gameCode" placeholder="Oyun kodunu yazın">
<button class="btn login-btn" id="submitCode">Təsdiqlə</button>
<div id="message" class="text"></div>
`;

  document.getElementById('submitCode').onclick = () => {
    const code = document.getElementById('gameCode').value.trim();
    if (!codeMap[code]) {
      alert("Kod düzgün deyil!");
      return;
    }
    currentUser.balance = codeMap[code];
    showGame();
  };
}

// Oyun səhifəsi
function showGame() {
  container.innerHTML = `
<h2>Oyun Balansı: <span id="gameBalance">${currentUser.balance}₼</span></h2>
<p>20 suallıq oyun. Hər sual düzgün cavab +0.20₼, səhv -0.20₼</p>
<div id="questionDiv"></div>
<button class="btn register-btn" id="exitGame" disabled>ÇIXIŞ ET</button>
`;
  startGame();
}

// Oyun sualları
let questionCount = 0;
const totalQuestions = 20;

function startGame() {
  const qDiv = document.getElementById('questionDiv');
  qDiv.innerHTML = '';
  questionCount = 0;

  function nextQuestion() {
    if (questionCount >= totalQuestions) {
      document.getElementById('exitGame').disabled = false;
      alert(`Oyun bitdi! Balansınız: ${currentUser.balance.toFixed(2)}₼`);
      return;
    }
    questionCount++;
    const num1 = Math.floor(Math.random()*10+1);
    const num2 = Math.floor(Math.random()*10+1);
    const answer = num1 + num2;
    qDiv.innerHTML = `
      <p>Sual ${questionCount}: ${num1} + ${num2} = ?</p>
      <input class="input" id="answerInput">
      <button class="btn login-btn" id="submitAnswer">CAVABLA</button>
    `;
    document.getElementById('submitAnswer').onclick = () => {
      const ans = parseInt(document.getElementById('answerInput').value);
      if (ans === answer) currentUser.balance += 0.2;
      else currentUser.balance -= 0.2;
      document.getElementById('gameBalance').innerText = currentUser.balance.toFixed(2) + '₼';
      nextQuestion();
    };
  }
  nextQuestion();
}

// Çıxış buttonu
document.addEventListener('click', (e) => {
  if (e.target.id === 'exitGame') {
    const msg = `WhatsApp mesaji: Mən çıxış etmək istəyirəm! Oyun balansım: ${currentUser.balance.toFixed(2)}₼`;
    alert(msg);
  }
});
</script>

</body>
</html>
