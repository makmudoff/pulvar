<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Pul Qazan Saytı</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}
.container{
    margin-top:50px;
}
input{
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
}
button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}
.hidden{display:none;}
</style>

</head>
<body>

<div class="container" id="loginPage">
    <h2>Giriş</h2>
    <input id="loginUser" placeholder="İstifadəçi adı">
    <input id="loginPass" type="password" placeholder="Parol">
    <button onclick="login()">Daxil ol</button>

    <p onclick="showRegister()" style="cursor:pointer;color:lightblue;">
        Qeydiyyatdan keç
    </p>
</div>

<div class="container hidden" id="registerPage">
    <h2>Qeydiyyat</h2>
    <input id="user" placeholder="İstifadəçi adı">
    <input id="pass" type="password" placeholder="Parol">
    <input id="pass2" type="password" placeholder="Parolu təkrar et">
    <input id="phone" placeholder="Nömrə">
    <input id="email" placeholder="Email">
    <button onclick="register()">Qeydiyyatdan keç</button>
</div>

<div class="container hidden" id="dashboard">
    <h2>Panel</h2>

    <p>Gün ərzində 15-20 AZN qazana bilərsiniz</p>

    <button onclick="verify()">Hesabı təsdiq et</button>

    <h3>Balans: <span id="balans">0.00</span> ₼</h3>

    <button onclick="earn()">Klik et və qazan</button>

    <br><br>
    <button onclick="withdraw()">Pul çıxar</button>

    <br><br>
    <button onclick="copyRef()">Referal linki kopyala</button>
</div>

<script>

let balans = 0;
let clicks = 0;

// səhifə dəyiş
function showRegister(){
    loginPage.classList.add("hidden");
    registerPage.classList.remove("hidden");
}

// qeydiyyat
function register(){
    let u = user.value;
    let p = pass.value;
    let p2 = pass2.value;
    let ph = phone.value;
    let em = email.value;

    if(!u || !p || !p2 || !ph || !em){
        alert("Bütün sahələri doldur!");
        return;
    }

    if(p !== p2){
        alert("Parollar eyni deyil!");
        return;
    }

    alert("Qeydiyyat uğurludur!");

    setTimeout(()=>{
        registerPage.classList.add("hidden");
        dashboard.classList.remove("hidden");
    },3000);
}

// login
function login(){
    loginPage.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

// təsdiq
function verify(){
    alert("Hesabı təsdiq etmək üçün 055-233-48-15 nömrəsinə yazın.\nQiymət: 2 ₼");
}

// qazanc
function earn(){
    if(clicks >= 50){
        alert("Bugün limit doldu!");
        return;
    }

    balans += 0.10;
    clicks++;

    document.getElementById("balans").innerText = balans.toFixed(2);

    alert("0.10₼ balansınıza əlavə olundu");
}

// pul çıxar
function withdraw(){
    if(balans < 10){
        alert("Minimum çıxarış 10₼");
        return;
    }

    alert("Nömrəyə yazın və ID göndərin. Ödəniş 1-3 gün ərzində ediləcək.");
}

// referal
function copyRef(){
    navigator.clipboard.writeText(window.location.href);
    balans += 0.15;
    document.getElementById("balans").innerText = balans.toFixed(2);

    alert("Referal link kopyalandı (+0.15₼)");
}

</script>

</body>
</html>
