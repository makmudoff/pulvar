<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Walk To Earn Sistem</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:340px;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}

.hidden{display:none;}

h2{text-align:center;}

.small{
    font-size:14px;
    opacity:0.8;
    text-align:center;
}
</style>
</head>

<body>

<!-- REGISTER -->
<div class="box" id="registerBox">
<h2>📝 Qeydiyyat</h2>

<input id="regUser" placeholder="İstifadəçi adı">
<input id="regPhone" placeholder="Telefon nömrəsi">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Şifrə">

<button class="green" onclick="register()">Qeydiyyatdan keç</button>

<p class="small">Hesabın var? <a href="#" onclick="showLogin()" style="color:#60a5fa;">Giriş et</a></p>
</div>

<!-- LOGIN -->
<div class="box hidden" id="loginBox">
<h2>🔐 Giriş</h2>

<input id="loginUser" placeholder="İstifadəçi adı">
<input id="loginPass" type="password" placeholder="Şifrə">

<button class="blue" onclick="login()">Giriş et</button>

<p class="small">Hesab yoxdur? <a href="#" onclick="showRegister()" style="color:#60a5fa;">Qeydiyyat</a></p>
</div>

<!-- DASHBOARD -->
<div class="box hidden" id="dashBox">
<h2>🚶 Walk To Earn</h2>

<p>👤 <b id="dUser"></b></p>

<hr>

<p>👣 Addım: <span id="steps">0</span></p>
<p>💰 Coin: <span id="coins">0</span></p>
<p>💵 Balans: <span id="balance">0.00</span> ₼</p>

<button class="green" onclick="addStep()">➕ Addım at</button>
<button class="blue" onclick="autoWalk()">🚶 Avto gediş</button>
<button class="red" onclick="logout()">Çıxış</button>

<p class="small" id="msg">Hazırdır...</p>
</div>

<script>

let steps = 0;
let coins = 0;
let balance = 0;
let interval = null;

// REGISTER
function register(){

    let user = document.getElementById("regUser").value;
    let phone = document.getElementById("regPhone").value;
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    if(!user || !phone || !email || !pass){
        alert("Bütün xanaları doldur!");
        return;
    }

    let data = {user,phone,email,pass};

    localStorage.setItem("user", JSON.stringify(data));

    alert("Qeydiyyat uğurlu oldu!");
    showLogin();
}

// LOGIN
function login(){

    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let data = JSON.parse(localStorage.getItem("user"));

    if(!data){
        alert("Əvvəl qeydiyyatdan keç!");
        return;
    }

    if(user === data.user && pass === data.pass){
        document.getElementById("dUser").innerText = data.user;
        showDash();
    }else{
        alert("Səhv məlumat!");
    }
}

// ADD STEP
function addStep(){
    steps += 1000;
    coins += 10;
    calc();
    updateUI();
    document.getElementById("msg").innerText = "🚶 Gəzirsən...";
}

// AUTO WALK
function autoWalk(){

    if(interval){
        clearInterval(interval);
        interval = null;
        document.getElementById("msg").innerText = "⛔ Dayandırıldı";
        return;
    }

    interval = setInterval(()=>{
        steps += 500;
        coins += 5;
        calc();
        updateUI();
    }, 1000);

    document.getElementById("msg").innerText = "🚶 Avto gediş aktivdir...";
}

// CONVERT
function calc(){

    if(steps >= 100000){
        balance = (steps/100000)*38.62;
    }
    else if(steps >= 50000){
        balance = (steps/50000)*17.89;
    }
    else if(steps >= 10000){
        balance = (steps/10000)*3.65;
    }
    else{
        balance = (steps/10000)*3.65;
    }
}

// UI
function updateUI(){
    document.getElementById("steps").innerText = steps;
    document.getElementById("coins").innerText = coins;
    document.getElementById("balance").innerText = balance.toFixed(2);
}

// LOGOUT
function logout(){
    showLogin();
}

// PAGE CONTROL
function showLogin(){
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("dashBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}

function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
}

function showDash(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("dashBox").classList.remove("hidden");
}

</script>

</body>
</html>
