<!-- STEP 1 -->
<div id="step1">
  <h2>Operator seçin</h2>
  <select id="operator">
    <option>Azercell</option>
    <option>Bakcell</option>
    <option>Nar</option>
  </select>

  <input type="text" id="nomre" placeholder="Nömrə">

  <button onclick="nextStep(2)">DAVAM ET</button>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <h2>Paket seçin</h2>

  <label><input type="radio" name="paket" value="10 GB - 5 AZN"> 10 GB - 5 AZN</label><br>
  <label><input type="radio" name="paket" value="30 GB - 15 AZN"> 30 GB - 15 AZN</label><br>
  <label><input type="radio" name="paket" value="50 GB - 20 AZN"> 50 GB - 20 AZN</label><br>
  <label><input type="radio" name="paket" value="70 GB - 25 AZN"> 70 GB - 25 AZN</label><br>
  <label><input type="radio" name="paket" value="100 GB - 40 AZN"> 100 GB - 40 AZN</label>

  <br><br>
  <button onclick="backStep(1)">GERİ</button>
  <button onclick="showConfirm()">DAVAM ET</button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
  <h2>Təsdiq</h2>

  <p><b>Nömrə:</b> <span id="showNomre"></span></p>
  <p><b>Paket:</b> <span id="showPaket"></span></p>

  <div style="background:#e8fff1;padding:15px;border-radius:10px;margin:15px 0;">
    🎁 Təbriklər! Seçilmiş paket aktivləşdirməyə hazırdır.
  </div>

  <button onclick="backStep(2)">GERİ</button>
  <button onclick="activate()">TƏSDİQLƏ</button>
</div>

<!-- STEP 4 -->
<div id="step4" style="display:none;text-align:center;">
  <h2>⏳ Aktivləşdirilir...</h2>
</div>

<!-- STEP 5 -->
<div id="step5" style="display:none;text-align:center;">
  <h2>✅ Uğurlu!</h2>
  <p>Paket aktivləşdirildi.</p>

  <p><b>Nömrə:</b> <span id="successNomre"></span></p>
  <p><b>Paket:</b> <span id="successPaket"></span></p>
</div>

<script>
function nextStep(step){
  document.querySelectorAll('[id^="step"]').forEach(x=>{
    x.style.display='none';
  });
  document.getElementById('step'+step).style.display='block';
}

function backStep(step){
  nextStep(step);
}

function showConfirm(){

  let paket=document.querySelector('input[name="paket"]:checked');

  if(!paket){
    alert('Paket seçin');
    return;
  }

  document.getElementById('showNomre').innerText=
  document.getElementById('nomre').value;

  document.getElementById('showPaket').innerText=
  paket.value;

  nextStep(3);
}

function activate(){

  let paket=document.querySelector('input[name="paket"]:checked').value;
  let nomre=document.getElementById('nomre').value;

  nextStep(4);

  setTimeout(()=>{

    document.getElementById('successNomre').innerText=nomre;
    document.getElementById('successPaket').innerText=paket;

    nextStep(5);

  },2000);

}
</script>
