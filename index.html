<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
body { font-family: Arial; text-align: center; background:#111; color:white; }
.container { max-width:400px; margin:auto; padding:20px; }
input, button { margin:5px; padding:10px; width:90%; }
.hidden { display:none; }
#wheel {
  margin:20px auto;
  width:220px;
  height:220px;
  border-radius:50%;
  border:5px solid white;
  transition: transform 3s ease-out;
  position: relative;
}
#wheelCanvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}
#pointer {
  width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent;
  border-bottom:30px solid white; margin:-30px auto 0 auto;
}
#topMessage {
  background: #222;
  color: #FFD700;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

<div id="topMessage">🎡 Çarxı fırlatmaq üçün 1₼ əlavə et və şansını sınayaraq qazan!</div>

<div id="login">
<h2>Giriş</h2>
<input id="loginUser" placeholder="İstifadəçi adı">
<input id="loginPass" type="password" placeholder="Şifrə">
<button onclick="login()">Daxil ol</button>
<p>Hesabın yoxdur? <button onclick="showRegister()">Qeydiyyat</button></p>
</div>

<div id="register" class="hidden">
<h2>Qeydiyyat</h2>
<input id="user" placeholder="İstifadəçi adı">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyatdan keç</button>
</div>

<div id="panel" class="hidden">
<h2>Panel</h2>
<p id="balanceText">Balans: 0 ₼</p>

<div id="pointer"></div>
<div id="wheel">
  <canvas id="wheelCanvas"></canvas>
</div>
<button onclick="spin()">Çarxi fırlat</button>

<br><br>
<button onclick="deposit()">Balansı artır</button>
<button onclick="withdraw()">Çıxarış</button>

<p id="msg"></p>
</div>

</div>

<script>
let userData = JSON.parse(localStorage.getItem("userData")) || null;
let balance = 0;
let deg = 0;

function showRegister(){ document.getElementById("login").classList.add("hidden"); document.getElementById("register").classList.remove("hidden"); }
function register(){
  let user = document.getElementById("user").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value.trim();
  if(!user || !email || !pass){ alert("Bütün xanaları doldur!"); return; }
  userData = {user,email,pass}; localStorage.setItem("userData",JSON.stringify(userData)); balance=0;
  alert("Qeydiyyat tamamlandı! Avtomatik daxil oldunuz."); openPanel();
}
function login(){
  let user = document.getElementById("loginUser").value.trim();
  let pass = document.getElementById("loginPass").value.trim();
  if(!userData || user!==userData.user || pass!==userData.pass){ alert("Yanlış məlumat!"); return; }
  openPanel();
}
function openPanel(){ document.getElementById("login").classList.add("hidden"); document.getElementById("register").classList.add("hidden"); document.getElementById("panel").classList.remove("hidden"); updateBalance(); }
function updateBalance(){ document.getElementById("balanceText").innerText="Balans: "+balance+" ₼"; }

// Çarx sektorları: pul sektorları aralıklı
const sectors = [
  {text:"Bəxtini bir daha sına", color:"#777", prize:0},
  {text:"2₼", color:"#FF5733", prize:2},
  {text:"Bəxtini bir daha sına", color:"#888", prize:0},
  {text:"3₼", color:"#33FF57", prize:3},
  {text:"Bəxtini bir daha sına", color:"#999", prize:0},
  {text:"5₼", color:"#3357FF", prize:5},
  {text:"Bəxtini bir daha sına", color:"#AAA", prize:0},
  {text:"7₼", color:"#FF33A6", prize:7},
  {text:"Bəxtini bir daha sına", color:"#BBB", prize:0},
  {text:"Bəxtini bir daha sına", color:"#CCC", prize:0}
];

// Canvas çarx
const canvas=document.getElementById("wheelCanvas"); const ctx=canvas.getContext("2d"); canvas.width=canvas.height=220;
function drawWheel(){
  let startAngle=0; const arc=2*Math.PI/sectors.length;
  sectors.forEach(sec=>{
    ctx.beginPath(); ctx.moveTo(110,110);
    ctx.arc(110,110,110,startAngle,startAngle+arc);
    ctx.fillStyle=sec.color; ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke();
    // text
    ctx.save(); ctx.translate(110,110); ctx.rotate(startAngle+arc/2);
    ctx.textAlign="right"; ctx.fillStyle="#fff"; ctx.font="bold 14px Arial"; ctx.fillText(sec.text,100,5); ctx.restore();
    startAngle+=arc;
  });
}
drawWheel();

function spin(){
  if(balance<=0){ document.getElementById("msg").innerText="Balansınızı artırın!"; return; }
  const sectorIndex=Math.floor(Math.random()*sectors.length);
  const arc=360/sectors.length;
  const randomOffset=Math.random()*arc;
  deg+=360*5+sectorIndex*arc+randomOffset;
  document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
  setTimeout(()=>{
    const win=sectors[sectorIndex].prize;
    if(win>0){ balance+=win; document.getElementById("msg").innerText="Qazandınız: "+win+" ₼"; }
    else{ document.getElementById("msg").innerText="Bəxtini bir daha sına!"; }
    updateBalance();
  },3000);
}

function deposit(){ window.open("https://t.me/carxfirla?text=Salam%20Men%20balans%20artirmaq%20isdeyirem%20zehmet%20olmasa%20kart%20gonderin"); }
function withdraw(){ if(balance<50){ alert("Minimum 50₼ lazımdır!"); return; } window.open("https://t.me/carxfirla?text=Salam%20Men%20cixaris%20etmek%20isdeyirem%20balansim%2050₼%20olubdur"); }
</script>

</body>
</html>
