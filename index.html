<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0b0b0b;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:0;
    }

    .overlay{
      width:100%;
      min-height:100vh;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding-top:90px;
    }

    .login-box{
      width:100%;
      max-width:430px;
      background:#fff;
      border-radius:28px 28px 0 0;
      padding:22px 18px 28px;
      position:relative;
      min-height:78vh;
    }

    .close{
      position:absolute;
      right:18px;
      top:18px;
      font-size:24px;
      color:#777;
      cursor:pointer;
      border:none;
      background:none;
    }

    .title{
      font-size:30px;
      font-weight:700;
      color:#111;
      margin-bottom:18px;
    }

    .tabs{
      display:flex;
      gap:10px;
      margin-bottom:16px;
    }

    .tab{
      flex:1;
      height:56px;
      border:none;
      border-radius:18px;
      background:#efefef;
      font-size:18px;
      font-weight:600;
      color:#111;
      cursor:pointer;
    }

    .tab.active{
      background:#2f73f6;
      color:#fff;
    }

    .field{
      width:100%;
      height:62px;
      border:none;
      outline:none;
      background:#f1f1f1;
      border-radius:18px;
      padding:0 18px;
      font-size:18px;
      color:#111;
      margin-bottom:14px;
    }

    .field::placeholder{
      color:#8c8c8c;
    }

    .forgot{
      display:inline-block;
      margin:4px 0 18px;
      color:#2f73f6;
      text-decoration:none;
      font-size:16px;
      font-weight:500;
    }

    .login-btn{
      width:100%;
      height:64px;
      border:none;
      border-radius:18px;
      background:#56b653;
      color:#fff;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      margin-bottom:22px;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:14px;
      color:#777;
      font-size:18px;
      margin-bottom:20px;
    }

    .divider::before,
    .divider::after{
      content:"";
      flex:1;
      height:1px;
      background:#ddd;
    }

    .socials{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:26px;
    }

    .social{
      width:52px;
      height:52px;
      border-radius:14px;
      border:none;
      font-size:22px;
      cursor:pointer;
      color:#fff;
    }

    .g{background:#f1f1f1;color:#444;}
    .vk{background:#3b82f6;}
    .tg{background:#3aa7e8;}
    .mail{background:#3268f2;}
    .ya{background:#ef4444;}
    .ok{background:#f59e0b;}
    .st{background:#0f172a;}

    .bottom-text{
      text-align:center;
      color:#666;
      font-size:18px;
      line-height:1.5;
    }

    .bottom-text a{
      color:#2f73f6;
      text-decoration:none;
      font-weight:700;
      display:block;
      margin-top:6px;
      font-size:18px;
    }

    #emailFields{
      display:none;
    }

    @media (max-width:480px){
      .overlay{
        padding-top:82px;
      }

      .login-box{
        max-width:100%;
        border-radius:26px 26px 0 0;
        min-height:80vh;
      }

      .title{
        font-size:28px;
      }

      .tab{
        height:54px;
        font-size:17px;
      }

      .field{
        height:60px;
        font-size:17px;
      }

      .login-btn{
        height:62px;
        font-size:19px;
      }

      .social{
        width:48px;
        height:48px;
        font-size:20px;
      }
    }
