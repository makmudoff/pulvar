<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Analiz Paneli</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.progress{
    width:100%;
    height:25px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:#25D366;
}

#percent{
    text-align:center;
    margin-top:10px;
}

#status{
    text-align:center;
    margin-top:15px;
    color:#facc15;
}

#result{
    text-align:center;
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h1>Whastap izleme Analiz Paneli</h1>

<input type="text" placeholder="Qarşı tərəfin adı">

<input type="text" placeholder="Qarşı tərəfin nömrəsi">

<input type="text" placeholder="Sizin adınız">

<input type="text" placeholder="Sizin nömrəniz">

<button onclick="startDemo()">Analizə Başla</button>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<h3 id="percent"></h3>

<p id="status"></p>

<p id="result"></p>

</div>

<script>

function start(){

document.getElementById("progress").style.display="block";

document.getElementById("status").innerHTML=
"⚠️ Saytı tərk etməyin, proses davam edir...";

document.getElementById("result").innerHTML="";

let percent=0;

let timer=setInterval(function(){

percent++;

document.getElementById("bar").style.width=percent+"%";
document.getElementById("percent").innerHTML=percent+"%";

if(percent>=100){

clearInterval(timer);

document.getElementById("status").innerHTML="";

document.getElementById("result").innerHTML=
"❌ Xəta baş verdi. Yenidən cəhd edin.";

}

},1000);

}
</script>

</body>
</html>
