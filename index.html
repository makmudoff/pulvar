<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Siqnal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#071433;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
    background:#182544;
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    color:#00ff99;
    margin-bottom:15px;
    font-size:42px;
}

.info{
    margin-top:20px;
    text-align:left;
    line-height:1.8;
    color:#dbe4ff;
    font-size:15px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:20px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#00ff99;
    color:black;
    font-weight:bold;
    font-size:18px;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#message{
    margin-top:15px;
    font-weight:bold;
}

.telegram{
    display:block;
    margin-top:25px;
    background:#229ED9;
    color:white;
    text-decoration:none;
    padding:14px;
    border-radius:15px;
    font-weight:bold;
    transition:0.3s;
}

.telegram:hover{
    opacity:0.8;
}

.success{
    color:#00ff99;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="box">

<h1>✈️ Aviator Siqnal</h1>

<div class="info">
🔥 Premium Aviator Siqnalları Aktivdir<br><br>

📈 Yüksək dəqiqlikli siqnallar<br>
⚡ Canlı və sürətli nəticələr<br>
🔐 Giriş yalnız xüsusi kod ilə mümkündür<br><br>

💸 Gündəlik aktiv istifadəçilər qazanc əldə edir<br>
🚀 Sistəmə qoşul, siqnalları izlə və oyunu daha rahat idarə et
</div>

<input type="password" id="kod" placeholder="Kodu daxil et">

<button onclick="yoxla()">Giriş Et</button>

<div id="message"></div>

<a class="telegram" href="https://t.me/kenrrry" target="_blank">
📲 Adminlə Əlaqə Saxla
</a>

</div>

<script>

let duzgunKod = "AVIATOR2026";

function yoxla(){

    let daxilEdilenKod = document.getElementById("kod").value;
    let mesaj = document.getElementById("message");

    if(daxilEdilenKod === duzgunKod){

        mesaj.innerHTML = "✅ Giriş uğurludur!";
        mesaj.className = "success";

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 1500);

    }else{

        mesaj.innerHTML = "❌ Kod yanlışdır! Giriş qadağandır.";
        mesaj.className = "error";
    }

}

</script>

</body>
</html>
