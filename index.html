<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
body { font-family: Arial; text-align:center; background:#111; color:white; margin:0; padding:0; }
.container { max-width:400px; margin:auto; padding:20px; }
button { margin:10px auto; padding:12px; width:90%; font-size:18px; border-radius:8px; border:none; display:block; cursor:pointer; background:#333; color:white; transition:0.3s; }
button:hover { background:#555; }
#wheel {
  margin:20px auto;
  width:220px;
  height:220px;
  border-radius:50%;
  background: conic-gradient(
    black 0deg 180deg,
    black 180deg 360deg
  );
  border:5px solid white;
  position: relative;
  transition: transform 3s ease-out;
}
.wheel-text {
  position:absolute;
  width:50%;
  height:50%;
  top:25%;
  left:25%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:20px;
  color:white;
  transform-origin:center center;
}
#pointer {
  width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent;
  border-bottom:30px solid white; margin:-30px auto 0 auto;
}
#msgSpin { margin-top:15px; font-weight:bold; color:#FFD700; }
</style>
</head>
<body>

<div class="container">
<h2>Çarx Oyunu</h2>
<div id="pointer"></div>
<div id="wheel">
  <div class="wheel-text" style="transform:rotate(45deg)">20 ₼</div>
  <div class="wheel-text" style="transform:rotate(225deg)">BOŞ</div>
</div>
<button onclick="spin()">Çarxi fırlat</button>
<p id="msgSpin"></p>
</div>

<script>
let deg = 0;

function spin(){
  // 180-360 arasında təsadüfi fırlatma, amma həmişə BOŞ çıxır
  deg += 360*5 + Math.floor(Math.random()*180 + 180);
  document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
  setTimeout(()=>{
    document.getElementById("msgSpin").innerText="BOŞ düşdü! Pul qazanmırsınız.";
  },3000);
}
</script>

</body>
</html>
