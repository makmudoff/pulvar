<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Login Sistem</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
}

button {
    width: 95%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.link {
    color: #38bdf8;
    cursor: pointer;
    font-size: 14px;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<!-- Welcome -->
<div id="welcome" class="box">
    <h2>Xoş gəlmisiniz</h2>
    <button onclick="goLogin()">Davam et</button>
</div>

<!-- Login -->
<div id="login" class="box hidden">
    <h2>Daxil ol</h2>
    <input type="text" id="lUser" placeholder="İstifadəçi adı">
    <input type="password" id="lPass" placeholder="Parol">
    <button onclick="login()">Daxil ol</button>
    <p id="loginErr" style="color:red;"></p>

    <p class="link" onclick="goRegister()">Qeydiyyat et</p>
</div>

<!-- Register -->
<div id="register" class="box hidden">
    <h2>Qeydiyyat</h2>
    <input type="text" id="rUser" placeholder="İstifadəçi adı">
    <input type="password" id="rPass" placeholder="Parol">
    <input type="password" id="rPass2" placeholder="Parolu təkrar et">
    <input type="text" id="phone" placeholder="Telefon nömrəsi">

    <button onclick="register()">Qeydiyyatdan keç</button>
    <p id="regErr" style="color:red;"></p>

    <p class="link" onclick="goLogin()">Geri dön</p>
</div>

<!-- Panel -->
<div id="panel" class="box hidden">
    <h2>Panel</h2>

    <p style="color:yellow;">
    Hesabınızı təsdiq etmək üçün WhatsApp: 055-233-48-15  
    1₼ ödəniş edin və aktiv edin  
    1 referall = 0.35₼
    </p>

    <button onclick="toggle('withdraw')">Pul çəkmək</button>
    <button onclick="toggle('ref')">Referall</button>

    <div id="withdraw" class="hidden">
        <p>Minimum çıxarış: 5₼</p>
    </div>

    <div id="ref" class="hidden">
        <p>Referal link: example.com/ref123</p>
    </div>
</div>

<script>

function goLogin(){
    hideAll();
    document.getElementById("login").classList.remove("hidden");
}

function goRegister(){
    hideAll();
    document.getElementById("register").classList.remove("hidden");
}

function hideAll(){
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("login").classList.add("hidden");
    document.getElementById("register").classList.add("hidden");
}

function register(){
    let u = rUser.value;
    let p = rPass.value;
    let p2 = rPass2.value;

    if(p !== p2){
        regErr.innerText = "Parollar eyni deyil!";
        return;
    }

    localStorage.setItem("user", JSON.stringify({u,p}));

    hideAll();
    document.getElementById("panel").classList.remove("hidden");
}

function login(){
    let saved = JSON.parse(localStorage.getItem("user"));
    if(!saved || saved.u !== lUser.value || saved.p !== lPass.value){
        loginErr.innerText = "Belə istifadəçi yoxdur!";
        return;
    }

    hideAll();
    document.getElementById("panel").classList.remove("hidden");
}

function toggle(id){
    document.getElementById(id).classList.toggle("hidden");
}

</script>

</body>
</html>
