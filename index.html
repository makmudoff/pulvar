<!DOCTYPE html>
<html>
<head>
  <title>Demo Casino</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:#0ff;
      text-align:center;
    }

    .screen{ display:none; padding-top:80px; }
    .login{ display:block; }

    .card{
      width:340px;
      margin:auto;
      background:#111;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 20px #0ff;
    }

    input,button{
      padding:10px;
      margin:6px;
      border-radius:8px;
      border:none;
    }

    button{
      background:#0ff;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }

    .wheel{
      width:140px;
      height:140px;
      border-radius:50%;
      border:8px solid #0ff;
      margin:20px auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      transition:transform 2s ease;
      box-shadow:0 0 20px #0ff;
    }

    #game { display:none; }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login" class="screen login">
  <div class="card">
    <h2>Giriş</h2>
    <input id="username" placeholder="İstifadəçi adı">
    <input id="code" placeholder="Kod">
    <br>
    <button onclick="login()">Daxil ol</button>
  </div>
</div>

<!-- 🎮 GAME -->
<div id="game" class="screen">
  <div class="card">

    <h2>Lucky Spin</h2>

    <p>User: <span id="userShow"></span></p>
    <p>Balans: <span id="balance">10</span> ₼</p>

    <div class="wheel" id="wheel">SPIN</div>

    <button id="spinBtn" onclick="spin()">Spin</button>

    <p id="result"></p>

  </div>
</div>

<script>

let balance = 10;

const codes = ["adep","kala","yera","jety","jiko"];

function login(){

  let user = document.getElementById("username").value;
  let code = document.getElementById("code").value.trim();

  if(codes.includes(code)){
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("userShow").innerText = user || "User";
  } else {
    alert("Yanlış kod!");
  }
}

function spin(){

  let button = document.getElementById("spinBtn");

  if(balance <= 0){
    document.getElementById("result").innerText =
    "Balansınızda məbləğ bitdi. Yenidən inşAllah qazanarsınız";
    button.disabled = true;
    button.style.opacity = "0.5";
    return;
  }

  balance -= 1;

  let wheel = document.getElementById("wheel");
  let result = document.getElementById("result");

  let deg = Math.floor(Math.random()*3600);
  wheel.style.transform = "rotate("+deg+"deg)";

  setTimeout(()=>{

    let r = Math.random();
    let win;

    if(r < 0.60){
      win = 0;
    }
    else if(r < 0.85){
      win = Math.floor(Math.random()*10)+1;
    }
    else if(r < 0.97){
      win = Math.floor(Math.random()*50)+10;
    }
    else {
      win = 100;
    }

    balance += win;

    document.getElementById("balance").innerText = balance + " ₼";

    if(win === 0){
      result.innerText = "Boş çıxdı";
    } else {
      result.innerText = "Qazandın " + win + " ₼";
    }

    // 🔒 BALANS YENƏ YOXDURSA OYUN DAYANSIN
    if(balance <= 0){
      result.innerText =
      "Balansınızda məbləğ bitdi. Yenidən inşAllah qazanarsınız";

      button.disabled = true;
      button.style.opacity = "0.5";
    }

  },2000);
}

</script>

</body>
</html>
