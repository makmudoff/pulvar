<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çətin Tapmaca Marafonu</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; }
header { background:#000; padding:20px; text-align:center; }
header h1 { color:#ffcc00; margin:0; }
main { padding:20px; max-width:700px; margin:auto; }
section { margin-bottom:40px; }
input[type="text"] { padding:10px; width:70%; border-radius:5px; border:none; margin-right:10px; }
#result { margin-top:15px; font-size:1.2em; }
#status { font-size:1.2em; margin-bottom:15px; }
footer { background:#000; padding:20px; text-align:center; color:#aaa; }
</style>
</head>
<body>

<header>
<h1>Çətin Tapmaca Marafonu</h1>
<p>Hər tapmacanı düzgün cavablayın və bonus qazanın!</p>
</header>

<main>
<section id="status-section">
<p id="status">Tapmaca 1 / 10 | Can: 3 | Xal: 0</p>
</section>

<section id="riddle-section">
<h2 id="question">Tapmaca yüklənir...</h2>
<input type="text" id="answer" placeholder="Cavabı yazın">
<p id="result"></p>
</section>
</main>

<footer>
<p>&copy; 2026 Tapmaca Saytı</p>
</footer>

<script>
// Çətin tapmacalar siyahısı
const riddles = [
  {question: "Gecə gəlib, gündüz gedir, amma heç ayaq izi qoymur. Nədir?", answer: "kölgə"},
  {question: "Hər şeyə sahibdir, amma heç nəyi yox. Nədir?", answer: "boşluq"},
  {question: "Hər gün gəlib gedir, amma heç bir yerdə dayanmaz. Nədir?", answer: "zaman"},
  {question: "Qışda ağ, yayda yaşıl, ağacdan asılı. Nədir?", answer: "yarpaq"},
  {question: "Məni qırarsan amma mən ağlamaram. Nədir?", answer: "yumurta"},
  {question: "Daşım var amma hərəkət edə bilmirəm. Nədir?", answer: "dağ"},
  {question: "Bütün günü suda olur, amma yaş olmur. Nədir?", answer: "balıq"},
  {question: "Hər yerdə var, amma toxunmaq olmaz. Nədir?", answer: "hava"},
  {question: "Səni izləyir amma heç səsini çıxarmır. Nədir?", answer: "gölge"},
  {question: "Bütün evləri gəzər amma heç yerdə qalmır. Nədir?", answer: "yol"}
];

let current = 0;
let score = 0;
let lives = 3;

// Tapmacanı göstər
function loadRiddle(){
  if(current < riddles.length){
    document.getElementById("question").textContent = riddles[current].question;
    document.getElementById("answer").value = "";
    document.getElementById("result").textContent = "";
    updateStatus();
  } else {
    document.getElementById("question").textContent = "Təbriklər! Siz bütün tapmacaları tamamladınız!";
    document.getElementById("answer").style.display = "none";
    document.getElementById("result").textContent = "Simulyasiya olaraq siz bonus qazandınız!";
    document.getElementById("result").style.color = "#ffcc00";
  }
}

// Status panelini yenilə
function updateStatus(){
  document.getElementById("status").textContent = `Tapmaca ${current+1} / ${riddles.length} | Can: ${lives} | Xal: ${score}`;
}

// Cavabı yoxla
function checkAnswer(){
  const userAns = document.getElementById("answer").value.toLowerCase().trim();
  const correctAns = riddles[current].answer.toLowerCase();
  const result = document.getElementById("result");

  if(userAns === correctAns){
    score += 1;
    current += 1;
    result.textContent = "Düzdür! Növbəti tapmaca avtomatik gəlir...";
    result.style.color = "#ffcc00";
    setTimeout(loadRiddle, 500); // avtomatik növbəti tapmaca
  } else {
    lives -= 1;
    if(lives <= 0){
      result.textContent = "Oyun bitdi! Canlarınız qurtardı.";
      result.style.color = "#ff5555";
      document.getElementById("answer").style.display = "none";
    } else {
      result.textContent = `Yanlış cavab! Canınızdan 1 itdi. Qalan can: ${lives}`;
      result.style.color = "#ff5555";
    }
    updateStatus();
  }
}

// Enter basanda da yoxlamaq
document.getElementById("answer").addEventListener("keydown", function(e){
  if(e.key === "Enter") checkAnswer();
});

// İlk tapmacanı yüklə
loadRiddle();
</script>

</body>
</html>
