<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tapmaca Tap Real Pul Qazan!</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:20px;
}
.container {
  width:100%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-sizing:border-box;
  text-align:center;
}
h1{color:#ff3b00; margin-bottom:20px;}
.input{width:100%; padding:15px; margin-top:15px; border-radius:15px; border:1px solid #ccc; font-size:16px;}
.btn{width:100%; padding:15px; margin-top:20px; border-radius:15px; border:none; font-size:18px; cursor:pointer;}
.login-btn{background:#ff3b00; color:white;}
.register-btn{background:white; color:#ff3b00; border:2px solid #ff3b00;}
.hidden{display:none;}
#codeDiv,#gameDiv,#withdrawDiv{margin-top:20px;}
#recentWinners{font-size:13px; color:#333; margin-top:10px; text-align:left;}
#gameBalance{font-weight:bold;}
#questionDiv{margin-top:10px; text-align:left;}
.text{font-size:14px; color:#666; margin-top:10px; text-align:left;}
#getCodeLink{color:#ff3b00; cursor:pointer; text-decoration:underline; margin-top:5px; display:block;}
</style>
</head>
<body>

<div class="container">

<h1>Tapmaca Tap Real Pul Qazan!</h1>

<!-- Login Bölməsi -->
<div id="loginDiv">
  <input class="input" id="loginPhone" placeholder="Mobil nömrə/Üzv Nömrəsi">
  <input class="input" type="password" id="loginPassword" placeholder="Şifrə">
  <button class="btn login-btn" id="loginBtn">DAXİL OL</button>
  <button class="btn register-btn" id="goToRegisterBtn">QEYDİYYATDAN KEÇ</button>
</div>

<!-- Qeydiyyat Bölməsi -->
<div id="registerDiv" class="hidden">
  <input class="input" id="regPhone" placeholder="Mobil nömrə/Üzv Nömrəsi">
  <input class="input" id="regEmail" placeholder="Email">
  <input class="input" type="password" id="regPassword" placeholder="Şifrə">
  <button class="btn login-btn" id="registerBtn">QEYDİYYATDAN KEÇ</button>
  <button class="btn register-btn" id="backToLoginBtn">GERİ DAXİL OL</button>
</div>

<!-- Kod Bölməsi -->
<div id="codeDiv" class="hidden">
  <input class="input" id="gameCodeInput" placeholder="Oyun kodunu yazın">
  <button class="btn login-btn" id="verifyCodeBtn">Kod təsdiqlə</button>
  <span id="getCodeLink">Kodu buradan əldə edin!</span>
</div>

<!-- Oyun Bölməsi -->
<div id="gameDiv" class="hidden">
  <h2>Oyun Balansı: <span id="gameBalance">0₼</span></h2>
  <p>20 çətin tapmaca. Hər cavab +0.20₼ / -0.20₼</p>
  <div id="questionDiv"></div>
  <button class="btn register-btn" id="exitBtn" disabled>Çıxarış et</button>
  <p id="balanceNotice" style="color:red; font-weight:bold;"></p>
</div>

<!-- Çıxarış Bölməsi -->
<div id="withdrawDiv" class="hidden">
  <input class="input" id="withdrawAmount" placeholder="Çıxarış məbləğini yazın">
  <button class="btn login-btn" id="withdrawBtn">Çıxarış et</button>
  <p style="margin-top:10px; font-weight:bold;">Balansı artır</p>
  <input class="input" id="addBalanceAmount" placeholder="Məbləğ əlavə edin">
  <button class="btn login-btn" id="addBalanceBtn">Doldurmaq</button>
</div>

<!-- Qeydiyyat Statistikası -->
<div class="text" id="registerStats">
  Qeydiyyat Sayı: <span id="registerCount">3638</span>
  <div id="recentWinners">
    <strong>Son çıxarış edənlər:</strong>
    <ul id="winnersList"></ul>
  </div>
</div>

</div>

<script>
// Istifadeci listi
let users=[], currentUser=null;
const codeMap={"12-m":1,"78-m":5,"120-m":10};
let totalQuestions=20, questionCount=0;
const puzzles=[
{q:"Mənim bir qardaşım var, amma mənim qardaşımın heç qardaşı yoxdur. Mən kiməm?", a:"Mən özüm"},
{q:"Hansı ay 28 gündən az deyil?", a:"Bütün aylar"},
{q:"Bir otaqda 4 künc var, hər küncdə 1 pişik, hər pişik 3 pişik görür. Otaqda neçə pişik var?", a:"4"},
{q:"Saat 3-də kölgə hansı tərəfə düşür?", a:"Şərq"},
{q:"Hansı söz səhv yazılıb?", a:"Səhv"},
{q:"Əgər sən mənim atamın oğluna baxırsansa, mən kiməm?", a:"Oğlum"},
{q:"Bir evdə 3 otaq var, hər otaqda 3 pişik, hər pişik 3 siçan. Cəmi neçə siçan var?", a:"27"},
{q:"Hansı meyvəni bölmək olmaz?", a:"Özünü"},
{q:"Bir qatar 60 km/saat sürətlə gedir, 1 saat sonra neçə km gedəcək?", a:"60"},
{q:"Hansını içmək olmaz: su, çay, hava?", a:"Hava"},
{q:"2 + 2 x 2 = ?", a:"6"},
{q:"Hər kəs onu görür amma heç kim onu tuta bilmir. Nədir?", a:"Gölge"},
{q:"Suda nə batmaz?", a:"Balon"},
{q:"Mən qaçıram amma yerimdə qalıram, mən kiməm?", a:"Saat"},
{q:"Bir otaqda 5 insan, hər biri bir-birinə əl verir. Neçə əl sıxışma var?", a:"10"},
{q:"Hansı hərf əlifbada yoxdur?", a:"Səhv"},
{q:"Qışda yağan ağ su?", a:"Qar"},
{q:"Bütün gün gedir amma heç getmir. Nədir?", a:"Saat"},
{q:"Hansı heyvan iki ayağı ilə yatır?", a:"İnsan"},
{q:"Hər kəs onu istifadə edir amma heç kim ona baxmır. Nədir?", a:"Telefon"}
];

// DOM
const loginDiv=document.getElementById('loginDiv');
const registerDiv=document.getElementById('registerDiv');
const codeDiv=document.getElementById('codeDiv');
const gameDiv=document.getElementById('gameDiv');
const withdrawDiv=document.getElementById('withdrawDiv');
const questionDiv=document.getElementById('questionDiv');
const exitBtn=document.getElementById('exitBtn');
const gameBalanceSpan=document.getElementById('gameBalance');
const registerCountSpan=document.getElementById('registerCount');
const winnersList=document.getElementById('winnersList');
const getCodeLink=document.getElementById('getCodeLink');
const balanceNotice=document.getElementById('balanceNotice');

// Funksiyalar
function showDiv(div){
  loginDiv.classList.add('hidden'); 
  registerDiv.classList.add('hidden'); 
  codeDiv.classList.add('hidden'); 
  gameDiv.classList.add('hidden'); 
  withdrawDiv.classList.add('hidden'); 
  div.classList.remove('hidden');
}
function isValidEmail(email){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);}

// Login / Register
document.getElementById('goToRegisterBtn').onclick=()=>showDiv(registerDiv);
document.getElementById('backToLoginBtn').onclick=()=>showDiv(loginDiv);

document.getElementById('registerBtn').onclick=()=>{
  const phone=document.getElementById('regPhone').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const password=document.getElementById('regPassword').value;
  if(!phone||!email||!password){alert("Bütün sahələri doldurun!"); return;}
  if(!isValidEmail(email)){alert("Email düzgün deyil!"); return;}
  users.push({phone,email,password,balance:0});
  registerCount++;
  registerCountSpan.innerText=registerCount;
  alert("Qeydiyyat uğurla başa çatdı!");
  showDiv(loginDiv);
};

document.getElementById('loginBtn').onclick=()=>{
  const phone=document.getElementById('loginPhone').value.trim();
  const password=document.getElementById('loginPassword').value;
  const user=users.find(u=>u.phone===phone && u.password===password);
  if(!user){alert("İstifadəçi tapılmadı və ya şifrə səhvdir!"); return;}
  currentUser=user;
  showDiv(codeDiv);
};

// Kod təsdiqlə
document.getElementById('verifyCodeBtn').onclick=()=>{
  const code=document.getElementById('gameCodeInput').value.trim();
  if(!codeMap[code]){alert("Kod səhvdir!"); return;}
  currentUser.balance=codeMap[code]; // Başlanğıc balans
  showDiv(gameDiv);
  gameBalanceSpan.innerText=currentUser.balance.toFixed(2)+'₼';
  questionCount=0;
  exitBtn.disabled=true;
  balanceNotice.innerText="";
  nextPuzzle();
};

// Kod əldə et linki
getCodeLink.onclick=()=>{
  const message="Salam, mən oyun kodu istəyirəm!";
  const phone="994552334815";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,'_blank');
};

// Oyun funksiyaları
function nextPuzzle(){
  if(currentUser.balance<=0){
    balanceNotice.innerText="Balansda kifayət qədər məbləğ yoxdur!";
    exitBtn.disabled=false;
    return;
  }
  if(questionCount>=totalQuestions){
    alert(`Oyun bitdi! Balansınız: ${currentUser.balance.toFixed(2)}₼`);
    exitBtn.disabled=false;
    return;
  }
  const puzzle=puzzles[questionCount];
  questionDiv.innerHTML=`<p>Sual ${questionCount+1}: ${puzzle.q}</p>
  <input class="input" id="answerInput">
  <button class="btn login-btn" id="submitAnswerBtn">CAVABLA</button>`;
  document.getElementById('submitAnswerBtn').onclick=()=>{
    const ans=document.getElementById('answerInput').value.trim().toLowerCase();
    if(ans===puzzle.a.toLowerCase()){currentUser.balance+=0.2; alert("Düzgün cavab! +0.20₼");}
    else{currentUser.balance-=0.2; alert(`Səhv! -0.20₼. Düzgün cavab: ${puzzle.a}`);}
    gameBalanceSpan.innerText=currentUser.balance.toFixed(2)+'₼';
    questionCount++;
    nextPuzzle();
  };
}

// Çıxarış et
exitBtn.onclick=()=>showDiv(withdrawDiv);

document.getElementById('withdrawBtn').onclick=()=>{
  const amount=document.getElementById('withdrawAmount').value.trim();
  if(!amount || isNaN(amount)){alert("Düzgün məbləğ yazın!"); return;}
  const message=`Salam, mən çıxarış etmək istəyirəm! Balansım: ${currentUser.balance.toFixed(2)}₼ Məbləğ: ${amount}₼`;
  const phone="994552334815";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,'_blank');
};

// Balansı artır
document.getElementById('addBalanceBtn').onclick=()=>{
  const amount=document.getElementById('addBalanceAmount').value.trim();
  if(!amount || isNaN(amount)){alert("Düzgün məbləğ yazın!"); return;}
  const message=`Salam, mən balansı artırmaq istəyirəm! Məbləğ: ${amount}₼`;
  const phone="994552334815";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,'_blank');
};

// Qeydiyyat sayı avtomatik artım
let registerCount=3638;
setInterval(()=>{registerCount++; registerCountSpan.innerText=registerCount;},90000);

// Son çıxarış edənlər
const sampleNames=["Aysel","Ferid","Leqeb","Nijat","Elvin","Rufat","Samir","Gunel","Leyla","Farid","Ramin","Nurlan","Aysu","Cavid","Turan","Rafael","Sevda","Kamran","Rauf","Sahin"];
function updateWinners(){
  winnersList.innerHTML="";
  let usedIndices=[];
  for(let i=0;i<10;i++){
    let idx; do{idx=Math.floor(Math.random()*sampleNames.length);}while(usedIndices.includes(idx));
    usedIndices.push(idx);
    let amount=[12,17,38,73,93,19][Math.floor(Math.random()*6)];
    let li=document.createElement("li");
    li.innerText=sampleNames[idx]+" - "+amount+"₼";
    winnersList.appendChild(li);
  }
}
setInterval(updateWinners,5500);
updateWinners();
</script>

</body>
</html>
