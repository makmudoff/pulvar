<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulvar Xəbər</title>
</head>

<body style="margin:0; background:#020617; color:white; font-family:sans-serif;">

<h2 style="text-align:center; padding:20px;">🇦🇿 Azərbaycan Xəbərləri</h2>

<div id="news" style="padding:10px;"></div>

<script>

function getImage(item){
  if(item.thumbnail) return item.thumbnail;

  if(item.enclosure && item.enclosure.link) return item.enclosure.link;

  if(item.description){
    let match = item.description.match(/<img.*?src="(.*?)"/);
    if(match) return match[1];
  }

  return "https://via.placeholder.com/600x300?text=Xeber";
}

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://report.az/rss/")
.then(res => res.json())
.then(data => {

let html = "";

data.items.slice(0,8).forEach(item => {

let img = getImage(item);

html += `
<div style="
  background:#0f172a;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
">

<img src="${img}" 
style="width:100%; height:200px; object-fit:cover;">

<div style="padding:10px;">
<a href="${item.link}" target="_blank" style="color:white; text-decoration:none;">
${item.title}
</a>
</div>

</div>
`;

});

document.getElementById("news").innerHTML = html;

})
.catch(()=>{
document.getElementById("news").innerHTML="Xəbərlər yüklənmədi ❌";
});

</script>

</body>
</html>
