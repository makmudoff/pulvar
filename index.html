<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
body { font-family: Arial; text-align: center; background:#111; color:white; }
.container { max-width:400px; margin:auto; padding:20px; }
input, button { margin:5px; padding:10px; width:90%; }
.hidden { display:none; }

/* Çarx */
#wheel {
  margin:20px auto;
  width:220px;
  height:220px;
  border-radius:50%;
  border:5px solid white;
  background: conic-gradient(
    #2c2c2c 0deg 45deg,     /* Boş / Bəxtini sına */
    #2c2c2c 45deg 90deg,    /* Boş / Bəxtini sına */
    yellow 90deg 135deg,     /* Pul 1₼ */
    #2c2c2c 135deg 180deg,   /* Boş / Bəxtini sına */
    green 180deg 225deg,     /* Pul 5₼ */
    #2c2c2c 225deg 270deg,   /* Boş / Bəxtini sına */
    red 270deg 315deg,       /* Pul 7₼ */
    #2c2c2c 315deg 360deg    /* Boş / Bəxtini sına */
  );
  transition: transform 3s ease-out;
  position: relative;
}

/* Ox */
#pointer {
  width:0; height:0; 
  border-left:15px solid transparent; 
  border-right:15px solid transparent;
  border-bottom:30px solid white; 
  margin:-30px auto 0 auto;
}

/* Bölmələrin yazısı (overlay) */
#wheelText {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-wrap: wrap; justify-content:center; align-items:center;
  pointer-events:none;
  color:white; font-weight:bold;
  font-size:14px;
}
.wheel-item { width:50%; height:50%; display:flex; justify-content:center; align-items:center; }
</style>
</head>
<body>

<div class="container">

<!-- PANEL (demo üçün) -->
<h2>Çarx Oyunu</h2>
<p id="balanceText">Balans: 0 ₼</p>

<div id="pointer"></div>
<div id="wheel">
  <div id="wheelText">
    <div class="wheel-item">Bəxtini sına</div>
    <div class="wheel-item">Bəxtini sına</div>
    <div class="wheel-item">1₼</div>
    <div class="wheel-item">Bəxtini sına</div>
    <div class="wheel-item">5₼</div>
    <div class="wheel-item">Bəxtini sına</div>
    <div class="wheel-item">7₼</div>
    <div class="wheel-item">Bəxtini sına</div>
  </div>
</div>

<button onclick="spin()">Çarxi fırlat</button>
<p id="msg"></p>

<script>
let balance = 0;
let deg = 0;

function updateBalance(){
  document.getElementById("balanceText").innerText = "Balans: " + balance + " ₼";
}

function spin(){
  if(balance <= 0){
    document.getElementById("msg").innerText = "Balansınızı artırın!";
    return;
  }

  // 8 bölmə
  let section = Math.floor(Math.random()*8); 
  let degSection = section*45 + Math.floor(Math.random()*45);
  deg += 360*5 + degSection;
  document.getElementById("wheel").style.transform = "rotate(" + deg + "deg)";

  setTimeout(()=>{
    let win;
    if(section===2){ win=1; }
    else if(section===4){ win=5; }
    else if(section===6){ win=7; }
    else { win=0; }

    balance += win;
    document.getElementById("msg").innerText = win>0 ? "Qazandınız: "+win+" ₼" : "Bəxtiniz çatmadı! Heç nə qazanmır.";
    updateBalance();
  },3000);
}

// Demo üçün balans artır
balance = 10; 
updateBalance();
</script>

</body>
</html>
