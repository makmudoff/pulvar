<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tapmaca Tap Real Pul Qazan!</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding-top:20px;
}
.container {
  width:100%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-sizing:border-box;
  text-align:center;
}
h1{color:#ff3b00; margin-bottom:20px;}
.input{width:100%; padding:15px; margin-top:15px; border-radius:15px; border:1px solid #ccc; font-size:16px;}
.btn{width:100%; padding:15px; margin-top:20px; border-radius:15px; border:none; font-size:18px; cursor:pointer;}
.login-btn{background:#ff3b00; color:white;}
.register-btn{background:white; color:#ff3b00; border:2px solid #ff3b00;}
.hidden{display:none;}
#codeDiv,#gameDiv{margin-top:20px;}
#recentWinners{font-size:13px; color:#333; margin-top:10px; text-align:left;}
#gameBalance{font-weight:bold;}
#questionDiv{margin-top:10px; text-align:left;}
</style>
</head>
<body>

<div class="container">

  <h1>Tapmaca Tap Real Pul Qazan!</h1>

  <!-- Login Bölməsi -->
  <div id="loginDiv">
    <input class="input" id="loginPhone" placeholder="Mobil nömrə/Üzv Nömrəsi">
    <input class="input" type="password" id="loginPassword" placeholder="Şifrə">
    <button class="btn login-btn" id="loginBtn">DAXİL OL</button>
  </div>

  <!-- Kod Bölməsi -->
  <div id="codeDiv" class="hidden">
    <p>Sizin oyun kodunuz yoxdur?</p>
    <button class="btn register-btn" id="getCodeBtn">Oyun kodu əldə edin</button>
  </div>

  <!-- Oyun Bölməsi -->
  <div id="gameDiv" class="hidden">
    <h2>Oyun Balansı: <span id="gameBalance">0₼</span></h2>
    <p>20 çətin tapmaca. Hər cavab +0.20₼ / -0.20₼</p>
    <div id="questionDiv"></div>
    <button class="btn register-btn" id="exitBtn" disabled>ÇIXARİŞ ET</button>
  </div>

  <!-- Qeydiyyat Statistikası -->
  <div class="text" id="registerStats">
    Qeydiyyat Sayı: <span id="registerCount">3638</span>
    <div id="recentWinners">
      <strong>Son çıxarış edənlər:</strong>
      <ul id="winnersList"></ul>
    </div>
  </div>

</div>

<script>
// İstifadəçilər
let users=[], currentUser=null;

// Kod və balans sistemi
const codeMap={"12-m":1,"78-m":5,"120-m":10};
let questionCount=0,totalQuestions=20;

// Tapmacalar
const puzzles=[
{q:"Mənim bir qardaşım var, amma mənim qardaşımın heç qardaşı yoxdur. Mən kiməm?", a:"Mən özüm"},
{q:"Hansı ay 28 gündən az deyil?", a:"Bütün aylar"},
{q:"Bir otaqda 4 künc var, hər küncdə 1 pişik, hər pişik 3 pişik görür. Otaqda neçə pişik var?", a:"4"},
{q:"Saat 3-də kölgə hansı tərəfə düşür?", a:"Şərq"},
{q:"Hansı söz səhv yazılıb?", a:"Səhv"},
{q:"Əgər sən mənim atamın oğluna baxırsansa, mən kiməm?", a:"Oğlum"},
{q:"Bir evdə 3 otaq var, hər otaqda 3 pişik, hər pişik 3 siçan. Cəmi neçə siçan var?", a:"27"},
{q:"Hansı meyvəni bölmək olmaz?", a:"Özünü"},
{q:"Bir qatar 60 km/saat sürətlə gedir, 1 saat sonra neçə km gedəcək?", a:"60"},
{q:"Hansını içmək olmaz: su, çay, hava?", a:"Hava"},
{q:"2 + 2 x 2 = ?", a:"6"},
{q:"Hər kəs onu görür amma heç kim onu tuta bilmir. Nədir?", a:"Gölge"},
{q:"Suda nə batmaz?", a:"Balon"},
{q:"Mən qaçıram amma yerimdə qalıram, mən kiməm?", a:"Saat"},
{q:"Bir otaqda 5 insan, hər biri bir-birinə əl verir. Neçə əl sıxışma var?", a:"10"},
{q:"Hansı hərf əlifbada yoxdur?", a:"Səhv"},
{q:"Qışda yağan ağ su?", a:"Qar"},
{q:"Bütün gün gedir amma heç getmir. Nədir?", a:"Saat"},
{q:"Hansı heyvan iki ayağı ilə yatır?", a:"İnsan"},
{q:"Hər kəs onu istifadə edir amma heç kim ona baxmır. Nədir?", a:"Telefon"}
];

// DOM elementləri
const loginDiv=document.getElementById('loginDiv');
const codeDiv=document.getElementById('codeDiv');
const gameDiv=document.getElementById('gameDiv');
const questionDiv=document.getElementById('questionDiv');
const exitBtn=document.getElementById('exitBtn');
const gameBalanceSpan=document.getElementById('gameBalance');
const registerCountSpan=document.getElementById('registerCount');
const winnersList=document.getElementById('winnersList');

// Login funksiyası
document.getElementById('loginBtn').onclick=()=>{
  const phone=document.getElementById('loginPhone').value.trim();
  const password=document.getElementById('loginPassword').value.trim();
  if(!phone||!password){alert("Bütün sahələri doldurun!"); return;}
  currentUser={phone,password,balance:0}; // Sadə demo üçün
  codeDiv.classList.remove('hidden');
};

// Kod əldə et düyməsi
document.getElementById('getCodeBtn').onclick=()=>{
  const message="Salam, mən oyun kodu istəyirəm!";
  const phone="0552334815";
  const url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
  window.open(url,'_blank');
};

// Oyun funksiyaları
function startGame(code){
  currentUser.balance=codeMap[code] || 0;
  gameDiv.classList.remove('hidden');
  questionCount=0;
  exitBtn.disabled=true;
  gameBalanceSpan.innerText=currentUser.balance.toFixed(2)+'₼';
  nextPuzzle();
}

function nextPuzzle(){
  if(currentUser.balance<=0 || questionCount>=totalQuestions){
    alert(`Oyun bitdi! Balansınız: ${currentUser.balance.toFixed(2)}₼`);
    exitBtn.disabled=false;
    return;
  }
  const puzzle=puzzles[questionCount];
  questionDiv.innerHTML=`<p>Sual ${questionCount+1}: ${puzzle.q}</p>
  <input class="input" id="answerInput">
  <button class="btn login-btn" id="submitAnswerBtn">CAVABLA</button>`;
  document.getElementById('submitAnswerBtn').onclick=()=>{
    const ans=document.getElementById('answerInput').value.trim().toLowerCase();
    if(ans===puzzle.a.toLowerCase()){currentUser.balance+=0.2; alert("Düzgün cavab! +0.20₼");}
    else{currentUser.balance-=0.2; alert(`Səhv! -0.20₼. Düzgün cavab: ${puzzle.a}`);}
    gameBalanceSpan.innerText=currentUser.balance.toFixed(2)+'₼';
    questionCount++;
    nextPuzzle();
  };
}

// Çıxarış düyməsi
exitBtn.onclick=()=>{
  alert(`WhatsApp avtomatik mesaj: Mən çıxarış etmək istəyirəm! Balansım: ${currentUser.balance.toFixed(2)}₼`);
};

// Qeydiyyat sayı avtomatik artırmaq
let registerCount=3638;
setInterval(()=>{
  registerCount++;
  registerCountSpan.innerText=registerCount;
},90000);

// Son çıxarış edənlər (avto)
const sampleNames=["Aysel","Ferid","Leqeb","Nijat","Elvin","Rufat","Samir","Gunel","Leyla","Farid","Ramin","Nurlan","Aysu","Cavid","Turan","Rafael","Sevda","Kamran","Rauf","Sahin"];
function updateWinners(){
  winnersList.innerHTML="";
  let usedIndices=[];
  for(let i=0;i<10;i++){
    let idx; do{idx=Math.floor(Math.random()*sampleNames.length);}while(usedIndices.includes(idx));
    usedIndices.push(idx);
    let amount=[12,17,38,73,93,19][Math.floor(Math.random()*6)];
    let li=document.createElement("li");
    li.innerText=sampleNames[idx]+" - "+amount+"₼";
    winnersList.appendChild(li);
  }
}
setInterval(updateWinners,5500);
updateWinners();
</script>

</body>
</html>
