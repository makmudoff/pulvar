<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun Paneli</title>

<style>
body {font-family:Arial;text-align:center;background:#111;color:#fff;}
input,button {padding:10px;margin:5px;border-radius:5px;border:none;}
button {background:gold;}
.hidden {display:none;}
canvas {margin-top:20px;}
</style>
</head>

<body>

<h2>🎰 Oyun Paneli</h2>

<!-- LOGIN -->
<div id="login">
<h3>Giriş</h3>
<input id="loginUser" placeholder="İstifadəçi adı"><br>
<input id="loginPass" type="password" placeholder="Şifrə"><br>
<button onclick="login()">Daxil ol</button>
<p onclick="showRegister()">Qeydiyyat</p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
<h3>Qeydiyyat</h3>
<input id="regUser" placeholder="İstifadəçi adı"><br>
<input id="regEmail" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Şifrə"><br>
<button onclick="register()">Qeydiyyatdan keç</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<h3>Panel</h3>
<p id="userInfo"></p>
<p id="balance">Balans: 10₼</p>

<button onclick="showGame()">Demo oyna</button>
<button onclick="realPlay()">Real pulla oyna</button>
<button onclick="logout()">Çıxış</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
<h3>🎡 Çarx</h3>

<canvas id="wheel" width="300" height="300"></canvas><br>
<button onclick="spin()">Fırlat (-1₼)</button><br><br>
<button onclick="back()">Geri</button>

<p id="result"></p>
</div>

<script>
let balance = 10;
let currentUser = null;

// Qeydiyyat
function register(){
let u = regUser.value;
let e = regEmail.value;
let p = regPass.value;

if(!u || !e || !p){
alert("Boş buraxmaq olmaz!");
return;
}

localStorage.setItem("user", JSON.stringify({u,e,p,balance:10}));
alert("Qeydiyyat uğurlu!");
currentUser = u;
showPanel();
}

// Login
function login(){
let u = loginUser.value;
let p = loginPass.value;

let data = JSON.parse(localStorage.getItem("user"));

if(data && data.u==u && data.p==p){
currentUser = u;
balance = data.balance;
showPanel();
} else {
alert("Səhv məlumat!");
}
}

// Panel
function showPanel(){
login.style.display="none";
register.style.display="none";
panel.style.display="block";
userInfo.innerText="Salam, "+currentUser;
updateBalance();
}

// Logout
function logout(){
location.reload();
}

// Game aç
function showGame(){
panel.style.display="none";
game.style.display="block";
drawWheel();
}

// Geri
function back(){
game.style.display="none";
panel.style.display="block";
}

// Telegram yönləndirmə
function realPlay(){
window.open("https://t.me/", "_blank");
alert("Mesaj: Salam Men deposit edib oyun oynamaq isdirem");
}

// BALANS
function updateBalance(){
balance = balance || 0;
document.getElementById("balance").innerText="Balans: "+balance+"₼";
save();
}

function save(){
let data = JSON.parse(localStorage.getItem("user"));
if(data){
data.balance = balance;
localStorage.setItem("user", JSON.stringify(data));
}
}

// ÇARX
const segments = ["Boş","Boş","Bəxtini sına","Bəxtini sına","5₼","10₼","Boş","Boş"];
let angle=0;

function drawWheel(){
let ctx = wheel.getContext("2d");
let arc = Math.PI*2/segments.length;

for(let i=0;i<segments.length;i++){
ctx.beginPath();
ctx.moveTo(150,150);
ctx.arc(150,150,150,arc*i,arc*(i+1));
ctx.fillStyle = "hsl("+(i*40)+",70%,50%)";
ctx.fill();

ctx.save();
ctx.translate(150,150);
ctx.rotate(arc*i+arc/2);
ctx.fillStyle="#000";
ctx.fillText(segments[i],60,5);
ctx.restore();
}
}

function spin(){
if(balance<=0){
alert("Balans yoxdur!");
return;
}

balance--;
updateBalance();

let spinAngle = Math.random()*2000+2000;
let duration=3000;
let start=null;

function animate(t){
if(!start) start=t;
let progress=t-start;

angle = spinAngle*(progress/duration);

let ctx = wheel.getContext("2d");
ctx.clearRect(0,0,300,300);

ctx.save();
ctx.translate(150,150);
ctx.rotate(angle*Math.PI/180);
ctx.translate(-150,-150);
drawWheel();
ctx.restore();

if(progress<duration){
requestAnimationFrame(animate);
}else{
resultShow();
}
}

requestAnimationFrame(animate);
}

function resultShow(){
let arc = 360/segments.length;
let deg = angle%360;
let index = Math.floor((360-deg)/arc)%segments.length;

let res = segments[index];

if(res.includes("₼")){
balance += parseInt(res);
result.innerText="🎉 Uddunuz: "+res;
}else{
result.innerText=res;
}

updateBalance();
}

// səhifə açılarkən
function showRegister(){
login.style.display="none";
register.style.display="block";
}
</script>

</body>
</html>
