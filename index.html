<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
body { font-family: Arial; text-align: center; background:#111; color:white; margin:0; padding:0; }
.container { max-width:400px; margin:auto; padding:20px; }
input, button { margin:5px; padding:12px; width:90%; font-size:18px; border-radius:8px; border:none; }
button { cursor:pointer; background:#333; color:white; border:none; border-radius:5px; transition:0.3s; }
button:hover { background:#555; }
#topMessage { background:#222; color:#FFD700; padding:10px; border-radius:8px; margin-bottom:15px; font-weight:bold; }
.hidden { display:none; }
#msg { margin-top:10px; color:#FFD700; font-weight:bold; }
</style>
</head>
<body>

<div class="container">
<div id="topMessage">🎡 Çarxı fırlatmaq üçün 1₼ əlavə et və şansını sınayaraq qazan!</div>

<div id="login">
<h2>Giriş</h2>
<input id="loginUser" placeholder="İstifadəçi adı">
<input id="loginPass" type="password" placeholder="Şifrə">
<input id="loginCode" placeholder="Kod">
<button onclick="login()">Daxil ol</button>
<p id="msg"></p>
<p><button onclick="openRegisterWindow()">Qeydiyyatdan keç</button></p>
</div>

<div id="panel" class="hidden">
<h2>Panel</h2>
<p id="balanceText">Balans: 0 ₼</p>
<div id="pointer"></div>
<div id="wheel"></div>
<button onclick="spin()">Çarxi fırlat</button>
<p id="msgSpin"></p>
</div>
</div>

<script>
// Kod və balans xəritəsi
const codeMap = { "005": 1, "00-MH":5, "00-7A":10, "00-6T":3, "00-63U":20 };
let balance = 0;
let deg = 0;
let userPhone = null;
let usedPhone = null;

// Qeydiyyat pəncərəsi böyük və ekranın ortasında
function openRegisterWindow(){
  const registerHtml = `
    <!DOCTYPE html>
    <html lang="az">
    <head>
      <meta charset="UTF-8">
      <title>Qeydiyyat</title>
      <style>
        body { font-family: Arial; text-align:center; background:#111; color:white; padding:50px; }
        input, button { display:block; margin:15px auto; padding:15px; width:95%; font-size:20px; border-radius:8px; border:none; }
        button { background:#333; color:white; cursor:pointer; transition:0.3s; }
        button:hover { background:#555; }
        h2 { margin-bottom:40px; }
      </style>
    </head>
    <body>
      <h2>Qeydiyyat</h2>
      <input id="user" placeholder="İstifadəçi adı">
      <input id="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Şifrə">
      <button onclick="register()">Qeydiyyatdan keç</button>

      <script>
        function register(){
          let user = document.getElementById("user").value.trim();
          let email = document.getElementById("email").value.trim();
          let pass = document.getElementById("pass").value.trim();
          if(!user || !email || !pass){ alert("Bütün xanaları doldur!"); return; }
          localStorage.setItem("userData", JSON.stringify({user,email,pass}));
          alert("Qeydiyyat tamamlandı! Hesabınızı aktiv etmək üçün Telegramda bizə yazın.");
          let message = \`Mən qeydiyyatdan keçdim, hesabımı aktiv edin.\\nİstifadəçi adı: \${user}\\nEmail: \${email}\`;
          window.open("https://t.me/carxfirla?text=" + encodeURIComponent(message), "_blank");
        }
      <\/script>
    </body>
    </html>
  `;
  const screenW = window.screen.width;
  const screenH = window.screen.height;
  const width = 600;
  const height = 700;
  const left = (screenW - width)/2;
  const top = (screenH - height)/2;
  const win = window.open("", "registerWindow", `width=${width},height=${height},top=${top},left=${left},resizable=yes,scrollbars=yes`);
  win.document.write(registerHtml);
  win.document.close();
}

// LOGIN
function login(){
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value.trim();
  const code = document.getElementById("loginCode").value.trim();
  const msg = document.getElementById("msg");
  if(!user || !pass || !code){ msg.innerText="Bütün xanaları doldurun!"; return; }
  if(!codeMap[code]){ msg.innerText="Kod səhvdir. Yeni kod üçün Telegram vasitəsilə əlaqə saxlayın."; return; }
  if(!userPhone){ userPhone=prompt("Telefon nömrənizi daxil edin:"); usedPhone=userPhone; }
  else if(userPhone!==usedPhone){ balance=0; msg.innerText="Bu kod yalnız sizin telefonunuz üçün aktivdir. Balans 0 göstərilir."; return; }
  balance = codeMap[code];
  document.getElementById("login").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  updateBalance();
  msg.innerText="Giriş uğurlu! Çarx paneli açıldı.";
}

// BALANS
function updateBalance(){ document.getElementById("balanceText").innerText="Balans: "+balance+" ₼"; }

// ÇARX
function spin(){
  if(balance<=0){ document.getElementById("msgSpin").innerText="Balansınızı artırın!"; return; }
  let random=Math.floor(Math.random()*360);
  deg+=360*5+random;
  document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
  setTimeout(()=>{
    let win = Math.floor(Math.random()*100);
    balance+=win;
    document.getElementById("msgSpin").innerText="Qazandınız: "+win+" ₼";
    updateBalance();
  },3000);
}
</script>

</body>
</html>
