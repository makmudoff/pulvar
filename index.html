<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000 Tapmaca Marafonu</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#111; color:#fff; }
header { background:#000; padding:20px; text-align:center; }
header h1 { color:#ffcc00; margin:0; }
main { padding:20px; max-width:700px; margin:auto; }
section { margin-bottom:40px; }
input[type="text"] { padding:10px; width:65%; border-radius:5px; border:none; margin-right:10px; }
button { padding:10px 15px; background:#ffcc00; border:none; color:#111; cursor:pointer; border-radius:5px; }
button:hover { transform:scale(1.05); }
#result { margin-top:15px; font-size:1.2em; }
footer { background:#000; padding:20px; text-align:center; color:#aaa; }
#status { font-size:1.2em; margin-bottom:15px; }
</style>
</head>
<body>

<header>
<h1>1000 Tapmaca Marafonu</h1>
<p>Hər tapmacanı düzgün cavablayın və 100 AZN qazanın!</p>
</header>

<main>
<section id="status-section">
<p id="status">Tapmaca 1 / 1000 | Can: 3 | Xal: 0</p>
</section>

<section id="riddle-section">
<h2 id="question">Tapmaca yüklənir...</h2>
<input type="text" id="answer" placeholder="Cavabı yazın">
<button onclick="checkAnswer()">Yoxla</button>
<p id="result"></p>
</section>
</main>

<footer>
<p>&copy; 2026 Tapmaca Marafonu</p>
</footer>

<script>
// Demo üçün 1000 tapmaca generasiya
const riddles = [];
for(let i=1;i<=1000;i++){
  riddles.push({question: `Tapmaca ${i}: Nömrə ${i} ilə bağlı sadə cavab nədir?`, answer: `${i}`});
}

let current = 0;
let score = 0;
let lives = 3;

// Tapmacanı göstər
function loadRiddle(){
  if(current < riddles.length){
    document.getElementById("question").textContent = riddles[current].question;
    document.getElementById("answer").value = "";
    document.getElementById("result").textContent = "";
    updateStatus();
  } else {
    document.getElementById("question").textContent = "Təbriklər! Siz bütün 1000 tapmacanı tamamladınız!";
    document.getElementById("answer").style.display = "none";
    document.querySelector("button").style.display = "none";
    document.getElementById("result").textContent = "Simulyasiya olaraq siz 100 AZN qazandınız!";
    document.getElementById("result").style.color = "#ffcc00";
  }
}

// Status panelini yenilə
function updateStatus(){
  document.getElementById("status").textContent = `Tapmaca ${current+1} / ${riddles.length} | Can: ${lives} | Xal: ${score}`;
}

// Cavabı yoxla
function checkAnswer(){
  const userAns = document.getElementById("answer").value.trim();
  const correctAns = riddles[current].answer.trim();
  const result = document.getElementById("result");

  if(userAns === correctAns){
    score += 1;
    result.textContent = "Düzdür! Növbəti tapmaca gəlir...";
    result.style.color = "#ffcc00";
    current += 1;
    setTimeout(loadRiddle, 500);
  } else {
    lives -= 1;
    if(lives <= 0){
      result.textContent = "Oyun bitdi! Canlarınız qurtardı.";
      result.style.color = "#ff5555";
      document.getElementById("answer").style.display = "none";
      document.querySelector("button").style.display = "none";
    } else {
      result.textContent = `Yanlış cavab! Canınızdan 1 itdi. Qalan can: ${lives}`;
      result.style.color = "#ff5555";
    }
    updateStatus();
  }
}

// İlk tapmacanı yüklə
loadRiddle();
</script>

</body>
</html>
