<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#050505;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:450px;
    position:relative;
}

.top-text{
    background:linear-gradient(45deg,#00ff66,#00c853);
    padding:20px;
    border-radius:20px;
    text-align:center;
    color:#000;
    font-weight:bold;
    margin-bottom:30px;
    animation:topanim 2s infinite alternate;
    box-shadow:0 0 25px #00ff66;
}

.top-text h1{
    font-size:22px;
    margin-bottom:10px;
}

.top-text p{
    font-size:17px;
    line-height:1.5;
}

.box{
    position:relative;
    background:#fff;
    color:#000;
    padding:18px;
    border-radius:18px;
    margin:22px 0;
    font-size:17px;
    font-weight:bold;
    animation:slide 1s ease;
    box-shadow:0 0 20px rgba(0,255,100,0.4);
}

.box::before{
    content:"✔";
    position:absolute;
    left:-45px;
    top:50%;
    transform:translateY(-50%);
    width:35px;
    height:35px;
    border-radius:50%;
    background:#00ff66;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    font-weight:bold;
}

.line{
    width:4px;
    height:25px;
    background:#00ff66;
    margin-left:-28px;
    border-radius:20px;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    background:#00ff66;
    color:#000;
    text-decoration:none;
    padding:16px;
    margin-top:20px;
    border-radius:16px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 20px #00ff66;
}

.btn:hover{
    transform:scale(1.05);
}

.title{
    text-align:center;
    color:#00ff66;
    font-size:32px;
    font-weight:bold;
    margin-bottom:25px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #00ff66;
    }
    to{
        text-shadow:0 0 35px #00ff66;
    }
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateX(-40px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes topanim{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-5px);
    }
}

</style>
</head>
