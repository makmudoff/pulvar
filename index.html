<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Kredit</title>

<style>
body{font-family:Arial;margin:0;background:#f4fffc}
.top-banner{background:#00b894;color:#fff;padding:15px;text-align:center;font-weight:bold}
.header{display:flex;justify-content:space-between;padding:20px}
.logo{font-size:28px;font-weight:bold}
.logo span{color:#00b894}
.lang button{padding:8px 14px;border:none;border-radius:10px;margin-left:5px}
.active{background:#111;color:#fff}
.hero{text-align:center;padding:20px}
.card{width:90%;max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:20px}
.info-line{display:flex;justify-content:space-between;margin:10px 0}
.apply-box input{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ccc}
.apply-box button{width:100%;padding:14px;background:#00b894;color:#fff;border:none;border-radius:12px;font-size:16px}
.bottom-menu{position:fixed;bottom:0;width:100%;display:grid;grid-template-columns:1fr 1fr;background:#fff;padding:10px}
.bottom-menu a{text-align:center;padding:12px;border:1px solid #ccc;border-radius:10px;text-decoration:none;color:#00b894;font-weight:bold}
.bottom-menu a:last-child{background:#00b894;color:#fff}
.terms-page{position:fixed;inset:0;background:#fff;display:none;overflow:auto;padding:20px}
.back-btn{font-size:30px;border:none;background:none}
</style>
</head>

<body>

<div class="top-banner" id="banner">Sürətli kredit xidməti</div>

<div class="header">
  <div class="logo">pul<span>var</span></div>
  <div class="lang">
    <button class="active" onclick="setLang('az')">AZ</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</div>

<div class="hero">
  <h2 id="title">Banksız kredit</h2>
  <p id="desc">Sadəcə FIN ilə müraciət et</p>
</div>

<div class="card">
  <div class="info-line">
    <span id="amountText">Məbləğ</span>
    <b>200 ₼</b>
  </div>

  <div class="apply-box">
    <input placeholder="Ad Soyad" id="name">
    <input placeholder="Telefon" id="phone">
    <input placeholder="FIN kod" id="fin">

    <button onclick="openTerms()" id="applyBtn">Kredit al</button>
  </div>
</div>

<div class="bottom-menu">
  <a href="#" onclick="openTerms()" id="menuApply">Kredit al</a>
  <a href="#" id="menuInfo">Məlumat</a>
</div>

<!-- ŞƏRTLƏR -->
<div class="terms-page" id="termsPage">

<button class="back-btn" onclick="closeTerms()">←</button>

<h2 id="termsTitle">Şərtlər</h2>
<p id="termsText">
Kredit tarixçəniz yoxlanılır. Uyğun olarsa təsdiqlənir.
</p>

<ul id="termsList">
<li>Son 9 ay müsbət tarixçə</li>
<li>Gecikmə olmamalıdır</li>
<li>21-60 yaş</li>
</ul>

<button onclick="pay()" id="payBtn">1 AZN ödə</button>

</div>

<script>
function openTerms(){
 document.getElementById("termsPage").style.display="block";
}
function closeTerms(){
 document.getElementById("termsPage").style.display="none";
}

function pay(){
 alert("Burda Epoint link olacaq");
}

/* DİL SİSTEMİ */
function setLang(lang){

let az = {
banner:"Sürətli kredit xidməti",
title:"Banksız kredit",
desc:"Sadəcə FIN ilə müraciət et",
apply:"Kredit al",
terms:"Şərtlər",
pay:"1 AZN ödə"
};

let ru = {
banner:"Быстрый кредит онлайн",
title:"Кредит без банка",
desc:"Оформите заявку с FIN кодом",
apply:"Получить кредит",
terms:"Условия",
pay:"Оплатить 1 AZN"
};

let t = (lang=="ru") ? ru : az;

document.getElementById("banner").innerText=t.banner;
document.getElementById("title").innerText=t.title;
document.getElementById("desc").innerText=t.desc;
document.getElementById("applyBtn").innerText=t.apply;
document.getElementById("menuApply").innerText=t.apply;
document.getElementById("termsTitle").innerText=t.terms;
document.getElementById("payBtn").innerText=t.pay;
}
</script>

</body>
</html>
