<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG UC Satışı</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b14;
    color:white;
    text-align:center;
}

h1 {
    margin:20px;
    color:#00e5ff;
}

.container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    padding:10px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:12px;
    animation: blink 1s infinite alternate;
}

@keyframes blink {
    0% {box-shadow:0 0 10px #00e5ff;}
    50% {box-shadow:0 0 10px #ff00aa;}
    100% {box-shadow:0 0 10px #ffe600;}
}

.uc {
    font-weight:bold;
    font-size:18px;
}

.price {
    margin:10px 0;
    color:#ffe600;
}

button {
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    font-weight:bold;
}
</style>

<script>
function goOrder(uc, price){
    window.location.href = "order.html?uc=" + uc + "&price=" + price;
}
</script>

</head>
<body>

<h1>PUBG MOBILE UC</h1>

<div class="container">

<div class="card"><div class="uc">60 UC</div><div class="price">1.10 ₼</div><button onclick="goOrder('60 UC','1.10')">Sifariş et</button></div>
<div class="card"><div class="uc">120 UC</div><div class="price">3 ₼</div><button onclick="goOrder('120 UC','3')">Sifariş et</button></div>
<div class="card"><div class="uc">180 UC</div><div class="price">5 ₼</div><button onclick="goOrder('180 UC','5')">Sifariş et</button></div>
<div class="card"><div class="uc">240 UC</div><div class="price">6.50 ₼</div><button onclick="goOrder('240 UC','6.50')">Sifariş et</button></div>
<div class="card"><div class="uc">325 UC</div><div class="price">8.10 ₼</div><button onclick="goOrder('325 UC','8.10')">Sifariş et</button></div>
<div class="card"><div class="uc">385 UC</div><div class="price">10 ₼</div><button onclick="goOrder('385 UC','10')">Sifariş et</button></div>
<div class="card"><div class="uc">660 UC</div><div class="price">14 ₼</div><button onclick="goOrder('660 UC','14')">Sifariş et</button></div>
<div class="card"><div class="uc">720 UC</div><div class="price">17 ₼</div><button onclick="goOrder('720 UC','17')">Sifariş et</button></div>
<div class="card"><div class="uc">780 UC</div><div class="price">20 ₼</div><button onclick="goOrder('780 UC','20')">Sifariş et</button></div>
<div class="card"><div class="uc">1045 UC</div><div class="price">24 ₼</div><button onclick="goOrder('1045 UC','24')">Sifariş et</button></div>
<div class="card"><div class="uc">1800 UC</div><div class="price">35 ₼</div><button onclick="goOrder('1800 UC','35')">Sifariş et</button></div>
<div class="card"><div class="uc">3850 UC</div><div class="price">60 ₼</div><button onclick="goOrder('3850 UC','60')">Sifariş et</button></div>
<div class="card"><div class="uc">8100 UC</div><div class="price">135 ₼</div><button onclick="goOrder('8100 UC','135')">Sifariş et</button></div>
<div class="card"><div class="uc">16200 UC</div><div class="price">265 ₼</div><button onclick="goOrder('16200 UC','265')">Sifariş et</button></div>
<div class="card"><div class="uc">24300 UC</div><div class="price">389 ₼</div><button onclick="goOrder('24300 UC','389')">Sifariş et</button></div>
<div class="card"><div class="uc">32400 UC</div><div class="price">547 ₼</div><button onclick="goOrder('32400 UC','547')">Sifariş et</button></div>

</div>

</body>
</html>
