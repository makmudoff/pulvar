<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Siqnal Proqramı</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:350px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    margin-bottom:15px;
    color:#00ff99;
}

p{
    font-size:14px;
    margin-bottom:20px;
    color:#cbd5e1;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ff99;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00cc77;
}

#message{
    margin-top:15px;
    font-size:14px;
    font-weight:bold;
}

.success{
    color:#00ff99;
}

.error{
    color:red;
}
</style>
</head>

<body>

<div class="box">
    <h1>✈️ Aviator Siqnal</h1>

    <p>
        Giriş üçün sizə verilən xüsusi kodu daxil edin
    </p>

    <input type="password" id="kod" placeholder="Kodu daxil et">

    <button onclick="yoxla()">Giriş Et</button>

    <div id="message"></div>
</div>

<script>

let duzgunKod = "AVIATOR2026";

function yoxla(){

    let daxilEdilenKod = document.getElementById("kod").value;
    let mesaj = document.getElementById("message");

    if(daxilEdilenKod === duzgunKod){

        mesaj.innerHTML = "✅ Giriş uğurludur!";
        mesaj.className = "success";

        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 1500);

    }else{

        mesaj.innerHTML = "❌ Kod yanlışdır! Giriş qadağandır.";
        mesaj.className = "error";
    }

}

</script>

</body>
</html>
