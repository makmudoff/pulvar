<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Cüzdan 2026</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#eaf3ff;
}

.container{
 padding:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:15px;
 margin-bottom:15px;
 box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:1px solid #ccc;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:#2a7cff;
 color:white;
 margin-top:10px;
}

.menu button{
 width:48%;
 margin:1%;
}

.hidden{
 display:none;
}

.center{
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
<div class="card">
<h2>Giriş Et</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Şifrə">
<button onclick="login()">Giriş Et</button>
<p onclick="showRegister()">Qeydiyyatdan keç</p>
</div>
</div>

<!-- REGISTER -->
<div id="registerPage" class="center hidden">
<div class="card">
<h2>Qeydiyyat</h2>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyatdan keç</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden container">

<div class="card">
<h2>Online Cüzdan 2026</h2>
<p>Balans: <b id="balance">100 AZN</b></p>
</div>

<div class="menu">
<button onclick="showTransfer()">Köçürmə</button>
<button onclick="showPayment()">Ödəniş</button>
<button onclick="showProfile()">Profil</button>
</div>

<!-- TRANSFER -->
<div id="transfer" class="card hidden">
<h3>Köçürmə</h3>
<input id="toUser" placeholder="Kimə">
<input id="amount" placeholder="Məbləğ">
<button onclick="transfer()">Göndər</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="card hidden">
<h3>Ödəniş</h3>
<input id="service" placeholder="Xidmət (mobil, qaz...)">
<input id="payAmount" placeholder="Məbləğ">
<button onclick="pay()">Ödə</button>
</div>

<!-- PROFILE -->
<div id="profile" class="card hidden">
<h3>Profil</h3>
<p id="userEmail"></p>

<input placeholder="Kart nömrəsi">
<input placeholder="Ad Soyad">
<button>Kart əlavə et</button>

<button onclick="logout()">Çıxış</button>
</div>

<!-- HISTORY -->
<div class="card">
<h3>Son əməliyyatlar</h3>
<ul id="history"></ul>
</div>

</div>

<script>
let balance = 100;

function register(){
 let email = document.getElementById("regEmail").value;
 let pass = document.getElementById("regPass").value;

 localStorage.setItem("user", JSON.stringify({email, pass}));
 alert("Qeydiyyat tamamlandı");
 showLogin();
}

function login(){
 let email = document.getElementById("loginEmail").value;
 let pass = document.getElementById("loginPass").value;

 let user = JSON.parse(localStorage.getItem("user"));

 if(user && user.email==email && user.pass==pass){
   localStorage.setItem("login", "true");
   startApp();
 } else {
   alert("Yanlış məlumat");
 }
}

function logout(){
 localStorage.removeItem("login");
 location.reload();
}

function showRegister(){
 document.getElementById("loginPage").classList.add("hidden");
 document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin(){
 document.getElementById("registerPage").classList.add("hidden");
 document.getElementById("loginPage").classList.remove("hidden");
}

function startApp(){
 document.getElementById("loginPage").classList.add("hidden");
 document.getElementById("registerPage").classList.add("hidden");
 document.getElementById("app").classList.remove("hidden");

 let user = JSON.parse(localStorage.getItem("user"));
 document.getElementById("userEmail").innerText = user.email;
}

function showTransfer(){
 hideAll();
 document.getElementById("transfer").classList.remove("hidden");
}

function showPayment(){
 hideAll();
 document.getElementById("payment").classList.remove("hidden");
}

function showProfile(){
 hideAll();
 document.getElementById("profile").classList.remove("hidden");
}

function hideAll(){
 document.getElementById("transfer").classList.add("hidden");
 document.getElementById("payment").classList.add("hidden");
 document.getElementById("profile").classList.add("hidden");
}

function transfer(){
 let to = document.getElementById("toUser").value;
 let amt = parseFloat(document.getElementById("amount").value);

 if(amt>0 && amt<=balance){
   balance -= amt;
   updateBalance();
   addHistory("Köçürmə: "+amt+" AZN → "+to);
 } else {
   alert("Balans çatmır");
 }
}

function pay(){
 let service = document.getElementById("service").value;
 let amt = parseFloat(document.getElementById("payAmount").value);

 if(amt>0 && amt<=balance){
   balance -= amt;
   updateBalance();
   addHistory("Ödəniş: "+service+" - "+amt+" AZN");
 } else {
   alert("Balans çatmır");
 }
}

function updateBalance(){
 document.getElementById("balance").innerText = balance+" AZN";
}

function addHistory(text){
 let li = document.createElement("li");
 li.innerText = text;
 document.getElementById("history").appendChild(li);
}

// auto login
if(localStorage.getItem("login")=="true"){
 startApp();
}
</script>

</body>
</html>
