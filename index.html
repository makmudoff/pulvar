<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:320px;
text-align:center;
}
</style>

</head>

<body>

<div class="box">
<h2>Giriş</h2>

<input type="text" placeholder="Login">
<input type="password" placeholder="Parol">

<button>Giriş Et</button>

<br><br>

<button onclick="openRegister()">Qeydiyyatdan keç</button>

</div>

<div class="modal" id="register">

<div class="modal-content">

<h3>Qeydiyyat</h3>

<input type="text" placeholder="Yeni istifadəçi adınız">

<input type="date" placeholder="Doğum tarixiniz">

<input type="text" placeholder="M10 nömrəniz">

<input type="email" placeholder="Email yazın">

<button onclick="success()">Qeydiyyatdan keç</button>

</div>
</div>

<script>

function openRegister(){
document.getElementById("register").style.display="flex";
}

function success(){
alert("Uğurla qeydiyyatdan keçdiniz!\n\nHesabınızı aktiv etmək üçün Dəstək xidmətinə yazın.");
}

</script>

</body>
</html>
