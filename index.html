<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulvar Xəbər</title>
</head>

<body style="margin:0; background:#020617; color:white; font-family:sans-serif;">

<h2 style="text-align:center; padding:20px;">🇦🇿 Azərbaycan Xəbərləri</h2>

<div id="news" style="padding:10px;"></div>

<script>

fetch("https://api.allorigins.win/raw?url=https://report.az/rss/")
.then(res => res.text())
.then(str => new DOMParser().parseFromString(str, "text/xml"))
.then(data => {

let items = data.querySelectorAll("item");
let html = "";

items.forEach((el, i) => {

if(i > 7) return;

let title = el.querySelector("title").textContent;
let link = el.querySelector("link").textContent;

let desc = el.querySelector("description").textContent;

// şəkil çıxarmaq
let imgMatch = desc.match(/<img.*?src="(.*?)"/);
let img = imgMatch ? imgMatch[1] : "https://picsum.photos/600/300";

html += `
<div style="
  background:#0f172a;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
">

<img src="${img}" 
style="width:100%; height:200px; object-fit:cover;">

<div style="padding:10px;">
<a href="${link}" target="_blank" style="color:white; text-decoration:none;">
${title}
</a>
</div>

</div>
`;

});

document.getElementById("news").innerHTML = html;

});

</script>

</body>
</html>
