<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>777 Casino Meyvə Oyunu</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 50px;
}

h1 { color: #FFD700; }

#game { display: none; margin-top: 20px; }

#balance { font-weight: bold; margin: 20px 0; font-size: 18px; }

.button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #FF4500;
    color: #fff;
}

.button:hover { background: #FF6347; }

.slot-machine {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.slot {
    width: 80px;
    height: 80px;
    margin: 0 10px;
    background: #222;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    transition: transform 0.3s ease;
}

#message { margin-top: 20px; font-size: 18px; color: #00FF00; }
</style>
</head>
<body>

<h1>777 Casino Meyvə Oyunu</h1>

<div id="register">
    <button class="button" onclick="registerUser()">Qeydiyyatdan Keç</button>
</div>

<div id="game">
    <p id="balance">Balans: 0 kredit</p>
    <button class="button" onclick="deposit()">Deposit et (1 AZN → 1000 kredit)</button>
    <button class="button" onclick="spinFruit()">Meyvəni Fırla (0.20₼)</button>

    <div class="slot-machine">
        <div class="slot" id="slot1">🍒</div>
        <div class="slot" id="slot2">🍋</div>
        <div class="slot" id="slot3">🍊</div>
    </div>

    <p id="message"></p>
</div>

<script>
let balance = 0;
let registered = false;
const fruits = ["🍒","🍋","🍊","🍇","🍉","7️⃣"];

function registerUser() {
    registered = true;
    document.getElementById('register').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('message').innerText = "Xoş gəldin! Oyuna başla.";
}

function deposit() {
    if (!registered) return alert("Əvvəlcə qeydiyyatdan keçin!");
    let whatsappNumber = "0552334815";
    let text = "Salam, mən deposit etmək istəyirəm, oyun oynayacağam";
    let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank");

    balance += 1000; // Simulyasiya
    updateBalance();
}

function spinFruit() {
    if (balance < 20) { // 0.20₼ = 20 kredit
        alert("Balansınız kifayət etmir!");
        return;
    }
    balance -= 20;
    updateBalance();

    // Animasiya
    let spins = 20;
    let slotElements = [
        document.getElementById('slot1'),
        document.getElementById('slot2'),
        document.getElementById('slot3')
    ];

    let interval = setInterval(() => {
        slotElements.forEach(el => {
            el.innerText = fruits[Math.floor(Math.random() * fruits.length)];
        });
        spins--;
        if (spins <= 0) {
            clearInterval(interval);
            checkWin(slotElements.map(el => el.innerText));
        }
    }, 100);
}

function checkWin(result) {
    if (result[0] === result[1] && result[1] === result[2]) {
        document.getElementById('message').innerText = "🎉 Təbriklər! Üç eyni meyvə çıxdı! 500 kredit qazandınız!";
        balance += 500;
        updateBalance();
    } else {
        document.getElementById('message').innerText = "Yenə cəhd edin!";
    }
}

function updateBalance() {
    document.getElementById('balance').innerText = "Balans: " + balance + " kredit";
}
</script>

</body>
</html>
