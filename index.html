<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Kredit</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4fffc;color:#111;padding-bottom:90px;}

.top-banner{
background:linear-gradient(90deg,#00796b,#00b894);
color:white;padding:14px;
display:flex;justify-content:space-between;
}

.header{display:flex;justify-content:space-between;padding:20px;}
.logo{font-size:28px;font-weight:bold;}
.logo span{color:#00b894;}

.hero{text-align:center;padding:20px;}

.card{
width:90%;margin:auto;background:#fff;
padding:20px;border-radius:20px;
border:2px solid #b8eee1;
}

.info-box{
border:2px dashed #9de2d2;
padding:15px;border-radius:15px;margin:15px 0;
}

.info-line{display:flex;justify-content:space-between;margin:8px 0;}

input,select{
width:100%;padding:10px;margin-top:10px;
border:2px solid #b8eee1;border-radius:10px;
}

.schedule{
border:2px dashed #9de2d2;
padding:15px;border-radius:15px;margin-top:20px;
}

.schedule div{
display:flex;justify-content:space-between;margin:6px 0;
}

button{
width:100%;padding:12px;margin-top:10px;
background:#00b894;color:white;border:none;border-radius:10px;
}
</style>
</head>

<body>

<div class="top-banner">
<div>5%-dən başlayan komissiya</div>
<button onclick="submitForm()">Müraciət et</button>
</div>

<div class="header">
<div class="logo">pul<span>var</span></div>
</div>

<div class="hero">
<h2>Banksız kredit</h2>
</div>

<div class="card">

<div class="info-box">
<div class="info-line"><span>Məbləğ</span><b id="amount">500 ₼</b></div>
<div class="info-line"><span>Geri ödəniş</span><b id="total">700 ₼</b></div>
<div class="info-line"><span>Müddət</span><b id="timeText">45 gün</b></div>
</div>

<input type="range" min="100" max="3000" value="500" id="range">

<select id="timeSelect">
<option value="45">45 gün</option>
<option value="60">2 ay</option>
<option value="90">3 ay</option>
<option value="180">6 ay</option>
<option value="270">9 ay</option>
<option value="365">12 ay</option>
</select>

<div class="schedule" id="scheduleBox"></div>

<input id="name" placeholder="Ad soyad">
<input id="phone" placeholder="Telefon nömrəsi">
<input id="fin" placeholder="FIN kod">

<button onclick="submitForm()">Kredit al</button>

</div>

<script>
const range = document.getElementById("range");
const timeSelect = document.getElementById("timeSelect");

function calc(){
let amount = Number(range.value);
let days = Number(timeSelect.value);

// faiz
let percent = 0.25;
if(days==60) percent=0.30;
if(days==90) percent=0.35;
if(days==180) percent=0.42;
if(days==270) percent=0.48;
if(days==365) percent=0.55;

let total = Math.round(amount + amount*percent);

document.getElementById("amount").innerText = amount+" ₼";
document.getElementById("total").innerText = total+" ₼";
document.getElementById("timeText").innerText = timeSelect.options[timeSelect.selectedIndex].text;

let box = document.getElementById("scheduleBox");
box.innerHTML="";

// 🔥 BURDA ƏSAS DÜZƏLİŞ
if(days==45){
box.innerHTML = `
<div><span>15 gün</span><b>${Math.round(total*0.85)} ₼</b></div>
<div><span>20 gün</span><b>${Math.round(total*0.9)} ₼</b></div>
<div><span>25 gün</span><b>${Math.round(total*0.95)} ₼</b></div>
<div><span>30 gün</span><b>${total} ₼</b></div>
`;
}else{

let months = Math.round(days/30);
let monthly = Math.round(total / months);

// 🔥 AYLIQ TAKSİT
for(let i=1;i<=months;i++){
box.innerHTML += `
<div><span>${i} ay</span><b>${monthly} ₼</b></div>
`;
}

}
}

range.oninput=calc;
timeSelect.onchange=calc;

function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let fin=document.getElementById("fin").value;

if(name.length<5){alert("Ad səhv");return;}
if(phone.length<9){alert("Telefon səhv");return;}
if(fin.length!=7){alert("FIN səhv");return;}

alert("Müraciət qəbul edildi");
}

calc();
</script>

</body>
</html>
