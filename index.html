<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xəbərlər</title>
</head>

<body style="background:#020617; color:white; font-family:sans-serif; margin:0;">

<h2 style="text-align:center; padding:20px;">📰 Son Xəbərlər</h2>

<div id="news" style="padding:20px;"></div>

<script>

fetch("https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/rss.xml")
.then(res => res.json())
.then(data => {

let html = "";

data.items.slice(0,8).forEach(item => {

html += `
<div style="
  background:#0f172a;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
">

<img src="${item.thumbnail || 'https://via.placeholder.com/600x300'}"
style="width:100%; height:200px; object-fit:cover;">

<div style="padding:10px;">
<a href="${item.link}" target="_blank" style="color:white; text-decoration:none;">
${item.title}
</a>
</div>

</div>
`;

});

document.getElementById("news").innerHTML = html;

})
.catch(() => {
document.getElementById("news").innerHTML = "Xəbər yüklənmədi";
});

</script>

</body>
</html>
