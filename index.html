<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Live Code Editor</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#111;
color:white;
}

textarea{
width:50%;
height:100%;
background:#1e1e1e;
color:#00ff99;
border:none;
outline:none;
padding:15px;
font-size:14px;
resize:none;
}

iframe{
width:50%;
height:100%;
border:none;
background:white;
}
</style>
</head>

<body>

<textarea id="code" oninput="run()">
<!DOCTYPE html>
<html>
<body>

<h1 style="color:red;">Salam Dünya</h1>
<p>Burada kod yaz</p>

</body>
</html>
</textarea>

<iframe id="output"></iframe>

<script>
function run(){
document.getElementById("output").srcdoc =
document.getElementById("code").value;
}

run();
</script>

</body>
</html>
