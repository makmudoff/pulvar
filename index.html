<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyuna Daxil Ol</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.82)),
        radial-gradient(circle at top, #2a2a2a 0%, #111 45%, #050505 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.22;
      z-index: 0;
    }

    .glow-1 {
      top: -80px;
      left: -80px;
      background: #1e90ff;
    }

    .glow-2 {
      bottom: -100px;
      right: -80px;
      background: #00c853;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 26px 22px 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    .logo {
      width: 78px;
      height: 78px;
      margin: 0 auto 14px;
      border-radius: 22px;
      background: linear-gradient(135deg, #1e90ff, #00c853);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .title {
      color: #fff;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.75);
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 22px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 14px 10px;
      text-align: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #dcdcdc;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.2s;
      user-select: none;
    }

    .tab.active {
      background: linear-gradient(135deg, #2979ff, #1e90ff);
      color: #fff;
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 8px 20px rgba(30,144,255,0.28);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 0 14px;
      height: 58px;
    }

    .icon {
      font-size: 18px;
      color: rgba(255,255,255,0.75);
      min-width: 22px;
      text-align: center;
    }

    input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .forgot {
      display: inline-block;
      margin: 2px 0 18px;
      color: #6eb6ff;
      text-decoration: none;
      font-size: 15px;
    }

    .login-btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #17c964, #00a63e);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(0, 166, 62, 0.28);
      transition: transform 0.15s ease;
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 18px;
      color: rgba(255,255,255,0.58);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    .socials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .social-btn {
      height: 54px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }

    .register {
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 15px;
      margin-bottom: 18px;
    }

    .register a {
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      margin-left: 6px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .feature-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px 8px;
      text-align: center;
      color: #fff;
    }

    .feature-box span {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .feature-box small {
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      line-height: 1.3;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 22px 16px 18px;
        border-radius: 20px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 14px;
      }

      .socials {
        grid-template-columns: repeat(4, 1fr);
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="login-card">
    <button class="close-btn" onclick="closePopup()">×</button>

    <div class="logo">★</div>

    <div class="title">Oyuna Daxil Ol</div>
    <div class="subtitle">
      Hesabına giriş et və platformada oyun imkanlarına davam et.
    </div>

    <div class="tabs">
      <div class="tab active" id="phoneTab" onclick="showPhone()">Telefon</div>
      <div class="tab" id="emailTab" onclick="showEmail()">E-poçt</div>
    </div>

    <form>
      <div id="phoneFields">
        <div class="form-group">
          <div class="input-wrap">
            <div class="icon">📱</div>
            <input type="text" placeholder="+994 xx xxx xx xx">
          </div>
        </div>
      </div>

      <div id="emailFields" class="hidden">
        <div class="form-group">
          <div class="input-wrap">
            <div class="icon">✉️</div>
            <input type="email" placeholder="E-poçtunuzu daxil edin">
          </div>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrap">
          <div class="icon">🔒</div>
          <input type="password" placeholder="Şifrə">
        </div>
      </div>

      <a href="#" class="forgot">Şifrəni unutmusunuz?</a>

      <button type="button" class="login-btn">Giriş et</button>
    </form>

    <div class="divider">və ya</div>

    <div class="socials">
      <button class="social-btn" type="button">G</button>
      <button class="social-btn" type="button">VK</button>
      <button class="social-btn" type="button">✈</button>
      <button class="social-btn" type="button">f</button>
    </div>

    <div class="register">
      Hesabın yoxdur?<a href="#">Qeydiyyatdan keç</a>
    </div>

    <div class="features">
      <div class="feature-box">
        <span>⚡</span>
        <small>Sürətli giriş</small>
      </div>
      <div class="feature-box">
        <span>🎁</span>
        <small>Bonus imkanları</small>
      </div>
      <div class="feature-box">
        <span>🛡</span>
        <small>Rahat istifadə</small>
      </div>
    </div>
  </div>

  <script>
    function showPhone() {
      document.getElementById("phoneFields").classList.remove("hidden");
      document.getElementById("emailFields").classList.add("hidden");
      document.getElementById("phoneTab").classList.add("active");
      document.getElementById("emailTab").classList.remove("active");
    }

    function showEmail() {
      document.getElementById("emailFields").classList.remove("hidden");
      document.getElementById("phoneFields").classList.add("hidden");
      document.getElementById("emailTab").classList.add("active");
      document.getElementById("phoneTab").classList.remove("active");
    }

    function closePopup() {
      document.querySelector(".login-card").style.display = "none";
    }
  </script>

</body>
</html>
