<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin:0;
    background:#000;
    font-family: Arial;
}

.popup {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background:#fff;
    width:90%;
    max-width:400px;
    border-radius:15px;
    padding:20px;
}

.title {
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.tabs {
    display:flex;
    margin-bottom:15px;
}

.tab {
    flex:1;
    padding:10px;
    text-align:center;
    border-radius:10px;
    background:#eee;
    margin-right:5px;
}

.tab.active {
    background:#1e6fff;
    color:#fff;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

.btn {
    width:100%;
    padding:15px;
    background:#00b140;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.link {
    text-align:center;
    margin-top:10px;
    color:#1e6fff;
}
</style>

</head>

<body>

<div class="popup">
    <div class="box">

        <div class="title">Giriş</div>

        <div class="tabs">
            <div class="tab active">Telefon</div>
            <div class="tab">E-poçt</div>
        </div>

        <input type="text" placeholder="+994 xx xxx xx xx">
        <input type="password" placeholder="Şifrə">

        <div class="link">Şifrəni unutmusunuz?</div>

        <button class="btn">Giriş yap</button>

        <div class="link">Hesabın yoxdur? Qeydiyyat</div>

    </div>
</div>

</body>
</html>
