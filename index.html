<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
  margin-top: 40px;
}

h2 {
  text-align: center;
}

.input {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  border: 1px solid #ccc;
  font-size: 16px;
}

.text {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
}

.row {
  display: flex;
  align-items: center;
  margin-top: 15px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 15px;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.login-btn {
  background: #ff3b00;
  color: white;
}

.register-btn {
  background: white;
  color: #ff3b00;
  border: 2px solid #ff3b00;
}
</style>

</head>

<body>

<div class="container">

<h2>Daxil ol</h2>

<input class="input" placeholder="Mobil nömrə/Üzv Nömrəsi">

<p class="text">Mobil nömrənin əvvəlində sıfır qeyd olunmalıdır.</p>

<input class="input" type="password" placeholder="Şifrə">

<div class="row">
  <input type="checkbox">
  <span style="margin-left:10px;">Məni xatırla</span>
</div>

<p class="text">Şifrəni unutmusunuz?</p>

<button class="btn login-btn">DAXİL OL</button>

<button class="btn register-btn">QEYDİYYATDAN KEÇ</button>

</div>

</body>
</html>
