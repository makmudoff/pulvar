<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Cüzdan 2026</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#eaf3ff;
 text-align:center;
}

.app{
 max-width:400px;
 margin:0 auto;
 padding:20px;
}

.balance{
 font-size:40px;
 margin:20px 0;
}

button{
 width:100%;
 padding:12px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#2a7cff;
 color:white;
 font-size:16px;
}

.card{
 background:white;
 padding:15px;
 border-radius:15px;
 margin-top:15px;
}

.hidden{
 display:none;
}
</style>

</head>
<body>

<div class="app">

<h2>Online Cüzdan 2026</h2>

<div class="balance" id="balance">0 AZN</div>

<button onclick="show('add')">Balans artır</button>
<button onclick="show('transfer')">Köçürmə</button>
<button onclick="show('pay')">Ödəniş</button>

<div id="add" class="card hidden">
<h3>Balans artır</h3>
<input id="addAmount" placeholder="Məbləğ">
<button onclick="addMoney()">Əlavə et</button>
</div>

<div id="transfer" class="card hidden">
<h3>Köçürmə</h3>
<input id="to" placeholder="Kimə">
<input id="amount" placeholder="Məbləğ">
<button onclick="send()">Göndər</button>
</div>

<div id="pay" class="card hidden">
<h3>Ödəniş</h3>
<input id="service" placeholder="Xidmət">
<input id="payAmount" placeholder="Məbləğ">
<button onclick="pay()">Ödə</button>
</div>

<div class="card">
<h3>Tarixçə</h3>
<ul id="history"></ul>
</div>

</div>

<script>
let balance = 0;

function update(){
 document.getElementById("balance").innerText = balance + " AZN";
}

function show(id){
 document.getElementById("add").classList.add("hidden");
 document.getElementById("transfer").classList.add("hidden");
 document.getElementById("pay").classList.add("hidden");
 document.getElementById(id).classList.remove("hidden");
}

function addMoney(){
 let a = parseFloat(document.getElementById("addAmount").value);
 if(a>0){
   balance+=a;
   update();
   addHistory("Balans artırıldı: "+a);
 }
}

function send(){
 let a = parseFloat(document.getElementById("amount").value);
 let to = document.getElementById("to").value;
 if(a>0 && a<=balance){
   balance-=a;
   update();
   addHistory("Göndərildi "+a+" → "+to);
 }
}

function pay(){
 let a = parseFloat(document.getElementById("payAmount").value);
 let s = document.getElementById("service").value;
 if(a>0 && a<=balance){
   balance-=a;
   update();
   addHistory("Ödəniş "+s+" "+a);
 }
}

function addHistory(t){
 let li = document.createElement("li");
 li.innerText = t;
 document.getElementById("history").appendChild(li);
}

update();
</script>

</body>
</html>
