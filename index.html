<script>
function loadAZNews(type){

let rss = "";

if(type=="report"){
  rss = "https://report.az/rss/";
}
else if(type=="apa"){
  rss = "https://apa.az/rss";
}
else{
  rss = "https://report.az/rss/";
}

fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(rss))
.then(res => res.text())
.then(str => new window.DOMParser().parseFromString(str, "text/xml"))
.then(data => {

let items = data.querySelectorAll("item");
let html = "";

items.forEach((el, index) => {

if(index > 8) return;

let title = el.querySelector("title").textContent;
let link = el.querySelector("link").textContent;

html += `
<div style="
  background:#0f172a;
  padding:15px;
  border-radius:15px;
  margin:10px;
">
<a href="${link}" target="_blank" style="color:white; text-decoration:none;">
  ${title}
</a>
</div>
`;

});

document.getElementById("news").innerHTML = html;

});
}

loadAZNews('all');
</script>
