<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Fələk Çarxı</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 50px; }
h1 { color: gold; font-size: 36px; }
#balance { font-size: 20px; margin: 20px; }
#spinBtn, #withdrawBtn { padding: 12px 20px; margin: 10px; font-size: 18px; cursor: pointer; border:none; border-radius:8px; background:#FF4500; color:#fff; }
#spinBtn:hover, #withdrawBtn:hover { background:#FF6347; }
#wheelContainer { position: relative; width: 300px; height: 300px; margin: 40px auto; }
#wheel { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #fff; position: relative; transition: transform 5s cubic-bezier(0.25,1,0.5,1); }
.segment { position: absolute; width: 50%; height: 50%; background: red; transform-origin: 100% 100%; clip-path: polygon(100% 0, 0 0, 100% 100%); text-align:right; padding-right:10px; font-weight:bold; }
.segment1 { background:#FF0000; transform:rotate(0deg); }   /* 1₼ */
.segment2 { background:#00FF00; transform:rotate(72deg); }  /* 5₼ */
.segment3 { background:#0000FF; transform:rotate(144deg); } /* 10₼ */
.segment4 { background:#FFFF00; transform:rotate(216deg); } /* 15₼ */
.segment5 { background:#FF00FF; transform:rotate(288deg); } /* 20₼ */
#pointer { width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid gold; position:absolute; top:-30px; left:calc(50% - 15px); }
#message { margin-top:20px; font-size:18px; color:#00FF00; }
</style>
</head>
<body>

<h1>Fələk Çarxı</h1>
<p id="balance">Balans: 0₼ | Qalan Spinlər: 10</p>
<button id="spinBtn" onclick="spinWheel()">Bəxtini sınamaq</button>
<button id="withdrawBtn" onclick="withdraw()">Pul Çıxart</button>

<div id="wheelContainer">
    <div id="pointer"></div>
    <div id="wheel">
        <div class="segment segment1">1₼</div>
        <div class="segment segment2">5₼</div>
        <div class="segment segment3">10₼</div>
        <div class="segment segment4">15₼</div>
        <div class="segment segment5">20₼</div>
    </div>
</div>

<p id="message"></p>

<script>
let balance = 0;
let spinsLeft = 10;

function updateBalance() {
    document.getElementById('balance').innerText = "Balans: " + balance + "₼ | Qalan Spinlər: " + spinsLeft;
}

function spinWheel() {
    if(spinsLeft <= 0) { alert("Spin imkanınız bitdi!"); return; }
    spinsLeft--;

    const wheel = document.getElementById('wheel');
    const segments = [1,5,10,15,20];
    const segmentCount = segments.length;
    
    // Random spin nəticəsi
    const chosenIndex = Math.floor(Math.random()*segmentCount);
    const degreesPerSegment = 360 / segmentCount;
    const extraSpins = 5; // fırlatma tam tur
    const rotateDeg = (360 * extraSpins) + (chosenIndex * degreesPerSegment) + degreesPerSegment/2;

    wheel.style.transition = "transform 5s cubic-bezier(0.25,1,0.5,1)";
    wheel.style.transform = `rotate(${rotateDeg}deg)`;

    setTimeout(() => {
        const prize = segments[chosenIndex];
        balance += prize;
        document.getElementById('message').innerText = "🎉 Qazandınız: " + prize + "₼!";
        updateBalance();
    }, 5200);
}

function withdraw() {
    let whatsappNumber = "0552334815";
    let text = "Salam, mən pul çıxartmaq istəyirəm. Balansım: " + balance + "₼";
    let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank");
}

updateBalance();
</script>

</body>
</html>
