<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Cüzdan 2026</title>
<style>
body{
 font-family:sans-serif;
 background:#eef4f7;
 text-align:center;
}

.box{
 background:white;
 padding:20px;
 border-radius:10px;
 width:300px;
 margin:100px auto;
}

input{
 width:100%;
 padding:10px;
 margin:5px 0;
}

button{
 width:100%;
 padding:10px;
 background:blue;
 color:white;
 border:none;
 margin-top:5px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div id="login" class="box">
<h2>Giriş</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifrə">
<button onclick="login()">Daxil ol</button>
<button onclick="showReg()">Qeydiyyat</button>
</div>

<div id="register" class="box hidden">
<h2>Qeydiyyat</h2>
<input id="rEmail" placeholder="Email">
<input id="rPass" type="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyat et</button>
</div>

<div id="app" class="hidden">
<h1>Online Cüzdan 2026</h1>
<h2 id="bal">0 AZN</h2>

<input id="money" placeholder="Məbləğ">
<button onclick="add()">Balans artır</button>

<button onclick="logout()">Çıxış</button>
</div>

<script>
let bal=0;

function register(){
 let e=document.getElementById("rEmail").value;
 let p=document.getElementById("rPass").value;
 localStorage.setItem("user",JSON.stringify({e,p}));
 alert("Qeydiyyat tamam");
}

function login(){
 let e=document.getElementById("email").value;
 let p=document.getElementById("pass").value;
 let u=JSON.parse(localStorage.getItem("user"));

 if(u && u.e==e && u.p==p){
   document.getElementById("login").classList.add("hidden");
   document.getElementById("app").classList.remove("hidden");
 }else{
   alert("Səhv məlumat");
 }
}

function add(){
 let m=parseFloat(document.getElementById("money").value);
 if(m>0){
   bal+=m;
   document.getElementById("bal").innerText=bal+" AZN";
 }
}

function logout(){
 location.reload();
}

function showReg(){
 document.getElementById("login").classList.add("hidden");
 document.getElementById("register").classList.remove("hidden");
}
</script>

</body>
</html>
