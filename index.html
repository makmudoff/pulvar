<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Oyun Sistemi</title>
</head>
<body>

<h2>Qeydiyyat</h2>
<input id="regUser" placeholder="Istifadeci adi"><br>
<input id="regEmail" placeholder="Email"><br>
<input id="regPass" type="password" placeholder="Parol"><br>
<button onclick="register()">Qeydiyyatdan kec</button>

<h2>Login</h2>
<input id="loginUser" placeholder="Istifadeci adi"><br>
<input id="loginPass" type="password" placeholder="Parol"><br>
<button onclick="login()">Daxil ol</button>

<div id="codeDiv" style="display:none;">
<h3>Kod daxil et</h3>
<input id="codeInput">
<button onclick="checkCode()">Təsdiq et</button>
</div>

<div id="game" style="display:none;">
<h3>Tapmaca Oyunu</h3>
<p id="balance">Balans: 0 AZN</p>
<p id="earn">Qazanc: 0 AZN</p>

<button onclick="startGame()">Oyuna başla</button><br><br>

<button onclick="withdraw()">Pul çıxart</button>
<button onclick="deposit()">Balans artır</button>

<div id="quiz" style="display:none;">
<p id="question"></p>
<input id="answer">
<button onclick="checkAnswer()">Cavab</button>
</div>

</div>

<p id="msg"></p>

<script>

let user = {};
let kod = "12345";
let used = false;

let balance = 0;
let earn = 0;
let current = 0;

let questions = [
  {q:"2+2=?", a:"4"},
  {q:"3+5=?", a:"8"},
  {q:"10-2=?", a:"8"},
  {q:"6+1=?", a:"7"},
  {q:"9-3=?", a:"6"},
  {q:"5+5=?", a:"10"},
  {q:"7-2=?", a:"5"},
  {q:"4+4=?", a:"8"},
  {q:"8-1=?", a:"7"},
  {q:"3+3=?", a:"6"}
];

function register(){
  user.name = regUser.value;
  user.email = regEmail.value;
  user.pass = regPass.value;
  msg.innerText = "Qeydiyyat tamamlandı. Login olun.";
}

function login(){
  if(loginUser.value === user.name && loginPass.value === user.pass){
    msg.innerText = "Kod daxil edin";
    codeDiv.style.display = "block";
  } else {
    msg.innerText = "Yanlış məlumat";
  }
}

function checkCode(){
  if(codeInput.value === kod && !used){
    used = true;
    msg.innerText = "Daxil oldunuz";
    game.style.display = "block";
  } else {
    msg.innerText = "Kod səhvdir və ya istifadə olunub";
  }
}

function startGame(){
  if(balance <= 0){
    alert("Balans 0-dır!");
    return;
  }
  current = 0;
  earn = 0;
  quiz.style.display = "block";
  showQuestion();
}

function showQuestion(){
  question.innerText = questions[current].q;
}

function checkAnswer(){
  if(balance < 0.2){
    alert("Balans bitdi!");
    return;
  }

  balance -= 0.2;

  if(answer.value == questions[current].a){
    earn += 0.5;
  }

  current++;

  balanceText();

  if(current < 10){
    showQuestion();
    answer.value = "";
  } else {
    quiz.style.display = "none";

    if(earn >= 5){
      balance += 5;
      alert("10/10 qazandın! +5 AZN");
    } else {
      alert("Oyun bitdi");
    }

    balanceText();
  }
}

function balanceText(){
  document.getElementById("balance").innerText = "Balans: " + balance.toFixed(2) + " AZN";
  document.getElementById("earn").innerText = "Qazanc: " + earn.toFixed(2) + " AZN";
}

function withdraw(){
  let text = "Pul çıxartmaq istəyirəm. Balans: " + balance;
  window.location.href = "https://wa.me/994552334815?text=" + encodeURIComponent(text);
}

function deposit(){
  let amount = prompt("Məbləğ daxil et:");
  if(amount){
    let text = "Balans artırmaq istəyirəm. Məbləğ: " + amount;
    window.location.href = "https://wa.me/994552334815?text=" + encodeURIComponent(text);
  }
}

</script>

</body>
</html>
