<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG UC Satışı</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1 {
    margin-top:20px;
    color:#00ffcc;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:30px;
}

.card {
    background:#1e293b;
    padding:20px;
    margin:10px;
    border-radius:15px;
    width:200px;
    box-shadow:0 0 15px #00ffcc55;
}

.card h2 {
    color:#00ffcc;
}

.price {
    font-size:20px;
    margin:10px 0;
}

button {
    background:#00ffcc;
    border:none;
    padding:10px;
    width:100%;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#00cca3;
}
</style>

<script>
function buy(packageName){
    alert("Seçdiyiniz paket: " + packageName + "\\nTelegrama yönləndirilirsiniz...");
    
    window.location.href = "https://t.me/miko_0055";
}
</script>

</head>

<body>

<h1>PUBG UC Satışı</h1>
<p>⚡ Sürətli | Etibarlı | Ucuz qiymət</p>

<div class="container">

<div class="card">
    <h2>60 UC</h2>
    <div class="price">1.49 AZN</div>
    <button onclick="buy('60 UC')">Sifariş et</button>
</div>

<div class="card">

<div class="card">

</div>

<div class="card">
    <h2>3850 UC</h2>
    <div class="price">72.99 AZN</div>
    <button onclick="buy('3850 UC')">Sifariş et</button>
</div>

</div>

<p style="margin-top:30px;">
📩 Sifariş üçün Telegram: <br>
<b>t.me/miko_0055</b>
