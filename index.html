<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Kredit</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4fffc;color:#111;padding-bottom:90px;}

.top-banner{
background:linear-gradient(90deg,#00796b,#00b894);
color:white;padding:14px;
display:flex;justify-content:space-between;
}

.header{display:flex;justify-content:space-between;padding:20px;}
.logo{font-size:28px;font-weight:bold;}
.logo span{color:#00b894;}

.hero{text-align:center;padding:20px;}

.card{
width:90%;margin:auto;background:#fff;
padding:20px;border-radius:20px;
border:2px solid #b8eee1;
}

.row{display:flex;justify-content:space-between;align-items:center;}

.toggle{background:#e5f5f0;padding:5px;border-radius:15px;}
.toggle button{padding:10px;border:none;border-radius:10px;}
.toggle .on{background:#00b894;color:white;}

.info-box{
border:2px dashed #9de2d2;
padding:15px;border-radius:15px;margin:15px 0;
}

.info-line{display:flex;justify-content:space-between;margin:8px 0;}

input,select{
width:100%;padding:10px;margin-top:10px;
border:2px solid #b8eee1;border-radius:10px;
}

.schedule{
border:2px dashed #9de2d2;
padding:15px;border-radius:15px;margin-top:20px;
}

.schedule div{display:flex;justify-content:space-between;margin:6px 0;}

.apply-box button{
width:100%;padding:12px;margin-top:10px;
background:#00b894;color:white;border:none;border-radius:10px;
}

.bottom-menu{
position:fixed;bottom:0;width:100%;
display:grid;grid-template-columns:1fr 1fr;
background:#fff;padding:10px;
}

.bottom-menu a{
text-align:center;padding:10px;
border:2px solid #b8eee1;color:#00b894;
border-radius:10px;text-decoration:none;
}

.bottom-menu a:last-child{background:#00b894;color:white;}

#termsPage{
position:fixed;inset:0;background:white;
display:none;padding:20px;z-index:9999;
}
</style>
</head>

<body>

<div class="top-banner">
<div>5%-dən başlayan komissiya</div>
<button onclick="submitForm()">Müraciət et</button>
</div>

<div class="header">
<div class="logo">pul<span>var</span></div>
</div>

<div class="hero">
<h2>Banksız kredit</h2>
</div>

<div class="card">

<div class="row">
<h3>Rəsmi işin var?</h3>
<div class="toggle">
<button class="on" id="noBtn">Xeyr</button>
<button id="yesBtn">Bəli</button>
</div>
</div>

<div class="info-box">
<div class="info-line"><span>Məbləğ</span><b id="amount">500 ₼</b></div>
<div class="info-line"><span>Geri ödəniş</span><b id="return">642 ₼</b></div>
<div class="info-line"><span>Müddət</span><b id="timeText">1 ay</b></div>
</div>

<input type="range" min="100" max="500" value="500" id="range">

<select id="timeSelect">
<option value="45">45 gün</option>
<option value="60">2 ay</option>
<option value="90">3 ay</option>
<option value="180">6 ay</option>
<option value="365">12 ay</option>
</select>

<div class="schedule">
<div><span>15 gün</span><b id="d15"></b></div>
<div><span>20 gün</span><b id="d20"></b></div>
<div><span>25 gün</span><b id="d25"></b></div>
<div><span>30 gün</span><b id="d30"></b></div>
</div>

<div class="apply-box">
<input id="name" placeholder="Ad soyad">
<input id="phone" placeholder="055-555-55-55">
<input id="fin" placeholder="FIN kod">
<button onclick="submitForm()">Kredit al</button>
</div>

</div>

<div class="bottom-menu">
<a href="#">Məlumat</a>
<a href="#" onclick="submitForm()">Kredit al</a>
</div>

<!-- TERMS -->
<div id="termsPage">
<button onclick="closeTerms()">←</button>
<h2>Şərtlər</h2>
<p>Kredit tarixçəniz yoxlanacaq</p>
<button>1 AZN ödə</button>
</div>

<script>
const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const range=document.getElementById("range");
const timeSelect=document.getElementById("timeSelect");

noBtn.onclick=()=>{
noBtn.classList.add("on");
yesBtn.classList.remove("on");
range.max=500;
calc();
};

yesBtn.onclick=()=>{
yesBtn.classList.add("on");
noBtn.classList.remove("on");
range.max=3000;
calc();
};

function calc(){
let amount=Number(range.value);
let days=Number(timeSelect.value);
let total=Math.round(amount+(amount*(0.2+(days/365)*0.3)));

amountEl.innerText=amount+" ₼";
returnEl.innerText=total+" ₼";
timeText.innerText=timeSelect.options[timeSelect.selectedIndex].text;

d15.innerText=Math.round(total*0.85)+" ₼";
d20.innerText=Math.round(total*0.9)+" ₼";
d25.innerText=Math.round(total*0.95)+" ₼";
d30.innerText=total+" ₼";
}

range.oninput=calc;
timeSelect.onchange=calc;
calc();

/* VALIDATION + OPEN TERMS */
function submitForm(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let fin=document.getElementById("fin").value.trim();

if(name.length<5){
alert("Ad soyad düzgün yazılmayıb");
return;
}

if(!/^0\d{2}-\d{3}-\d{2}-\d{2}$/.test(phone)){
alert("Telefon nömrəsi səhvdir");
return;
}

if(fin.length!=7){
alert("FIN kod səhvdir");
return;
}

openTerms();
}

function openTerms(){
document.getElementById("termsPage").style.display="block";
}

function closeTerms(){
document.getElementById("termsPage").style.display="none";
}
</script>

</body>
</html>
