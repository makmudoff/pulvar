<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: #0b0b0b;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);

  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 95%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  padding: 20px;
  position: relative;
}

/* 🔥 YENİ BONUS TEXT */
.bonus-text {
  background: #2f73f6;
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  font-size: 15px;
  text-align: center;
  margin-bottom: 15px;
  font-weight: 600;
}

.close {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 22px;
  border: none;
  background: none;
}

.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 15px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #eee;
  font-size: 16px;
}

.tab.active {
  background: #2f73f6;
  color: #fff;
}

.field {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: #f1f1f1;
  margin-bottom: 12px;
  font-size: 16px;
}

.forgot {
  color: #2f73f6;
  text-decoration: none;
  display: block;
  margin-bottom: 15px;
}

.login-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #56b653;
  color: white;
  font-size: 18px;
  margin-bottom: 15px;
}

.bottom-text {
  text-align: center;
  font-size: 16px;
}

.bottom-text a {
  color: #2f73f6;
  text-decoration: none;
  display: block;
  margin-top: 5px;
}

#emailFields {
  display: none;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="login-box">

    <button class="close">×</button>

    <!-- 🔥 BURADA BONUS YAZI -->
    <div class="bonus-text">
      Qeydiyyatdan keç, minimum 10 AZN depozit et və 100 AZN bonus qazan. Sonra qazancını rahatlıqla kartına köçür!
    </div>

    <div class="title">Giriş</div>

    <div class="tabs">
      <button class="tab active" id="phoneTab" onclick="showPhone()">Telefon</button>
      <button class="tab" id="emailTab" onclick="showEmail()">E-poçt</button>
    </div>

    <div id="phoneFields">
      <input class="field" placeholder="+994 00 000 00 00">
    </div>

    <div id="emailFields">
      <input class="field" placeholder="E-poçt">
    </div>

    <input class="field" placeholder="Şifrə" type="password">

    <a class="forgot" href="#">Şifrəni unutmusunuz?</a>

    <button class="login-btn">Giriş et</button>

    <div class="bottom-text">
      Hesabın yoxdur?
      <a href="#">Qeydiyyatdan keç</a>
    </div>

  </div>
</div>

<script>
function showPhone() {
  document.getElementById("phoneFields").style.display = "block";
  document.getElementById("emailFields").style.display = "none";
  document.getElementById("phoneTab").classList.add("active");
  document.getElementById("emailTab").classList.remove("active");
}

function showEmail() {
  document.getElementById("phoneFields").style.display = "none";
  document.getElementById("emailFields").style.display = "block";
  document.getElementById("emailTab").classList.add("active");
  document.getElementById("phoneTab").classList.remove("active");
}
</script>

</body>
</html>
