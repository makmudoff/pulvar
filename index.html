<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Kredit</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:#f4fffc;
  color:#111827;
  padding-bottom:90px;
}

.top-banner{
  background:linear-gradient(90deg,#00796b,#00b894);
  color:white;
  padding:14px;
  display:flex;
  justify-content:space-between;
}

.top-banner button{
  background:white;
  color:#00796b;
  border:none;
  padding:10px 16px;
  border-radius:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{font-size:28px;font-weight:bold;}
.logo span{color:#00b894}

.lang button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  margin-left:5px;
}

.active{background:#111;color:white}

.hero{text-align:center;padding:20px}

.card{
  width:90%;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:20px;
  border:2px solid #b8eee1;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle{
  background:#e5f5f0;
  padding:5px;
  border-radius:15px;
}

.toggle button{
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:#777;
}

.toggle .on{
  background:#00b894;
  color:white;
}

.info-box{
  border:2px dashed #9de2d2;
  border-radius:15px;
  padding:15px;
  margin:15px 0;
}

.info-line{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

input[type=range]{width:100%;accent-color:#00b894}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:2px solid #b8eee1;
  border-radius:10px;
}

.schedule{
  border:2px dashed #9de2d2;
  padding:15px;
  border-radius:15px;
  margin-top:20px;
}

.schedule div{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

.apply-box{
  margin-top:20px;
  background:#e9fff8;
  padding:15px;
  border-radius:15px;
}

.apply-box input{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:2px solid #b8eee1;
  border-radius:10px;
}

.apply-box button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#00b894;
  color:white;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  background:white;
  padding:10px;
}

.bottom-menu a{
  text-align:center;
  padding:12px;
  border:2px solid #b8eee1;
  color:#00b894;
  border-radius:10px;
  text-decoration:none;
}

.bottom-menu a:last-child{
  background:#00b894;
  color:white;
}
</style>
</head>

<body>

<div class="top-banner">
  <div id="banner">5%-dən başlayan komissiya</div>
</div>

<div class="header">
  <div class="logo">pul<span>var</span></div>
  <div class="lang">
    <button class="active" onclick="setLang('az')">AZ</button>
    <button onclick="setLang('ru')">RU</button>
  </div>
</div>

<div class="hero">
  <h2 id="title">Banksız kredit</h2>
</div>

<div class="card">

<div class="row">
<h3 id="job">Rəsmi işin var?</h3>
<div class="toggle">
<button class="on" id="noBtn">Xeyr</button>
<button id="yesBtn">Bəli</button>
</div>
</div>

<div class="info-box">
<div class="info-line"><span id="amountLabel">Məbləğ</span><b id="amount">500 ₼</b></div>
<div class="info-line"><span id="returnLabel">Geri ödəniş</span><b id="return">642 ₼</b></div>
<div class="info-line"><span id="timeLabel">Müddət</span><b id="timeText">1 ay</b></div>
</div>

<input type="range" min="100" max="500" value="500" id="range">

<select id="timeSelect">
<option value="45">45 gün</option>
<option value="60">2 ay</option>
<option value="90">3 ay</option>
<option value="180">6 ay</option>
<option value="365">12 ay</option>
</select>

<div class="schedule">
<div><span>15 gün</span><b id="d15">546 ₼</b></div>
<div><span>20 gün</span><b id="d20">578 ₼</b></div>
<div><span>25 gün</span><b id="d25">610 ₼</b></div>
<div><span>30 gün</span><b id="d30">642 ₼</b></div>
</div>

<div class="apply-box">
<input id="name" placeholder="Ad soyad">
<input id="phone" placeholder="055-555-55-55">
<input id="fin" placeholder="FIN kod">
<button onclick="submitForm()">Kredit al</button>
</div>

</div>

<div class="bottom-menu">
<a href="#">Məlumat</a>
<a href="#">Kredit al</a>
</div>

<script>
let range=document.getElementById("range");
let timeSelect=document.getElementById("timeSelect");

function calc(){
let amount=Number(range.value);
let days=Number(timeSelect.value);
let total=Math.round(amount+(amount*(0.2+(days/365)*0.3)));

amountEl.innerText=amount+" ₼";
returnEl.innerText=total+" ₼";
timeText.innerText=timeSelect.options[timeSelect.selectedIndex].text;
}

range.oninput=calc;
timeSelect.onchange=calc;

calc();

/* VALIDATION */
let blocked=false;

function submitForm(){
if(blocked)return;

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let fin=document.getElementById("fin").value.trim();

if(name.length<5){
alert("Ad soyadinizi duzgun qeyd edin");
return;
}

let phoneRegex=/^0\d{2}-\d{3}-\d{2}-\d{2}$/;

if(!phoneRegex.test(phone)){
alert("Telefon nomresini duzgun yazin (055-555-55-55)");
blocked=true;
setTimeout(()=>blocked=false,20000);
return;
}

if(fin.length!=7){
alert("FIN kod 7 simvol olmalidir");
return;
}

alert("Kredit muracietiniz qebul olundu");
}

/* LANG */
function setLang(lang){
if(lang=="ru"){
title.innerText="Кредит без банка";
job.innerText="Есть работа?";
amountLabel.innerText="Сумма";
returnLabel.innerText="К возврату";
timeLabel.innerText="Срок";
}else{
title.innerText="Banksız kredit";
job.innerText="Rəsmi işin var?";
amountLabel.innerText="Məbləğ";
returnLabel.innerText="Geri ödəniş";
timeLabel.innerText="Müddət";
}
}
</script>

</body>
</html>
