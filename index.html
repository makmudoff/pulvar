<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Shop FIX</title>

<!-- ✅ WORKING FIREBASE v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
header{padding:15px;text-align:center;background:#111827;font-size:22px;font-weight:bold}

.container{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;padding:20px}

.card{background:#1f2937;width:240px;padding:15px;border-radius:10px;text-align:center}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}
.buy{background:#2563eb;color:white;width:100%}

input{padding:8px;margin:5px;border-radius:6px;border:none;width:90%}

.panel{background:#0f172a;padding:15px;margin:15px;border-radius:10px}

.loginBox{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000000cc;display:flex;justify-content:center;align-items:center
}

.box{background:#111827;padding:20px;border-radius:10px;text-align:center}
</style>
</head>

<body>

<header>👑 GOD LEVEL SHOP (FIXED)</header>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
<div class="box">
<h3>Login</h3>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password"><br><br>
<button class="buy" onclick="login()">Daxil ol</button>
</div>
</div>

<!-- ADMIN -->
<div class="panel" id="adminPanel" style="display:none">
<h3>📦 Məhsul əlavə et</h3>
<input id="name" placeholder="Ölkə">
<input id="price" placeholder="Qiymət">
<button class="buy" onclick="addProduct()">Əlavə et</button>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<script>

/* ================= FIREBASE CONFIG ================= */
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();

/* ================= LOGIN (FIXED) ================= */
function login(){
    var email = document.getElementById("email").value;
    var pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(function(){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadProducts();
    })
    .catch(function(error){
        alert("Login xətası: " + error.message);
    });
}

/* ================= ADD PRODUCT ================= */
function addProduct(){
    var name = document.getElementById("name").value;
    var price = document.getElementById("price").value;

    db.collection("products").add({
        name:name,
        price:price
    });

    alert("Əlavə olundu");
}

/* ================= LOAD PRODUCTS ================= */
function loadProducts(){
    db.collection("products").onSnapshot(function(snapshot){

        var box = document.getElementById("products");
        box.innerHTML="";

        snapshot.forEach(function(doc){
            var p = doc.data();

            box.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <div>${p.price}</div>
                <button class="buy" onclick="buy('${p.name}','${p.price}')">
                Sifariş et
                </button>
            </div>`;
        });

    });
}

/* ================= BUY ================= */
function buy(name,price){
    var phone = "994XXXXXXXXX";

    var msg = "Sifariş: " + name + " - " + price;

    window.open(
        "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg),
        "_blank"
    );
}

</script>

</body>
</html>
