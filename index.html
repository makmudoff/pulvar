<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapMəni!</title>
<style>
body {margin:0; font-family: Arial, sans-serif; background: linear-gradient(135deg,#111,#333); color:#fff; text-align:center;}
main {padding:20px; max-width:700px; margin:auto;}
h1#main-title {text-align:center; font-size:2.5em; color:#ffcc00; margin-top:50px; font-weight:bold; text-shadow:2px 2px 5px #000;}
button {padding:10px 20px; border:none; border-radius:5px; background:#ffcc00; color:#111; cursor:pointer; margin:5px;}
button:hover {transform:scale(1.05);}
input[type="text"], input[type="password"], input[type="email"], input[type="number"] {padding:10px; width:70%; margin:10px 0; border-radius:5px; border:none; display:block; margin-left:auto; margin-right:auto;}
#result,#login-result,#reg-result,#code-result,#status,#balance-display,#receipt-result{margin-top:10px;}
section{display:none;}
a{color:#ffcc00; text-decoration:none; font-weight:bold;}
a:hover{text-decoration:underline;}
</style>
</head>
<body>

<h1 id="main-title">Tapmacaya qoşul → Cavabları düzgün tap → Pul qazan!</h1>
<button id="start-btn">Başla</button>

<main>
<!-- Login -->
<section id="login-section">
<h2>Login</h2>
<input type="text" id="login-username" placeholder="İstifadəçi adı">
<input type="password" id="login-password" placeholder="Parol">
<button onclick="loginUser()">Daxil ol</button>
<p id="login-result"></p>
<p><a href="#" onclick="showRegister()">Qeydiyyatdan keç</a></p>
</section>

<!-- Qeydiyyat -->
<section id="register-section">
<h2>Qeydiyyat</h2>
<input type="text" id="reg-username" placeholder="İstifadəçi adı">
<input type="email" id="reg-email" placeholder="Email">
<input type="password" id="reg-password" placeholder="Parol">
<input type="password" id="reg-password2" placeholder="Parol təsdiqi">
<button onclick="registerUser()">Qeydiyyatdan keç</button>
<p id="reg-result"></p>
<p><a href="#" onclick="showLogin()">Login üçün geri dön</a></p>
</section>

<!-- Kod Bölməsi -->
<section id="code-section">
<h2>Məbləğ Kodunu Daxil edin</h2>
<input type="text" id="enter-code" placeholder="Kod daxil edin">
<button onclick="checkCode()">Daxil ol</button>
<p id="code-result"></p>
</section>

<!-- Tapmaca Oyunu -->
<section id="game-section">
<p id="status">Tapmaca 1 / 10 | Can: 3 | Qalan şans: 0</p>
<p id="balance-display">Balans: 0₼</p>
<h2 id="question">Tapmaca yüklənir...</h2>
<input type="text" id="answer" placeholder="Cavabı yazın">
<p id="result"></p>
<div id="balance-section">
<button onclick="showIncreaseBalance()">Balans artır</button>
<button onclick="withdrawMoney()">Pul çıxart</button>
</div>

<!-- Balans artır bölməsi -->
<section id="increase-balance-section">
<h3>Balans artırmaq üçün məbləği yazın</h3>
<input type="number" id="increase-amount" placeholder="Məbləği yazın (₼)">
<input type="file" id="receipt-file">
<button onclick="sendReceiptWithAmount()">Qəbz göndər</button>
<p id="receipt-result"></p>
</section>

</main>

<script>
// --- Ana ekran ---
document.getElementById("start-btn").addEventListener("click", function(){
    this.style.display="none";
    document.getElementById("main-title").style.display="none";
    document.getElementById("login-section").style.display="block";
});

// --- Login / Qeydiyyat ---
function showRegister(){ document.getElementById("login-section").style.display="none"; document.getElementById("register-section").style.display="block";}
function showLogin(){ document.getElementById("register-section").style.display="none"; document.getElementById("login-section").style.display="block";}

function registerUser(){
  const username=document.getElementById("reg-username").value.trim();
  const email=document.getElementById("reg-email").value.trim();
  const pass=document.getElementById("reg-password").value;
  const pass2=document.getElementById("reg-password2").value;
  if(!username||!email||!pass||!pass2){document.getElementById("reg-result").textContent="Bütün xanaları doldurun!"; return;}
  if(pass!==pass2){document.getElementById("reg-result").textContent="Parollar uyğun deyil!"; return;}
  let users=JSON.parse(localStorage.getItem("users")||"[]");
  if(users.find(u=>u.username===username)){document.getElementById("reg-result").textContent="Bu istifadəçi adı mövcuddur!"; return;}
  users.push({username,email,password:pass,balance:0});
  localStorage.setItem("users",JSON.stringify(users));
  document.getElementById("reg-result").textContent="Qeydiyyat uğurlu! İndi login olun.";
  showLogin();
}

function loginUser(){
  const username=document.getElementById("login-username").value.trim();
  const pass=document.getElementById("login-password").value;
  let users=JSON.parse(localStorage.getItem("users")||"[]");
  let user=users.find(u=>u.username===username && u.password===pass);
  if(user){
    localStorage.setItem("currentUser",JSON.stringify(user));
    document.getElementById("login-section").style.display="none";
    document.getElementById("code-section").style.display="block";
    updateBalanceDisplay();
  } else {
    document.getElementById("login-result").textContent="İstifadəçi adı və ya parol səhvdir!";
  }
}

// --- Kod Sistemi ---
const validCodes = { "Mak-1":10, "Mak-72":20, "Mak-8s":30, "Mak-90y":50, "Maw-49":100, "Ya-62":200 };
let remainingSpins = 0;

function checkCode(){
  const codeInput = document.getElementById("enter-code").value.trim();
  if(!codeInput){document.getElementById("code-result").textContent="Kod daxil edin!"; return;}
  if(!(codeInput in validCodes)){document.getElementById("code-result").textContent="Kod səhvdir! Düzgün kod daxil edin."; return;}
  remainingSpins = validCodes[codeInput];
  document.getElementById("code-result").textContent = `Kod qəbul edildi! ${remainingSpins} tapmaca oynaya bilərsiniz.`;
  delete validCodes[codeInput];
  document.getElementById("code-section").style.display="none";
  document.getElementById("game-section").style.display="block";
  initGame();
}

// --- Tapmacalar ---
const riddles = [
  {question:"Gecə gəlib, gündüz gedir, amma heç ayaq izi qoymur. Nədir?", answer:"kölgə"},
  {question:"Hər şeyə sahibdir, amma heç nəyi yox. Nədir?", answer:"boşluq"},
  {question:"Hər gün gəlib gedir, amma heç bir yerdə dayanmaz. Nədir?", answer:"zaman"}
];

let current=0,lives=3;

function initGame(){
  loadRiddle();
  document.getElementById("answer").addEventListener("keydown",function(e){
    if(e.key==="Enter") checkAnswer();
  });
  updateBalanceDisplay();
}

function updateStatus(){
  document.getElementById("status").textContent = `Tapmaca ${current+1} / ${riddles.length} | Can: ${lives} | Qalan şans: ${remainingSpins}`;
}

function updateBalanceDisplay(){
  let user=JSON.parse(localStorage.getItem("currentUser"));
  document.getElementById("balance-display").textContent = `Balans: ${user.balance.toFixed(2)}₼`;
}

function loadRiddle(){
  if(current<riddles.length && remainingSpins>0){
    document.getElementById("question").textContent=riddles[current].question;
    document.getElementById("answer").value="";
    document.getElementById("result").textContent="";
    updateStatus();
  } else {
    document.getElementById("question").textContent="Oyun bitdi!";
    document.getElementById("answer").style.display="none";
    document.getElementById("result").textContent="Yeni kod daxil edin və oynamağa davam edin!";
  }
}

function checkAnswer(){
  if(remainingSpins<=0) return;
  let userAns=document.getElementById("answer").value.toLowerCase().trim();
  let correctAns=riddles[current].answer.toLowerCase();
  let result=document.getElementById("result");
  let user=JSON.parse(localStorage.getItem("currentUser"));
  
  if(user.balance<0.2){result.textContent="Balansınız kifayət qədər deyil!"; return;}
  
  remainingSpins--;
  user.balance-=0.2;
  
  if(!userAns){result.textContent="Cavabı daxil edin!"; return;}
  if(userAns===correctAns){
    current++;
    user.balance+=0.12;
    result.textContent=`Düzdür! Növbəti tapmaca gəlir... Qalan şans: ${remainingSpins}`;
    setTimeout(loadRiddle,500);
  } else {
    lives--;
    if(lives<=0){result.textContent="Oyun bitdi! Canlarınız qurtardı."; document.getElementById("answer").style.display="none";}
    else{result.textContent=`Yanlış cavab! Qalan can: ${lives}, Qalan şans: ${remainingSpins}`;}
    updateStatus();
  }
  
  localStorage.setItem("currentUser",JSON.stringify(user));
  updateBalanceDisplay();
  
  if(remainingSpins<=0){result.textContent="Şanslarınız bitdi! Yenə kod daxil edin."; document.getElementById("answer").style.display="none";}
}

// --- Pul çıxartmaq / Balans artır ---
function withdrawMoney(){
  alert("WhatsApp mesajı göndərildi: Salam, birdaha mən pul çıxartmaq istəyirəm.\nNomre: 0552334814");
}

function showIncreaseBalance(){
  document.getElementById("increase-balance-section").style.display="block";
}

function sendReceiptWithAmount(){
  const amount=document.getElementById("increase-amount").value;
  const file=document.getElementById("receipt-file").files[0];
  if(!amount){document.getElementById("receipt-result").textContent="Məbləği daxil edin!"; return;}
  if(!file){document.getElementById("receipt-result").textContent="Zəhmət olmasa qəbz seçin!"; return;}
  alert(`WhatsApp mesajı göndərildi: Ödəniş məbləği: ${amount}₼, Qəbz əlavə edildi.\nNomre: 0552334814`);
  document.getElementById("receipt-result").textContent="Qəbz uğurla göndərildi!";
  document.getElementById("increase-balance-section").style.display="none";
}
</script>
