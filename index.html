<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Premium Sistem</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #111827;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: none;
}

button {
    width: 95%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.hidden { display:none; }

.link {
    color:#38bdf8;
    cursor:pointer;
    font-size:14px;
}
</style>

</head>

<body>

<!-- Welcome -->
<div id="welcome" class="box">
    <h2>Xoş gəlmisiniz</h2>
    <button onclick="goLogin()">Davam et</button>
</div>

<!-- Login -->
<div id="login" class="box hidden">
    <h2>Daxil ol</h2>
    <input id="lUser" placeholder="İstifadəçi adı">
    <input type="password" id="lPass" placeholder="Parol">
    <button onclick="login()">Daxil ol</button>
    <p id="loginErr" style="color:red;"></p>

    <p class="link" onclick="goRegister()">Qeydiyyat et</p>
</div>

<!-- Register -->
<div id="register" class="box hidden">
    <h2>Qeydiyyat</h2>
    <input id="rUser" placeholder="İstifadəçi adı">
    <input type="password" id="rPass" placeholder="Parol">
    <input type="password" id="rPass2" placeholder="Parolu təkrar et">
    <input id="phone" placeholder="Telefon nömrəsi">

    <button onclick="register()">Qeydiyyatdan keç</button>
    <p id="regMsg"></p>

    <p class="link" onclick="goLogin()">Geri dön</p>
</div>

<!-- ADMIN PANEL -->
<div id="panel" class="box hidden">
    <h2>Admin Panel</h2>

    <h3>Balans: <span id="balance">0.00</span> ₼</h3>

    <button onclick="toggle('earn')">Pul qazan</button>
    <button onclick="toggle('ref')">Referall</button>
    <button onclick="toggle('withdraw')">Pul çıxar</button>

    <div id="earn" class="hidden">
        <p>Tapşırıq tamamla +0.50₼</p>
        <button onclick="earnMoney()">Qazan</button>
    </div>

    <div id="ref" class="hidden">
        <p>1 referall = 0.35₼</p>
        <p>Link: site.com/ref123</p>
    </div>

    <div id="withdraw" class="hidden">
        <p>Minimum: 5₼</p>
    </div>
</div>

<script>

let balance = 0;

function goLogin(){
    hideAll();
    login.classList.remove("hidden");
}

function goRegister(){
    hideAll();
    register.classList.remove("hidden");
}

function hideAll(){
    welcome.classList.add("hidden");
    login.classList.add("hidden");
    register.classList.add("hidden");
    panel.classList.add("hidden");
}

function register(){
    let u = rUser.value;
    let p = rPass.value;
    let p2 = rPass2.value;
    let ph = phone.value;

    if(!u || !p || !p2 || !ph){
        regMsg.style.color="red";
        regMsg.innerText="Bütün sahələri doldurun!";
        return;
    }

    if(p !== p2){
        regMsg.style.color="red";
        regMsg.innerText="Parollar eyni deyil!";
        return;
    }

    localStorage.setItem("user", JSON.stringify({u,p}));

    regMsg.style.color="lightgreen";
    regMsg.innerText="Qeydiyyatdan keçdiniz...";

    setTimeout(()=>{
        hideAll();
        panel.classList.remove("hidden");
    },3000);
}

function login(){
    let saved = JSON.parse(localStorage.getItem("user"));

    if(!saved || saved.u !== lUser.value || saved.p !== lPass.value){
        loginErr.innerText="Belə istifadəçi yoxdur!";
        return;
    }

    hideAll();
    panel.classList.remove("hidden");
}

function toggle(id){
    document.getElementById(id).classList.toggle("hidden");
}

function earnMoney(){
    balance += 0.5;
    document.getElementById("balance").innerText = balance.toFixed(2);
}

</script>

</body>
</html>
