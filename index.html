<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD LEVEL SHOP</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
header{padding:15px;text-align:center;background:#111827;font-size:22px;font-weight:bold}

.container{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;padding:20px}

.card{background:#1f2937;width:240px;padding:15px;border-radius:10px;text-align:center}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}
.buy{background:#2563eb;color:white;width:100%}
.adminBtn{background:#f59e0b}

input{padding:8px;margin:5px;border-radius:6px;border:none;width:90%}

.panel{background:#0f172a;padding:15px;margin:15px;border-radius:10px}

.loginBox{position:fixed;top:0;left:0;width:100%;height:100%;
background:#000000cc;display:flex;justify-content:center;align-items:center}

.box{background:#111827;padding:20px;border-radius:10px;text-align:center}

.badge{background:#22c55e;padding:3px 8px;border-radius:5px;font-size:12px}
</style>
</head>

<body>

<header>👑 GOD LEVEL NÖMRƏ SHOP <span class="badge">LIVE</span></header>

<!-- LOGIN -->
<div class="loginBox" id="loginBox">
<div class="box">
<h3>Admin / User Login</h3>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password"><br><br>
<button class="buy" onclick="login()">Daxil ol</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="panel" id="adminPanel" style="display:none">
<h3>📦 Məhsul əlavə et</h3>
<input id="name" placeholder="Ölkə">
<input id="price" placeholder="Qiymət">
<button class="adminBtn" onclick="addProduct()">Əlavə et</button>

<h3>📊 Sifarişlər</h3>
<div id="orders"></div>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= LOGIN ================= */
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
        document.getElementById("loginBox").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadProducts();
        loadOrders();
    })
    .catch(()=>alert("Login səhvdir"));
}

/* ================= ADD PRODUCT ================= */
function addProduct(){
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;

    db.collection("products").add({
        name,
        price,
        time: Date.now()
    });
}

/* ================= LOAD PRODUCTS ================= */
function loadProducts(){
    db.collection("products").onSnapshot(snapshot=>{
        let box = document.getElementById("products");
        box.innerHTML="";

        snapshot.forEach(doc=>{
            let p = doc.data();

            box.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <div>${p.price}</div>
                <button class="buy" onclick="buy('${p.name}','${p.price}')">
                Sifariş et
                </button>
            </div>`;
        });
    });
}

/* ================= BUY + ORDER ================= */
function buy(name,price){

    db.collection("orders").add({
        product:name,
        price:price,
        status:"pending",
        time:Date.now()
    });

    // Telegram / WhatsApp notify
    let phone="994XXXXXXXXX";
    let msg=`Sifariş: ${name} - ${price}`;

    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

/* ================= LOAD ORDERS ================= */
function loadOrders(){
    db.collection("orders").onSnapshot(snapshot=>{
        let box = document.getElementById("orders");
        box.innerHTML="";

        snapshot.forEach(doc=>{
            let o = doc.data();

            box.innerHTML += `
            <div class="card">
                <h4>${o.product}</h4>
                <div>${o.price}</div>
                <div>Status: ${o.status}</div>
            </div>`;
        });
    });
}

</script>

</body>
</html>
