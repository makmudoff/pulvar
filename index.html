<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostbet Bonus</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to bottom,#003b8f,#0050b8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Popup */

.popup{
    width:100%;
    max-width:520px;
    background:#003f8f;
    border:5px solid #ffffff;
    border-radius:40px;
    padding:70px 30px 40px;
    text-align:center;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* Mostbet Logo Circle */

.logo-circle{
    width:110px;
    height:110px;
    background:#0a4ca0;
    border-radius:50%;
    position:absolute;
    top:-55px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    border:4px solid rgba(255,255,255,0.2);
    overflow:hidden;
}

.logo-circle img{
    width:75px;
}

/* Text */

.text{
    color:white;
    font-size:34px;
    font-weight:bold;
    line-height:1.4;
}

.highlight{
    color:#ffb400;
}

/* Button */

.btn{
    display:inline-block;
    margin-top:35px;
    background:#ff5a00;
    color:white;
    text-decoration:none;
    padding:22px 60px;
    border-radius:70px;
    font-size:30px;
    font-weight:900;
    box-shadow:
        0 0 25px rgba(255,90,0,0.8),
        inset 0 -7px 0 rgba(0,0,0,0.25);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#ff6f1f;
}

</style>
</head>

<body>

<div class="popup">

    <div class="logo-circle">

        <!-- MOSTBET LOGO -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Mostbet_logo.png/640px-Mostbet_logo.png">

    </div>

    <div class="text">
        Qeydiyyatdan keçin və
        <span class="highlight">ilk depozitlərə</span>
        <br>
        <span class="highlight">150₼ BONUS</span>
        qazanın!
    </div>

    <a href="https://66avrzh.com/eb0U" class="btn">
        BONUSU ƏLDƏ EDİN
    </a>

</div>

</body>
</html>
