<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostbet Bonus Popup</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#004b9b;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Popup */

.popup{
    width:90%;
    max-width:520px;
    background:#003a7a;
    border-radius:35px;
    padding:40px 30px;
    text-align:center;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    border:4px solid white;
}

/* Gift Icon */

.icon{
    width:90px;
    height:90px;
    background:#003f88;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    color:white;
    position:absolute;
    top:-45px;
    left:50%;
    transform:translateX(-50%);
    border:3px solid rgba(255,255,255,0.2);
}

/* Text */

.text{
    margin-top:40px;
    color:white;
    font-size:36px;
    font-weight:bold;
    line-height:1.4;
}

.highlight{
    color:#ffb400;
}

/* Button */

.btn{
    display:inline-block;
    margin-top:35px;
    background:#ff5a00;
    color:white;
    text-decoration:none;
    padding:20px 55px;
    font-size:32px;
    font-weight:900;
    border-radius:60px;
    box-shadow:
        0 0 20px rgba(255,90,0,0.7),
        inset 0 -6px 0 rgba(0,0,0,0.2);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#ff6f1f;
}

</style>
</head>

<body>

<div class="popup">

    <div class="icon">
        🎁
    </div>

    <div class="text">
        Qeydiyyatdan keçin və
        <span class="highlight">ilk depozitlərə</span>
        <br>
        <span class="highlight">150₼ BONUS</span>
        qazanın!
    </div>

    <a href="https://66avrzh.com/eb0U" class="btn">
        BONUSU ƏLDƏ EDİN
    </a>

</div>

</body>
</html>
