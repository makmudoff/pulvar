<!DOCTYPE html>
<html>
<head>
  <title>Demo Lucky Spin</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      width: 320px;
      margin: 60px auto;
      border-radius: 10px;
    }

    .wheel {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 8px solid gold;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 2s ease;
      font-weight: bold;
    }

    button {
      padding: 10px;
      margin: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: gold;
      font-weight: bold;
    }

    .cooldown {
      color: red;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🎡 Lucky Spin Demo</h2>

  <p>Balans: <span id="balance">1000</span> coin</p>

  <div class="wheel" id="wheel">SPIN</div>

  <button onclick="spin()" id="spinBtn">Spin et</button>

  <p id="result"></p>
  <p class="cooldown" id="timer"></p>

  <hr>

  <button onclick="withdraw()">💸 Withdraw (WhatsApp)</button>
</div>

<script>
let balance = 1000;
let canSpin = true;
let cooldown = 60;

function spin(){
  if(!canSpin){
    return;
  }

  canSpin = false;

  let wheel = document.getElementById("wheel");
  let result = document.getElementById("result");

  let deg = Math.floor(Math.random() * 3600);
  wheel.style.transform = "rotate(" + deg + "deg)";

  setTimeout(() => {

    let prizes = [
      "Boş",
      "Yenidən fırlat",
      3,
      15,
      50,
      70,
      100,   // Jackpot
      500,   // Jackpot
      1000   // Jackpot
    ];

    let pick = prizes[Math.floor(Math.random() * prizes.length)];

    if(pick === "Boş"){
      result.innerText = "😐 Boş çıxdı";
    }
    else if(pick === "Yenidən fırlat"){
      result.innerText = "🔄 Yenidən fırlat!";
    }
    else {
      balance += pick;
      result.innerText = "🎉 Qazandın +" + pick;
    }

    document.getElementById("balance").innerText = balance;

    startCooldown();

  }, 2000);
}

function startCooldown(){
  let time = cooldown;
  let timer = document.getElementById("timer");

  let interval = setInterval(() => {
    timer.innerText = "Gözlə: " + time + " saniyə";

    time--;

    if(time < 0){
      clearInterval(interval);
      timer.innerText = "";
      canSpin = true;
    }

  }, 1000);
}

function withdraw(){
  // demo: real pul deyil, sadəcə WhatsApp mesajı
  let phone = "994551234567";
  let msg = "Salam, mənim balansım " + balance + " coin. Withdraw istəyirəm.";

  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}
</script>

</body>
</html>
