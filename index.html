<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Premium Sistem</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #111827;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 6px;
    border-radius: 5px;
    border: none;
}

button {
    width: 95%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.hidden { display:none; }

.link {
    color:#38bdf8;
    cursor:pointer;
    font-size:14px;
}
</style>

</head>

<body>

<!-- Welcome -->
<div id="welcome" class="box">
    <h2>Xoş gəlmisiniz</h2>
    <button onclick="goLogin()">Davam et</button>
</div>

<!-- Login -->
<div id="login" class="box hidden">
    <h2>Daxil ol</h2>
    <input id="lUser" placeholder="İstifadəçi adı">
    <input type="password" id="lPass" placeholder="Parol">
    <button onclick="login()">Daxil ol</button>
    <p id="loginErr" style="color:red;"></p>

    <p class="link" onclick="goRegister()">Qeydiyyat et</p>
</div>

<!-- Register -->
<div id="register" class="box hidden">
    <h2>Qeydiyyat</h2>
    <input id="rUser" placeholder="İstifadəçi adı">
    <input type="password" id="rPass" placeholder="Parol">
    <input type="password" id="rPass2" placeholder="Parolu təkrar et">
    <input id="phone" placeholder="Telefon nömrəsi">

    <button onclick="registerUser()">Qeydiyyatdan keç</button>
    <p id="regMsg"></p>

    <p class="link" onclick="goLogin()">Geri dön</p>
</div>

<!-- PANEL -->
<div id="panel" class="box hidden">
    <h2>Admin Panel</h2>

    <h3>Balans: <span id="balance">0.00</span> ₼</h3>

    <button onclick="toggleBox('earn')">Pul qazan</button>
    <button onclick="toggleBox('ref')">Referall</button>
    <button onclick="toggleBox('withdraw')">Pul çıxar</button>

    <div id="earn" class="hidden">
        <p>Tapşırıq tamamla +0.50₼</p>
        <button onclick="earn()">Qazan</button>
    </div>

    <div id="ref" class="hidden">
        <p>1 referall = 0.35₼</p>
        <p>Link: pulvar.xyz/ref123</p>
    </div>

    <div id="withdraw" class="hidden">
        <p>Minimum çıxarış: 5₼</p>
    </div>
</div>

<script>

// BALANS YADDA SAXLA
let balance = localStorage.getItem("bal") ? parseFloat(localStorage.getItem("bal")) : 0;
document.getElementById("balance").innerText = balance.toFixed(2);

// NAVIGATION
function goLogin(){
    hideAll();
    document.getElementById("login").classList.remove("hidden");
}

function goRegister(){
    hideAll();
    document.getElementById("register").classList.remove("hidden");
}

function hideAll(){
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("login").classList.add("hidden");
    document.getElementById("register").classList.add("hidden");
    document.getElementById("panel").classList.add("hidden");
}

// REGISTER
function registerUser(){
    let u = document.getElementById("rUser").value;
    let p = document.getElementById("rPass").value;
    let p2 = document.getElementById("rPass2").value;
    let ph = document.getElementById("phone").value;

    let msg = document.getElementById("regMsg");

    if(!u || !p || !p2 || !ph){
        msg.style.color="red";
        msg.innerText="Bütün sahələri doldurun!";
        return;
    }

    if(p !== p2){
        msg.style.color="red";
        msg.innerText="Parollar eyni deyil!";
        return;
    }

    localStorage.setItem("user", JSON.stringify({u,p}));

    msg.style.color="lightgreen";
    msg.innerText="Qeydiyyatdan keçdiniz...";

    setTimeout(()=>{
        hideAll();
        document.getElementById("panel").classList.remove("hidden");
    },3000);
}

// LOGIN
function login(){
    let saved = JSON.parse(localStorage.getItem("user"));

    let u = document.getElementById("lUser").value;
    let p = document.getElementById("lPass").value;

    if(!saved || saved.u !== u || saved.p !== p){
        document.getElementById("loginErr").innerText="Belə istifadəçi yoxdur!";
        return;
    }

    hideAll();
    document.getElementById("panel").classList.remove("hidden");
}

// BALANS ARTIR
function earn(){
    balance += 0.5;
    localStorage.setItem("bal", balance);
    document.getElementById("balance").innerText = balance.toFixed(2);
}

// TOGGLE
function toggleBox(id){
    let el = document.getElementById(id);
    el.classList.toggle("hidden");
}

</script>

</body>
</html>
