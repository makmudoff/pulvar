<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Pul Qazan</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* HEADER */
.header {
    padding:15px;
    font-size:22px;
    color:orange;
}

/* BALANS BOX */
.balance-box {
    border:1px solid orange;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.balance {
    font-size:40px;
    color:orange;
}

/* COIN */
.coin {
    width:200px;
    height:200px;
    background:orange;
    border-radius:50%;
    margin:30px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:black;
    cursor:pointer;
    box-shadow:0 0 40px orange;
}

/* ENERGY */
.energy-bar {
    width:90%;
    height:10px;
    background:#333;
    margin:10px auto;
    border-radius:10px;
}

.energy-fill {
    height:10px;
    background:orange;
    width:100%;
    border-radius:10px;
}

/* NAVBAR */
.nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.nav div {
    color:gray;
}
</style>

</head>

<body>

<div class="header">Pul Qazanan</div>

<div class="balance-box">
    <div>Balansınız</div>
    <div class="balance" id="bal">0.000 ₼</div>
    <div>Ümumi klik: <span id="clicks">0</span></div>
</div>

<div class="coin" onclick="mine()">₼</div>

<div>Enerji: <span id="energyText">1000</span>/1000</div>

<div class="energy-bar">
    <div class="energy-fill" id="energyBar"></div>
</div>

<div class="nav">
    <div>Əsas</div>
    <div>Tapşırıq</div>
    <div>Dostlar</div>
    <div>Reyting</div>
    <div>Profil</div>
</div>

<script>

let balance = localStorage.getItem("bal") ? parseFloat(localStorage.getItem("bal")) : 0;
let clicks = localStorage.getItem("clicks") ? parseInt(localStorage.getItem("clicks")) : 0;
let energy = localStorage.getItem("energy") ? parseInt(localStorage.getItem("energy")) : 1000;

updateUI();

function mine(){
    if(energy <= 0) return;

    balance += 0.001;
    clicks++;
    energy--;

    save();
    updateUI();
}

function updateUI(){
    document.getElementById("bal").innerText = balance.toFixed(4) + " ₼";
    document.getElementById("clicks").innerText = clicks;
    document.getElementById("energyText").innerText = energy;
    document.getElementById("energyBar").style.width = energy/10 + "%";
}

function save(){
    localStorage.setItem("bal", balance);
    localStorage.setItem("clicks", clicks);
    localStorage.setItem("energy", energy);
}

// enerji bərpa (hər 3 saniyəyə +1)
setInterval(()=>{
    if(energy < 1000){
        energy++;
        save();
        updateUI();
    }
},3000);

</script>

</body>
</html>
