<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şans Çarxı PRO</title>

<style>
body {
    text-align:center;
    font-family:Arial;
    background: linear-gradient(45deg,#ff6,#6ff,#f6f);
}

canvas {
    margin-top:20px;
    max-width:90%;
}

button {
    padding:12px 25px;
    font-size:18px;
    background:gold;
    border:none;
    border-radius:10px;
}

#balance {
    font-size:20px;
    margin-top:10px;
}

#result {
    display:none;
    background:white;
    padding:20px;
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🎡 Şans Çarxı PRO</h2>

<div id="balance">Balans: 10₼</div>

<div style="font-size:40px;">⬇️</div>

<canvas id="wheel" width="400" height="400"></canvas>
<br><br>

<button onclick="spin()">Fırlat (-1₼)</button>

<div id="result"></div>

<script>
let balance = 10;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

// ŞANS SİSTEMİ (boş çoxdur)
const segments = [
"Boş","Boş","Boş","Boş","Boş","Boş","Boş","Boş",
"Bəxtini sına","Bəxtini sına","Bəxtini sına","Bəxtini sına",
"5₼","10₼"
];

const colors = [
"#ff4d4d","#4dff4d","#4da6ff","#ffcc00","#cc66ff",
"#00cccc","#ff6600","#66ff66","#3399ff","#ff3399",
"#99ff33","#ff9933","#33ccff","#ff0066"
];

let angle = 0;

function drawWheel(){
    let arc = Math.PI * 2 / segments.length;

    for(let i=0;i<segments.length;i++){
        ctx.beginPath();
        ctx.fillStyle = colors[i];
        ctx.moveTo(200,200);
        ctx.arc(200,200,200,arc*i,arc*(i+1));
        ctx.fill();

        ctx.save();
        ctx.translate(200,200);
        ctx.rotate(arc*i + arc/2);
        ctx.fillStyle="#000";
        ctx.fillText(segments[i],80,5);
        ctx.restore();
    }
}

drawWheel();

function spin(){
    if(balance <= 0){
        alert("Balans yoxdur!");
        return;
    }

    balance -= 1;
    updateBalance();

    let spinAngle = Math.random()*3000 + 2000;
    let duration = 4000;
    let start = null;

    function animate(time){
        if(!start) start = time;
        let progress = time - start;

        angle = spinAngle * (progress/duration);

        ctx.clearRect(0,0,400,400);
        ctx.save();
        ctx.translate(200,200);
        ctx.rotate(angle*Math.PI/180);
        ctx.translate(-200,-200);
        drawWheel();
        ctx.restore();

        if(progress < duration){
            requestAnimationFrame(animate);
        } else {
            showResult();
        }
    }

    requestAnimationFrame(animate);
}

function showResult(){
    let arc = 360 / segments.length;
    let deg = angle % 360;
    let index = Math.floor((360 - deg) / arc) % segments.length;

    let res = segments[index];
    let text = "";

    if(res.includes("₼")){
        let win = parseInt(res);
        balance += win;
        text = "🎉 Uddunuz: " + res;
    } else if(res === "Boş"){
        text = "😕 Boş";
    } else {
        text = "🍀 Bəxtini sına";
    }

    updateBalance();

    let box = document.getElementById("result");
    box.innerHTML = text + "<br><br><button onclick='closeRes()'>Bağla</button>";
    box.style.display = "block";
}

function updateBalance(){
    document.getElementById("balance").innerText = "Balans: " + balance + "₼";
}

function closeRes(){
    document.getElementById("result").style.display="none";
}
</script>

</body>
</html>
