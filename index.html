body{

    justify-content:center;
    align-items:center;
    min-height:100vh;

}

.container{
    width:90%;
    max-width:450px;

.box{
    position:relative;
    background:#fff;
    color:#000;
    padding:18px;
    border-radius:20px;
    margin:25px 0;
    font-weight:bold;
    font-size:17px;
    animation:slide 1s ease;
    box-shadow:0 0 20px rgba(0,255,0,0.4);

.box::before{
    content:"✔";
    position:absolute;
    left:-45px;
    top:50%;
    transform:translateY(-50%);
    width:35px;
    height:35px;
    background:#00c853;
    border-radius:50%;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;

}

.line{
    width:4px;
    height:30px;
    background:#fff;
    margin-left:-28px;
    border-radius:20px;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    background:#00c853;
    color:#000;
    text-decoration:none;
    padding:15px;
    margin-top:20px;
    border-radius:15px;
    font-weight:bold;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.title{
    text-align:center;
    color:#00ff66;
    font-size:28px;
    margin-bottom:30px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #00ff66;
    }
    to{
        text-shadow:0 0 25px #00ff66;
    }
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateX(-50px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}
</style>
</head>
