<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostbet Bonus</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#07111f;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:linear-gradient(145deg,#0b1728,#111f35);
    border-radius:25px;
    border:2px solid #00cfff;
    padding:50px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,207,255,0.35);
}

.logo{
    font-size:65px;
    font-weight:900;
    color:#ffffff;
    letter-spacing:3px;
    margin-bottom:25px;
}

.logo span{
    color:#00cfff;
    text-shadow:0 0 15px #00cfff;
}

.bonus{
    color:#00ff95;
    font-size:38px;
    font-weight:bold;
    margin-bottom:30px;
    text-shadow:0 0 12px #00ff95;
}

.text{
    color:#ffffff;
    font-size:27px;
    line-height:1.8;
}

.money{
    color:#ffd700;
    font-size:42px;
    font-weight:900;
    text-shadow:0 0 14px #ffd700;
}

.min{
    color:#00cfff;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:40px;
    background:#00cfff;
    color:#000;
    text-decoration:none;
    padding:18px 50px;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 25px rgba(0,207,255,0.45);
}

.btn:hover{
    background:#00b2d9;
    transform:scale(1.05);
}

.footer{
    margin-top:25px;
    color:#9ca3af;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        MOST<span>BET</span>
    </div>

    <div class="bonus">
        Yeni istifadəçilərə özəl 150₼ bonus təklifi
    </div>

    <div class="text">
        Qeydiyyatdan keç və balansını minimum
        <span class="min">10 AZN</span>
        artır.
        <br><br>

        Sənin oyun hesabına
        <span class="money">150₼ BONUS</span>
        köçürək!
    </div>

    <a href="https://66avrzh.com/eb0U" class="btn">
        QEYDİYYATDAN KEÇ
    </a>

    <div class="footer">
        Bonus kampaniyası məhdud müddət üçündür
    </div>
