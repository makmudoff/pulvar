<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>777 Casino Meyvə Oyunu</title>
<style>
    body { font-family: Arial, sans-serif; background: #f8f8f8; text-align: center; padding: 50px; }
    .button { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
    .button:hover { background: #45a049; }
    #game { display: none; margin-top: 20px; }
    #balance { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h1>777 Casino Meyvə Oyunu</h1>

<div id="register">
    <button class="button" onclick="registerUser()">Qeydiyyatdan Keç</button>
</div>

<div id="game">
    <p id="balance">Balans: 0 kredit</p>
    <button class="button" onclick="deposit()">Deposit et (1 AZN → 1000 kredit)</button>
    <button class="button" onclick="spinFruit()">Meyvəni Fırla (0.20₼)</button>
    <p id="message"></p>
</div>

<script>
let balance = 0;
let registered = false;

function registerUser() {
    registered = true;
    document.getElementById('register').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('message').innerText = "Xoş gəldin! Oyuna başla.";
}

// Deposit düyməsi WhatsApp-a yönləndirir
function deposit() {
    if (!registered) return alert("Əvvəlcə qeydiyyatdan keçin!");
    let whatsappNumber = "0552334815";
    let text = "Salam, mən deposit etmək istəyirəm, oyun oynayacağam";
    let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank");
    
    // Simulyasiya üçün balans artırırıq
    balance += 1000;
    updateBalance();
}

// Meyvəni fırlatmaq
function spinFruit() {
    if (balance < 20) { // 0.20 AZN = 20 kredit
        alert("Balansınız kifayət etmir!");
        return;
    }
    balance -= 20;
    updateBalance();
    
    const fruits = ["🍒", "🍋", "🍊", "🍇", "🍉"];
    const result = [];
    for (let i = 0; i < 3; i++) {
        result.push(fruits[Math.floor(Math.random() * fruits.length)]);
    }
    
    document.getElementById('message').innerText = "Nəticə: " + result.join(" | ");
}

function updateBalance() {
    document.getElementById('balance').innerText = "Balans: " + balance + " kredit";
}
</script>

</body>
</html>
