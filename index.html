<!-- YALNIZ STYLE HISSƏSI DƏYİŞDİRİLİB, QALANI EYNİDİR -->

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f0f0f;
  color:#f5d76e;
  padding-bottom:90px;
}

/* HEADER */
.top-banner{
  background:linear-gradient(90deg,#b8962e,#f5d76e);
  color:#111;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.top-banner button{
  background:#111;
  color:#f5d76e;
  border:none;
  padding:11px 18px;
  border-radius:25px;
}

/* LOGO */
.logo{
  font-size:34px;
  font-weight:900;
  color:#f5d76e;
}

/* CARD */
.card{
  width:90%;
  max-width:520px;
  margin:25px auto;
  background:#1a1a1a;
  border:2px solid #f5d76e;
  border-radius:28px;
  padding:25px;
  box-shadow:0 0 25px rgba(245,215,110,0.2);
}

/* INFO BOX */
.info-box{
  border:2px dashed #f5d76e;
  border-radius:22px;
  padding:20px;
}

/* RANGE */
input[type=range]{
  accent-color:#f5d76e;
}

/* SELECT */
.select-box select{
  border:2px solid #f5d76e;
  background:#111;
  color:#f5d76e;
}

/* SCHEDULE */
.schedule{
  border:2px dashed #f5d76e;
  border-radius:22px;
  padding:20px;
}

/* FORM */
.apply-box{
  background:#111;
}

.apply-box input{
  border:2px solid #f5d76e;
  background:#1a1a1a;
  color:#f5d76e;
}

/* BUTTON */
.apply-box button{
  background:linear-gradient(90deg,#b8962e,#f5d76e);
  color:#111;
  font-weight:bold;
}

/* BOTTOM MENU */
.bottom-menu{
  background:#111;
}

.bottom-menu a{
  border:2px solid #f5d76e;
  color:#f5d76e;
}

.bottom-menu a:last-child{
  background:linear-gradient(90deg,#b8962e,#f5d76e);
  color:#111;
}

/* TERMS */
.terms-page{
  background:#0f0f0f;
  color:#f5d76e;
}

.pay-btn{
  background:linear-gradient(90deg,#b8962e,#f5d76e);
  color:#111;
}

/* TOGGLE */
.toggle{
  background:#222;
}

.toggle button{
  color:#999;
}

.toggle .on{
  background:#f5d76e;
  color:#111;
}
</style>
